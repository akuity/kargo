<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <!-- Card 1: Freight -->
  <rect x="0" y="0" width="252" height="252" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="0" y="0" width="252" height="4" rx="4" fill="#3578e5"/>
  <text x="20" y="50" font-size="28">📦</text>
  <text x="20" y="76" font-size="12" fill="#3578e5" font-weight="700" letter-spacing="0.1em">FREIGHT</text>
  <text x="20" y="102" font-size="17" fill="#111827" font-weight="600">A shipping container</text>
  <text x="20" y="128" font-size="14" fill="#6b7280">Holds references to exact artifact</text>
  <text x="20" y="148" font-size="14" fill="#6b7280">versions (images, configs, charts)</text>
  <text x="20" y="168" font-size="14" fill="#6b7280">so every environment receives</text>
  <text x="20" y="188" font-size="14" fill="#6b7280">the same update.</text>

  <!-- Card 2: Warehouse -->
  <rect x="264" y="0" width="252" height="252" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="264" y="0" width="252" height="4" rx="4" fill="#3578e5"/>
  <text x="284" y="50" font-size="28">🏭</text>
  <text x="284" y="76" font-size="12" fill="#3578e5" font-weight="700" letter-spacing="0.1em">WAREHOUSE</text>
  <text x="284" y="102" font-size="17" fill="#111827" font-weight="600">Watches for new versions</text>
  <text x="284" y="128" font-size="14" fill="#6b7280">Automatically detects when a</text>
  <text x="284" y="148" font-size="14" fill="#6b7280">new container image is pushed.</text>
  <text x="284" y="168" font-size="14" fill="#6b7280">Produces new Freight ready to</text>
  <text x="284" y="188" font-size="14" fill="#6b7280">promote — no manual tagging.</text>

  <!-- Card 3: Stages -->
  <rect x="528" y="0" width="252" height="252" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="528" y="0" width="252" height="4" rx="4" fill="#3578e5"/>
  <text x="548" y="50" font-size="28">🚦</text>
  <text x="548" y="76" font-size="12" fill="#3578e5" font-weight="700" letter-spacing="0.1em">STAGES</text>
  <text x="548" y="102" font-size="17" fill="#111827" font-weight="600">Gate every environment</text>
  <text x="548" y="128" font-size="14" fill="#6b7280">Test, UAT, and Prod are each a</text>
  <text x="548" y="148" font-size="14" fill="#6b7280">Stage. Freight must pass through</text>
  <text x="548" y="168" font-size="14" fill="#6b7280">them in order. You control when</text>
  <text x="548" y="188" font-size="14" fill="#6b7280">it advances — manually or auto.</text>

</svg>
