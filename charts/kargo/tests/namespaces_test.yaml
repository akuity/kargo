---
suite: system-resources-namespace/roles.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/system-resources-namespace/roles.yaml
tests:
  - it: renders the system resources Roles by default
    asserts:
      - documentSelector:
          path: metadata.name
          value: kargo-system-resources-reader
        isKind:
          of: Role
      - documentSelector:
          path: metadata.name
          value: kargo-system-resources-admin
        isKind:
          of: Role

  - it: is not rendered when RBAC creation is disabled
    set:
      global.systemResources.createRBAC: false
    asserts:
      - hasDocuments:
          count: 0

  - it: is not rendered when the data plane is not installed
    set:
      dataPlane.install: false
    asserts:
      - hasDocuments:
          count: 0

---
suite: system-resources-namespace/role-bindings.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/system-resources-namespace/role-bindings.yaml
tests:
  - it: renders the system resources RoleBindings by default
    asserts:
      - documentSelector:
          path: metadata.name
          value: kargo-system-resources-reader
        isKind:
          of: RoleBinding
      - documentSelector:
          path: metadata.name
          value: kargo-system-resources-admin
        isKind:
          of: RoleBinding

  - it: omits the reader and admin RoleBindings when RBAC creation is disabled
    # The controller-reader RoleBinding is gated separately (on the controller
    # being installed), so it is unaffected by this flag and remains.
    set:
      global.systemResources.createRBAC: false
    asserts:
      - hasDocuments:
          count: 1
      - documentSelector:
          path: metadata.name
          value: kargo-controller-system-resources-reader
        isKind:
          of: RoleBinding

