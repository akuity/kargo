suite: system-resources-namespace/namespace.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/system-resources-namespace/namespace.yaml
tests:
  - it: creates the system resources namespace by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Namespace
      - equal:
          path: metadata.name
          value: kargo-system-resources

  - it: honors a custom system resources namespace name
    set:
      global.systemResources.namespace: custom-system
    asserts:
      - equal:
          path: metadata.name
          value: custom-system

  - it: has no annotations by default
    asserts:
      - notExists:
          path: metadata.annotations

  - it: applies extra namespace labels and annotations when configured
    set:
      global.systemResources.extraNamespaceLabels:
        team: platform
      global.systemResources.extraNamespaceAnnotations:
        kyverno.io/required: enforce
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
      - equal:
          path: metadata.annotations["kyverno.io/required"]
          value: enforce

  - it: is not created when namespace creation is disabled
    set:
      global.systemResources.createNamespace: false
    asserts:
      - hasDocuments:
          count: 0

  - it: is not created when the data plane is not installed
    set:
      dataPlane.install: false
    asserts:
      - hasDocuments:
          count: 0

