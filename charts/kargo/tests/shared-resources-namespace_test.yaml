suite: shared-resources-namespace/namespace.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/shared-resources-namespace/namespace.yaml
tests:
  - it: creates the shared resources namespace by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Namespace
      - equal:
          path: metadata.name
          value: kargo-shared-resources

  - it: has no annotations by default
    asserts:
      - notExists:
          path: metadata.annotations

  - it: applies extra namespace labels and annotations when configured
    set:
      global.sharedResources.extraNamespaceLabels:
        team: platform
      global.sharedResources.extraNamespaceAnnotations:
        kyverno.io/required: enforce
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
      - equal:
          path: metadata.annotations["kyverno.io/required"]
          value: enforce

  - it: is not created when namespace creation is disabled
    set:
      global.sharedResources.createNamespace: false
    asserts:
      - hasDocuments:
          count: 0

---
suite: shared-resources-namespace/roles.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/shared-resources-namespace/roles.yaml
tests:
  - it: renders the shared resources Roles by default
    asserts:
      - documentSelector:
          path: metadata.name
          value: kargo-shared-resources-reader
        isKind:
          of: Role
      - documentSelector:
          path: metadata.name
          value: kargo-shared-resources-admin
        isKind:
          of: Role

  - it: is not rendered when RBAC creation is disabled
    set:
      global.sharedResources.createRBAC: false
    asserts:
      - hasDocuments:
          count: 0

  - it: is not rendered when the data plane is not installed
    set:
      dataPlane.install: false
    asserts:
      - hasDocuments:
          count: 0

---
suite: shared-resources-namespace/role-bindings.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/shared-resources-namespace/role-bindings.yaml
tests:
  - it: renders the shared resources RoleBindings by default
    asserts:
      - documentSelector:
          path: metadata.name
          value: kargo-shared-resources-reader
        isKind:
          of: RoleBinding
      - documentSelector:
          path: metadata.name
          value: kargo-shared-resources-admin
        isKind:
          of: RoleBinding

  - it: omits all RoleBindings when RBAC creation is disabled
    set:
      global.sharedResources.createRBAC: false
    asserts:
      - hasDocuments:
          count: 0
