suite: management-controller/deployment.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/management-controller/deployment.yaml
  - templates/management-controller/configmap.yaml
tests:
  - it: renders the management controller Deployment by default
    template: templates/management-controller/deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: kargo-management-controller
      - equal:
          path: spec.template.spec.serviceAccountName
          value: kargo-management-controller

  - it: is not rendered when the management controller is disabled
    template: templates/management-controller/deployment.yaml
    set:
      managementController.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: declares no metrics container port by default
    template: templates/management-controller/deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].ports

  - it: declares the metrics container port when metrics are enabled
    template: templates/management-controller/deployment.yaml
    set:
      managementController.metrics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 9090
            name: http-metrics
            protocol: TCP

---
suite: management-controller/configmap.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/management-controller/configmap.yaml
tests:
  - it: renders management controller configuration with defaults
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: data.LOG_LEVEL
          value: INFO
      - equal:
          path: data.SYSTEM_RESOURCES_NAMESPACE
          value: kargo-system-resources
      - equal:
          path: data.SHARED_RESOURCES_NAMESPACE
          value: kargo-shared-resources
      - equal:
          path: data.MAX_CONCURRENT_PROJECT_RECONCILES
          value: "4"

  - it: derives the external webhooks server base URL (https by default)
    asserts:
      - equal:
          path: data.EXTERNAL_WEBHOOK_SERVER_BASE_URL
          value: https://localhost

  - it: stops managing controller role bindings when cluster-wide secret reading is enabled
    set:
      controller.serviceAccount.clusterWideSecretReadingEnabled: true
    asserts:
      - equal:
          path: data.MANAGE_CONTROLLER_ROLE_BINDINGS
          value: "false"

  - it: omits METRICS_BIND_ADDRESS by default
    asserts:
      - notExists:
          path: data.METRICS_BIND_ADDRESS

  - it: sets METRICS_BIND_ADDRESS when metrics are enabled
    set:
      managementController.metrics.enabled: true
    asserts:
      - equal:
          path: data.METRICS_BIND_ADDRESS
          value: ":9090"

---
suite: management-controller/metrics-service.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/management-controller/metrics-service.yaml
tests:
  - it: is not rendered by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the metrics Service when metrics are enabled
    set:
      managementController.metrics.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: kargo-management-controller-metrics
      - equal:
          path: spec.ports[0].port
          value: 9090
      - equal:
          path: spec.ports[0].name
          value: http-metrics
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: management-controller

---
suite: management-controller/metrics-service-monitor.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/management-controller/metrics-service-monitor.yaml
tests:
  - it: is not rendered when the Prometheus Operator CRDs are absent
    set:
      managementController.metrics.enabled: true
      managementController.metrics.serviceMonitor.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the ServiceMonitor when enabled and the CRDs are present
    set:
      managementController.metrics.enabled: true
      managementController.metrics.serviceMonitor.enabled: true
    capabilities:
      apiVersions:
        - monitoring.coreos.com/v1
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: kargo-management-controller-metrics
      - equal:
          path: spec.endpoints[0].port
          value: http-metrics
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: management-controller
