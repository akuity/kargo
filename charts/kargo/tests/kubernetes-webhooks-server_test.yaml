suite: kubernetes-webhooks-server/webhooks.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/kubernetes-webhooks-server/webhooks.yaml
tests:
  - it: registers the mutating and validating webhook configurations by default
    asserts:
      - hasDocuments:
          count: 2
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        lengthEqual:
          path: webhooks
          count: 4

  - it: is not rendered when webhook registration is disabled
    set:
      webhooks.register: false
    asserts:
      - hasDocuments:
          count: 0

  - it: is not rendered when the data plane is not installed
    set:
      dataPlane.install: false
    asserts:
      - hasDocuments:
          count: 0

  - it: omits the CA bundle when a self-signed cert is used (default)
    documentSelector:
      path: kind
      value: MutatingWebhookConfiguration
    asserts:
      - notExists:
          path: webhooks[0].clientConfig.caBundle

  - it: injects the CA bundle when provided and not self-signed
    documentSelector:
      path: kind
      value: MutatingWebhookConfiguration
    set:
      webhooksServer.tls.selfSignedCert: false
      webhooksServer.tls.caBundle: test-ca-bundle
    asserts:
      - isNotEmpty:
          path: webhooks[0].clientConfig.caBundle

---
suite: kubernetes-webhooks-server/configmap.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/kubernetes-webhooks-server/configmap.yaml
tests:
  - it: derives the control-plane user regex from enabled components by default
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data.CONTROLPLANE_USER_REGEX
          pattern: "kargo-controller"

  - it: honors an explicit control-plane user regex
    set:
      webhooksServer.controlplaneUserRegex: "^my-custom-regex$"
    asserts:
      - equal:
          path: data.CONTROLPLANE_USER_REGEX
          value: "^my-custom-regex$"

  - it: omits METRICS_BIND_ADDRESS by default
    asserts:
      - notExists:
          path: data.METRICS_BIND_ADDRESS

  - it: sets METRICS_BIND_ADDRESS when metrics are enabled
    set:
      webhooksServer.metrics.enabled: true
    asserts:
      - equal:
          path: data.METRICS_BIND_ADDRESS
          value: ":9090"

---
suite: kubernetes-webhooks-server/deployment.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/kubernetes-webhooks-server/deployment.yaml
  - templates/kubernetes-webhooks-server/configmap.yaml
tests:
  - it: renders the webhooks server Deployment by default
    template: templates/kubernetes-webhooks-server/deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: kargo-webhooks-server
      - equal:
          path: spec.template.spec.serviceAccountName
          value: kargo-webhooks-server

  - it: is not rendered when the webhooks server is disabled
    template: templates/kubernetes-webhooks-server/deployment.yaml
    set:
      webhooksServer.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: declares only the webhooks port by default
    template: templates/kubernetes-webhooks-server/deployment.yaml
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 1
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: webhooks-server

  - it: appends the metrics container port when metrics are enabled
    template: templates/kubernetes-webhooks-server/deployment.yaml
    set:
      webhooksServer.metrics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 9090
            name: http-metrics
            protocol: TCP

---
suite: kubernetes-webhooks-server/metrics-service.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/kubernetes-webhooks-server/metrics-service.yaml
tests:
  - it: is not rendered by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the metrics Service when metrics are enabled
    set:
      webhooksServer.metrics.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: kargo-webhooks-server-metrics
      - equal:
          path: spec.ports[0].port
          value: 9090
      - equal:
          path: spec.ports[0].name
          value: http-metrics
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: kubernetes-webhooks-server

---
suite: kubernetes-webhooks-server/metrics-service-monitor.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/kubernetes-webhooks-server/metrics-service-monitor.yaml
tests:
  - it: is not rendered when the Prometheus Operator CRDs are absent
    set:
      webhooksServer.metrics.enabled: true
      webhooksServer.metrics.serviceMonitor.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the ServiceMonitor when enabled and the CRDs are present
    set:
      webhooksServer.metrics.enabled: true
      webhooksServer.metrics.serviceMonitor.enabled: true
    capabilities:
      apiVersions:
        - monitoring.coreos.com/v1
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: kargo-webhooks-server-metrics
      - equal:
          path: spec.endpoints[0].port
          value: http-metrics
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: kubernetes-webhooks-server
