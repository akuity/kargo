suite: cluster-secrets-namespace/namespace.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/cluster-secrets-namespace/namespace.yaml
tests:
  - it: creates the (deprecated) cluster secrets namespace by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Namespace
      - equal:
          path: metadata.name
          value: kargo-cluster-secrets

  - it: is not created when namespace creation is disabled
    set:
      global.createClusterSecretsNamespace: false
    asserts:
      - hasDocuments:
          count: 0

---
suite: cluster-secrets-namespace/roles.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/cluster-secrets-namespace/roles.yaml
tests:
  - it: renders the (deprecated) cluster secrets Roles by default
    asserts:
      - documentSelector:
          path: metadata.name
          value: kargo-cluster-secrets-reader
        isKind:
          of: Role
      - documentSelector:
          path: metadata.name
          value: kargo-cluster-secrets-admin
        isKind:
          of: Role

  - it: is not rendered when RBAC creation is disabled
    set:
      global.createClusterSecretsRBAC: false
    asserts:
      - hasDocuments:
          count: 0

  - it: is not rendered when the data plane is not installed
    set:
      dataPlane.install: false
    asserts:
      - hasDocuments:
          count: 0

---
suite: cluster-secrets-namespace/role-bindings.yaml
values:
  - ../test/values-unittest.yaml
templates:
  - templates/cluster-secrets-namespace/role-bindings.yaml
tests:
  - it: renders the (deprecated) cluster secrets RoleBindings by default
    asserts:
      - documentSelector:
          path: metadata.name
          value: kargo-cluster-secrets-reader
        isKind:
          of: RoleBinding
      - documentSelector:
          path: metadata.name
          value: kargo-cluster-secrets-admin
        isKind:
          of: RoleBinding

  - it: omits all RoleBindings when RBAC creation is disabled
    set:
      global.createClusterSecretsRBAC: false
    asserts:
      - hasDocuments:
          count: 0
