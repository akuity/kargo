{{- if and .Values.api.enabled .Values.api.tls.enabled .Values.api.tls.selfSignedCert }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kargo-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kargo.labels" . | nindent 4 }}
    {{- include "kargo.api.labels" . | nindent 4 }}
  {{- include "kargo.annotations" (dict "root" . "annotations" .Values.api.annotations) | nindent 2 }}
spec:
  dnsNames:
  - {{ quote .Values.api.host }}
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: kargo-selfsigned-cert-issuer
  secretName: {{ .Values.api.tls.secretName }}
{{- end }}
