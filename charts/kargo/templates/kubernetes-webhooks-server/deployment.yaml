{{- if and .Values.workloads.install .Values.webhooksServer.enabled }}
{{- $kc := .Values.webhooksServer.kubeconfigSecrets.kargo | default .Values.kubeconfigSecrets.kargo }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kargo-webhooks-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kargo.labels" . | nindent 4 }}
    {{- include "kargo.kubernetesWebhooksServer.labels" . | nindent 4 }}
  {{- with (mergeOverwrite (deepCopy .Values.global.labels) .Values.webhooksServer.labels) }}
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
  {{- include "kargo.annotations" (dict "root" . "annotations" .Values.webhooksServer.annotations) | nindent 2 }}
spec:
  replicas: {{ .Values.webhooksServer.replicas | default 1 }}
  revisionHistoryLimit: {{ .Values.webhooksServer.revisionHistoryLimit }}
  strategy:
    type: RollingUpdate
    {{- with .Values.webhooksServer.rollingUpdate }}
    rollingUpdate:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "kargo.selectorLabels" . | nindent 6 }}
      {{- include "kargo.kubernetesWebhooksServer.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kargo.labels" . | nindent 8 }}
        {{- include "kargo.kubernetesWebhooksServer.labels" . | nindent 8 }}
      {{- with (mergeOverwrite (deepCopy .Values.global.podLabels) .Values.webhooksServer.podLabels) }}
        {{- range $key, $value := . }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
      annotations:
        configmap/checksum: {{ pick ( include (print $.Template.BasePath "/kubernetes-webhooks-server/configmap.yaml") . | fromYaml ) "data" | toYaml | sha256sum }}
      {{- with (mergeOverwrite (deepCopy .Values.global.podAnnotations) .Values.webhooksServer.podAnnotations) }}
        {{- range $key, $value := . }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: kargo-webhooks-server
      {{- with .Values.webhooksServer.affinity | default .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhooksServer.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhooksServer.priorityClassName | default .Values.global.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: webhooks-server
        image: {{ include "kargo.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/sbin/tini", "--", "/usr/local/bin/kargo"]
        args: ["kubernetes-webhooks-server"]
        env:
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              containerName: webhooks-server
              divisor: "1"
              resource: limits.memory
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              containerName: webhooks-server
              divisor: "1"
              resource: {{ include "kargo.selectCpuResourceField" (dict "resources" .Values.webhooksServer.resources) }}
        {{- with (concat .Values.global.env .Values.webhooksServer.env) }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: kargo-webhooks-server
        {{- with (concat .Values.global.envFrom .Values.webhooksServer.envFrom) }}
          {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
        ports:
        - containerPort: 9443
          name: webhooks-server
          protocol: TCP
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
        {{- if $kc }}
        - mountPath: /etc/kargo/kubeconfigs
          name: kubeconfigs
          readOnly: true
        {{- end }}
        {{- with .Values.webhooksServer.volumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.webhooksServer.securityContext | default .Values.global.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.webhooksServer.resources | nindent 10 }}
      {{- with .Values.webhooksServer.containers }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.webhooksServer.initContainers }}
      initContainers:
      {{- toYaml . | nindent 6 }}
      {{- end }}
      volumes:
      - name: cert
        secret:
          defaultMode: 0644
          secretName: {{ .Values.webhooksServer.tls.secretName }}
      {{- if $kc }}
      - name: kubeconfigs
        secret:
          defaultMode: 0644
          secretName: {{ $kc }}
      {{- end }}
      {{- with .Values.webhooksServer.volumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.webhooksServer.nodeSelector | default .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhooksServer.tolerations | default .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
