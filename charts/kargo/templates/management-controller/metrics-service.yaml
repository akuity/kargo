{{- if and .Values.workloads.install .Values.managementController.enabled .Values.managementController.metrics.enabled }}
{{- $svc := .Values.managementController.metrics.service }}
apiVersion: v1
kind: Service
metadata:
  name: kargo-management-controller-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kargo.labels" . | nindent 4 }}
    {{- include "kargo.managementController.labels" . | nindent 4 }}
  {{- range $key, $value := $svc.labels }}
    {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- include "kargo.annotations" (dict "root" . "annotations" $svc.annotations) | nindent 2 }}
spec:
  type: {{ $svc.type }}
  {{- with $svc.clusterIP }}
  clusterIP: {{ . }}
  {{- end }}
  ports:
  - port: {{ $svc.servicePort }}
    targetPort: {{ $svc.servicePort }}
    protocol: TCP
    name: {{ $svc.portName }}
  selector:
    {{- include "kargo.selectorLabels" . | nindent 4 }}
    {{- include "kargo.managementController.labels" . | nindent 4 }}
{{- end }}
