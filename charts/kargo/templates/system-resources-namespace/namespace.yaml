{{- if and .Values.dataPlane.install .Values.global.systemResources.createNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  {{- include "kargo.annotations" (dict "root" . "annotations" .Values.global.systemResources.extraNamespaceAnnotations) | nindent 2 }}
  labels:
    {{- include "kargo.labels" . | nindent 4 }}
  {{- with .Values.global.systemResources.extraNamespaceLabels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  name: {{ quote .Values.global.systemResources.namespace }}
{{- end }}
