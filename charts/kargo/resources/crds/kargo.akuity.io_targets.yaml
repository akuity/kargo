---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: targets.kargo.akuity.io
spec:
  group: kargo.akuity.io
  names:
    kind: Target
    listKind: TargetList
    plural: targets
    singular: target
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Target represents a single destination -- a cluster, for instance -- that
          Stages promote Freight to. A Target is purely descriptive: it holds
          target-specific values consumed by the promotion steps of Stages that
          govern it and records which Stages those are. It defines no promotion
          steps and no Freight sources of its own and therefore cannot effect any
          promotion itself.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec describes the Target.
            properties:
              params:
                additionalProperties:
                  type: string
                description: |-
                  Params is a map of arbitrary, target-specific values. Promotion steps of
                  Stages that govern this Target may reference these values by key in their
                  expressions (for example, target.params.branch).
                type: object
            type: object
          status:
            description: Status describes the current status of the Target.
            properties:
              conditions:
                description: Conditions contains the last observations of the Target's
                  current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              ownedBy:
                description: |-
                  OwnedBy describes the Stages that currently govern this Target, with one
                  entry per (Stage, Freight origin) pair.
                items:
                  description: |-
                    TargetOwnership records one Stage's governance of a Target with respect to
                    Freight from a single origin.
                  properties:
                    currentFreight:
                      description: |-
                        CurrentFreight is the name of the Freight from Origin most recently
                        promoted to this Target by the governing Stage.
                      type: string
                    health:
                      description: |-
                        Health is the Target's last observed health with respect to the Freight
                        indicated by CurrentFreight.
                      type: string
                    origin:
                      description: |-
                        Origin is the origin of the Freight that the governing Stage promotes to
                        this Target.
                      properties:
                        kind:
                          description: |-
                            Kind is the kind of resource from which Freight may have originated. At
                            present, this can only be "Warehouse".
                          enum:
                          - Warehouse
                          type: string
                        name:
                          description: |-
                            Name is the name of the resource of the kind indicated by the Kind field
                            from which Freight may originate.
                          type: string
                      required:
                      - kind
                      - name
                      type: object
                    stage:
                      description: Stage is the name of the governing Stage.
                      type: string
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
