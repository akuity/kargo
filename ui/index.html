<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      The two __BASE_*__ placeholders are substituted by the kargo API
      server's dashboard handler at serve time. <base href> is set to a
      runtime-resolved prefix (with trailing slash) so the browser can
      resolve relative URLs in this document against the deployed prefix.
      The window.__KARGO_BASE_PATH__ global (no trailing slash) is read
      by JS code that constructs URLs explicitly — ConnectRPC/REST
      baseUrl, React Router basename, window.location redirects.
      When the server is at the root, both placeholders resolve to their
      no-op forms ("/" and "" respectively).
    -->
    <base href="__BASE_HREF__" />
    <script>
      window.__KARGO_BASE_PATH__ = '__BASE_PATH__';
    </script>
    <link rel="icon" type="image/png" href="kargo-logo-head-only.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kargo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
