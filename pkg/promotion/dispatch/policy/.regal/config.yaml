# Regal (https://docs.styra.com/regal) configuration for the embedded
# dispatch policy library. The config's location makes policy/ the root, so
# directory structure is expected to match package layout.
rules:
  imports:
    unresolved-reference:
      # These documents are supplied at evaluation time: the data documents
      # by the engine (see ../schemas), the kargo.custom hooks by an
      # optional project-authored module.
      except-paths:
      - data.windows
      - data.exclusions
      - data.scopes
      - data.rateLimit
      - data.kargo.custom.violation
      - data.kargo.custom.exclusions_bypass
  style:
    function-arg-return:
      # Defaults, plus the kargo custom built-ins (false positives: their
      # last argument is `now`, not an output capture).
      except-functions:
      - print
      - trace
      - walk
      - kargo.rrule_active
      - kargo.rrule_next
capabilities:
  from:
    engine: opa
    version: v1.18.2
  plus:
    builtins:
    - name: kargo.rrule_active
      decl:
        type: function
        args:
        - type: string # recurrence (RFC 5545 RRULE)
        - type: string # start "HH:MM"
        - type: string # end "HH:MM"
        - type: string # location (IANA time zone; "" = UTC)
        - type: string # now (RFC3339)
        result:
          type: boolean
    - name: kargo.rrule_next
      decl:
        type: function
        args:
        - type: string # recurrence (RFC 5545 RRULE)
        - type: string # start "HH:MM"
        - type: string # location (IANA time zone; "" = UTC)
        - type: string # now (RFC3339)
        result:
          type: string
