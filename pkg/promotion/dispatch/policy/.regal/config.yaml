# Regal (https://docs.styra.com/regal) configuration for the embedded
# dispatch policy library. The config's location makes policy/ the root, so
# directory structure is expected to match package layout.
rules:
  bugs:
    argument-always-wildcard:
      # Extension-point predicates: OPA requires default-function arguments
      # to be wildcards, and the shipped modules define only the default
      # (custom policies supply the real bodies).
      except-function-name-pattern: ^freeze_bypass$
  imports:
    unresolved-reference:
      # These documents are supplied at evaluation time: the data documents
      # by the engine (see ../schemas), the violation sets by optional
      # custom policy modules (the freeze_bypass functions, by
      # contrast, have shipped defaults and resolve statically).
      except-paths:
      - data.windows
      - data.freezes
      - data.scopes
      - data.rateLimit
      - data.currentFreight
      - data.kargo.project.violation
      - data.kargo.cluster.violation
  style:
    function-arg-return:
      # Defaults, plus the kargo custom built-ins (false positives: their
      # last argument is `now`, not an output capture).
      except-functions:
      - print
      - trace
      - walk
      - kargo.rrule_active
      - kargo.rrule_next
      - kargo.rrule_active_end
capabilities:
  from:
    engine: opa
    version: v1.18.2
  plus:
    builtins:
    - name: kargo.rrule_active
      decl:
        type: function
        args:
        - type: string # recurrence (RFC 5545 RRULE)
        - type: string # start "HH:MM"
        - type: string # end "HH:MM"
        - type: string # location (IANA time zone; "" = UTC)
        - type: string # now (RFC3339)
        result:
          type: boolean
    - name: kargo.rrule_next
      decl:
        type: function
        args:
        - type: string # recurrence (RFC 5545 RRULE)
        - type: string # start "HH:MM"
        - type: string # location (IANA time zone; "" = UTC)
        - type: string # now (RFC3339)
        result:
          type: string
    - name: kargo.rrule_active_end
      decl:
        type: function
        args:
        - type: string # recurrence (RFC 5545 RRULE)
        - type: string # start "HH:MM"
        - type: string # end "HH:MM"
        - type: string # location (IANA time zone; "" = UTC)
        - type: string # now (RFC3339)
        result:
          type: string
