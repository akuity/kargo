      exitCodes:
        allOf:
        - $ref: '#/definitions/v1.ContainerRestartRuleOnExitCodes'
        description: |-
          Represents the exit codes to check on container exits.
          +optional
          +oneOf=when
    type: object
  v1.ContainerRestartRuleOnExitCodes:
    properties:
      operator:
        description: |-
          Represents the relationship between the container exit code(s) and the
          specified values. Possible values are:
          - In: the requirement is satisfied if the container exit code is in the
            set of specified values.
          - NotIn: the requirement is satisfied if the container exit code is
            not in the set of specified values.
          +required
        type: string
      values:
        description: |-
          Specifies the set of values to check for container exit codes.
          At most 255 elements are allowed.
          +optional
          +listType=set
        items:
          type: integer
        type: array
    type: object
  v1.DownwardAPIProjection:
    properties:
      items:
        description: |-
          Items is a list of DownwardAPIVolume file
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.DownwardAPIVolumeFile'
        type: array
    type: object
  v1.DownwardAPIVolumeFile:
    properties:
      fieldRef:
        allOf:
        - $ref: '#/definitions/v1.ObjectFieldSelector'
        description: |-
          Required: Selects a field of the pod: only annotations, labels, name, namespace and uid are supported.
          +optional
      mode:
        description: |-
          Optional: mode bits used to set permissions on this file, must be an octal value
          between 0000 and 0777 or a decimal value between 0 and 511.
          YAML accepts both octal and decimal values, JSON requires decimal values for mode bits.
          If not specified, the volume defaultMode will be used.
          This might be in conflict with other options that affect the file
          mode, like fsGroup, and the result can be other mode bits set.
          +optional
        type: integer
      path:
        description: 'Required: Path is  the relative path name of the file to be
          created. Must not be absolute or contain the ''..'' path. Must be utf-8
          encoded. The first item of the relative path must not start with ''..'''
        type: string
      resourceFieldRef:
        allOf:
        - $ref: '#/definitions/v1.ResourceFieldSelector'
        description: |-
          Selects a resource of the container: only resources limits and requests
          (limits.cpu, limits.memory, requests.cpu and requests.memory) are currently supported.
          +optional
    type: object
  v1.DownwardAPIVolumeSource:
    properties:
      defaultMode:
        description: |-
          Optional: mode bits to use on created files by default. Must be a
          Optional: mode bits used to set permissions on created files by default.
          Must be an octal value between 0000 and 0777 or a decimal value between 0 and 511.
          YAML accepts both octal and decimal values, JSON requires decimal values for mode bits.
          Defaults to 0644.
          Directories within the path are not affected by this setting.
          This might be in conflict with other options that affect the file
          mode, like fsGroup, and the result can be other mode bits set.
          +optional
        type: integer
      items:
        description: |-
          Items is a list of downward API volume file
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.DownwardAPIVolumeFile'
        type: array
    type: object
  v1.EmptyDirVolumeSource:
    properties:
      medium:
        description: |-
          medium represents what type of storage medium should back this directory.
          The default is "" which means to use the node's default medium.
          Must be an empty string (default) or Memory.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#emptydir
          +optional
        type: string
      sizeLimit:
        allOf:
        - $ref: '#/definitions/resource.Quantity'
        description: |-
          sizeLimit is the total amount of local storage required for this EmptyDir volume.
          The size limit is also applicable for memory medium.
          The maximum usage on memory medium EmptyDir would be the minimum value between
          the SizeLimit specified here and the sum of memory limits of all containers in a pod.
          The default is nil which means that the limit is undefined.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#emptydir
          +optional
    type: object
  v1.EnvFromSource:
    properties:
      configMapRef:
        allOf:
        - $ref: '#/definitions/v1.ConfigMapEnvSource'
        description: |-
          The ConfigMap to select from
          +optional
      prefix:
        description: |-
          Optional text to prepend to the name of each environment variable.
          May consist of any printable ASCII characters except '='.
          +optional
        type: string
      secretRef:
        allOf:
        - $ref: '#/definitions/v1.SecretEnvSource'
        description: |-
          The Secret to select from
          +optional
    type: object
  v1.EnvVar:
    properties:
      name:
        description: |-
          Name of the environment variable.
          May consist of any printable ASCII characters except '='.
        type: string
      value:
        description: |-
          Variable references $(VAR_NAME) are expanded
          using the previously defined environment variables in the container and
          any service environment variables. If a variable cannot be resolved,
          the reference in the input string will be unchanged. Double $$ are reduced
          to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
          "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
          Escaped references will never be expanded, regardless of whether the variable
          exists or not.
          Defaults to "".
          +optional
        type: string
      valueFrom:
        allOf:
        - $ref: '#/definitions/v1.EnvVarSource'
        description: |-
          Source for the environment variable's value. Cannot be used if value is not empty.
          +optional
    type: object
  v1.EnvVarSource:
    properties:
      configMapKeyRef:
        allOf:
        - $ref: '#/definitions/v1.ConfigMapKeySelector'
        description: |-
          Selects a key of a ConfigMap.
          +optional
      fieldRef:
        allOf:
        - $ref: '#/definitions/v1.ObjectFieldSelector'
        description: |-
          Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
          spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
          +optional
      fileKeyRef:
        allOf:
        - $ref: '#/definitions/v1.FileKeySelector'
        description: |-
          FileKeyRef selects a key of the env file.
          Requires the EnvFiles feature gate to be enabled.

          +featureGate=EnvFiles
          +optional
      resourceFieldRef:
        allOf:
        - $ref: '#/definitions/v1.ResourceFieldSelector'
        description: |-
          Selects a resource of the container: only resources limits and requests
          (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
          +optional
      secretKeyRef:
        allOf:
        - $ref: '#/definitions/v1.SecretKeySelector'
        description: |-
          Selects a key of a secret in the pod's namespace
          +optional
    type: object
  v1.EphemeralContainer:
    properties:
      args:
        description: |-
          Arguments to the entrypoint.
          The image's CMD is used if this is not provided.
          Variable references $(VAR_NAME) are expanded using the container's environment. If a variable
          cannot be resolved, the reference in the input string will be unchanged. Double $$ are reduced
          to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e. "$$(VAR_NAME)" will
          produce the string literal "$(VAR_NAME)". Escaped references will never be expanded, regardless
          of whether the variable exists or not. Cannot be updated.
          More info: https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/#running-a-command-in-a-shell
          +optional
          +listType=atomic
        items:
          type: string
        type: array
      command:
        description: |-
          Entrypoint array. Not executed within a shell.
          The image's ENTRYPOINT is used if this is not provided.
          Variable references $(VAR_NAME) are expanded using the container's environment. If a variable
          cannot be resolved, the reference in the input string will be unchanged. Double $$ are reduced
          to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e. "$$(VAR_NAME)" will
          produce the string literal "$(VAR_NAME)". Escaped references will never be expanded, regardless
          of whether the variable exists or not. Cannot be updated.
          More info: https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/#running-a-command-in-a-shell
          +optional
          +listType=atomic
        items:
          type: string
        type: array
      env:
        description: |-
          List of environment variables to set in the container.
          Cannot be updated.
          +optional
          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
        items:
          $ref: '#/definitions/v1.EnvVar'
        type: array
      envFrom:
        description: |-
          List of sources to populate environment variables in the container.
          The keys defined within a source may consist of any printable ASCII characters except '='.
          When a key exists in multiple
          sources, the value associated with the last source will take precedence.
          Values defined by an Env with a duplicate key will take precedence.
          Cannot be updated.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.EnvFromSource'
        type: array
      image:
        description: |-
          Container image name.
          More info: https://kubernetes.io/docs/concepts/containers/images
        type: string
      imagePullPolicy:
        description: |-
          Image pull policy.
          One of Always, Never, IfNotPresent.
          Defaults to Always if :latest tag is specified, or IfNotPresent otherwise.
          Cannot be updated.
          More info: https://kubernetes.io/docs/concepts/containers/images#updating-images
          +optional
        type: string
      lifecycle:
        allOf:
        - $ref: '#/definitions/v1.Lifecycle'
        description: |-
          Lifecycle is not allowed for ephemeral containers.
          +optional
      livenessProbe:
        allOf:
        - $ref: '#/definitions/v1.Probe'
        description: |-
          Probes are not allowed for ephemeral containers.
          +optional
      name:
        description: |-
          Name of the ephemeral container specified as a DNS_LABEL.
          This name must be unique among all containers, init containers and ephemeral containers.
        type: string
      ports:
        description: |-
          Ports are not allowed for ephemeral containers.
          +optional
          +patchMergeKey=containerPort
          +patchStrategy=merge
          +listType=map
          +listMapKey=containerPort
          +listMapKey=protocol
        items:
          $ref: '#/definitions/v1.ContainerPort'
        type: array
      readinessProbe:
        allOf:
        - $ref: '#/definitions/v1.Probe'
        description: |-
          Probes are not allowed for ephemeral containers.
          +optional
      resizePolicy:
        description: |-
          Resources resize policy for the container.
          +featureGate=InPlacePodVerticalScaling
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.ContainerResizePolicy'
        type: array
      resources:
        allOf:
        - $ref: '#/definitions/v1.ResourceRequirements'
        description: |-
          Resources are not allowed for ephemeral containers. Ephemeral containers use spare resources
          already allocated to the pod.
          +optional
      restartPolicy:
        description: |-
          Restart policy for the container to manage the restart behavior of each
          container within a pod.
          You cannot set this field on ephemeral containers.
          +featureGate=SidecarContainers
          +optional
        type: string
      restartPolicyRules:
        description: |-
          Represents a list of rules to be checked to determine if the
          container should be restarted on exit. You cannot set this field on
          ephemeral containers.
          +featureGate=ContainerRestartRules
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.ContainerRestartRule'
        type: array
      securityContext:
        allOf:
        - $ref: '#/definitions/v1.SecurityContext'
        description: |-
          Optional: SecurityContext defines the security options the ephemeral container should be run with.
          If set, the fields of SecurityContext override the equivalent fields of PodSecurityContext.
          +optional
      startupProbe:
        allOf:
        - $ref: '#/definitions/v1.Probe'
        description: |-
          Probes are not allowed for ephemeral containers.
          +optional
      stdin:
        description: |-
          Whether this container should allocate a buffer for stdin in the container runtime. If this
          is not set, reads from stdin in the container will always result in EOF.
          Default is false.
          +optional
        type: boolean
      stdinOnce:
        description: |-
          Whether the container runtime should close the stdin channel after it has been opened by
          a single attach. When stdin is true the stdin stream will remain open across multiple attach
          sessions. If stdinOnce is set to true, stdin is opened on container start, is empty until the
          first client attaches to stdin, and then remains open and accepts data until the client disconnects,
          at which time stdin is closed and remains closed until the container is restarted. If this
          flag is false, a container processes that reads from stdin will never receive an EOF.
          Default is false
          +optional
        type: boolean
      targetContainerName:
        description: |-
          If set, the name of the container from PodSpec that this ephemeral container targets.
          The ephemeral container will be run in the namespaces (IPC, PID, etc) of this container.
          If not set then the ephemeral container uses the namespaces configured in the Pod spec.

          The container runtime must implement support for this feature. If the runtime does not
          support namespace targeting then the result of setting this field is undefined.
          +optional
        type: string
      terminationMessagePath:
        description: |-
          Optional: Path at which the file to which the container's termination message
          will be written is mounted into the container's filesystem.
          Message written is intended to be brief final status, such as an assertion failure message.
          Will be truncated by the node if greater than 4096 bytes. The total message length across
          all containers will be limited to 12kb.
          Defaults to /dev/termination-log.
          Cannot be updated.
          +optional
        type: string
      terminationMessagePolicy:
        description: |-
          Indicate how the termination message should be populated. File will use the contents of
          terminationMessagePath to populate the container status message on both success and failure.
          FallbackToLogsOnError will use the last chunk of container log output if the termination
          message file is empty and the container exited with an error.
          The log output is limited to 2048 bytes or 80 lines, whichever is smaller.
          Defaults to File.
          Cannot be updated.
          +optional
        type: string
      tty:
        description: |-
          Whether this container should allocate a TTY for itself, also requires 'stdin' to be true.
          Default is false.
          +optional
        type: boolean
      volumeDevices:
        description: |-
          volumeDevices is the list of block devices to be used by the container.
          +patchMergeKey=devicePath
          +patchStrategy=merge
          +listType=map
          +listMapKey=devicePath
          +optional
        items:
          $ref: '#/definitions/v1.VolumeDevice'
        type: array
      volumeMounts:
        description: |-
          Pod volumes to mount into the container's filesystem. Subpath mounts are not allowed for ephemeral containers.
          Cannot be updated.
          +optional
          +patchMergeKey=mountPath
          +patchStrategy=merge
          +listType=map
          +listMapKey=mountPath
        items:
          $ref: '#/definitions/v1.VolumeMount'
        type: array
      workingDir:
        description: |-
          Container's working directory.
          If not specified, the container runtime's default will be used, which
          might be configured in the container image.
          Cannot be updated.
          +optional
        type: string
    type: object
  v1.EphemeralVolumeSource:
    properties:
      volumeClaimTemplate:
        allOf:
        - $ref: '#/definitions/v1.PersistentVolumeClaimTemplate'
        description: |-
          Will be used to create a stand-alone PVC to provision the volume.
          The pod in which this EphemeralVolumeSource is embedded will be the
          owner of the PVC, i.e. the PVC will be deleted together with the
          pod.  The name of the PVC will be `<pod name>-<volume name>` where
          `<volume name>` is the name from the `PodSpec.Volumes` array
          entry. Pod validation will reject the pod if the concatenated name
          is not valid for a PVC (for example, too long).

          An existing PVC with that name that is not owned by the pod
          will *not* be used for the pod to avoid using an unrelated
          volume by mistake. Starting the pod is then blocked until
          the unrelated PVC is removed. If such a pre-created PVC is
          meant to be used by the pod, the PVC has to updated with an
          owner reference to the pod once the pod exists. Normally
          this should not be necessary, but it may be useful when
          manually reconstructing a broken cluster.

          This field is read-only and no changes will be made by Kubernetes
          to the PVC after it has been created.

          Required, must not be nil.
    type: object
  v1.EventSource:
    properties:
      component:
        description: |-
          Component from which the event is generated.
          +optional
        type: string
      host:
        description: |-
          Node name on which the event is generated.
          +optional
        type: string
    type: object
  v1.ExecAction:
    properties:
      command:
        description: |-
          Command is the command line to execute inside the container, the working directory for the
          command  is root ('/') in the container's filesystem. The command is simply exec'd, it is
          not run inside a shell, so traditional shell instructions ('|', etc) won't work. To use
          a shell, you need to explicitly call out to that shell.
          Exit status of 0 is treated as live/healthy and non-zero is unhealthy.
          +optional
          +listType=atomic
        items:
          type: string
        type: array
    type: object
  v1.FCVolumeSource:
    properties:
      fsType:
        description: |-
          fsType is the filesystem type to mount.
          Must be a filesystem type supported by the host operating system.
          Ex. "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
          TODO: how do we prevent errors in the filesystem from compromising the machine
          +optional
        type: string
      lun:
        description: |-
          lun is Optional: FC target lun number
          +optional
        type: integer
      readOnly:
        description: |-
          readOnly is Optional: Defaults to false (read/write). ReadOnly here will force
          the ReadOnly setting in VolumeMounts.
          +optional
        type: boolean
      targetWWNs:
        description: |-
          targetWWNs is Optional: FC target worldwide names (WWNs)
          +optional
          +listType=atomic
        items:
          type: string
        type: array
      wwids:
        description: |-
          wwids Optional: FC volume world wide identifiers (wwids)
          Either wwids or combination of targetWWNs and lun must be set, but not both simultaneously.
          +optional
          +listType=atomic
        items:
          type: string
        type: array
    type: object
  v1.FieldsV1:
    type: object
  v1.FileKeySelector:
    properties:
      key:
        description: |-
          The key within the env file. An invalid key will prevent the pod from starting.
          The keys defined within a source may consist of any printable ASCII characters except '='.
          During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
          +required
        type: string
      optional:
        description: |-
          Specify whether the file or its key must be defined. If the file or key
          does not exist, then the env var is not published.
          If optional is set to true and the specified key does not exist,
          the environment variable will not be set in the Pod's containers.

          If optional is set to false and the specified key does not exist,
          an error will be returned during Pod creation.
          +optional
          +default=false
        type: boolean
      path:
        description: |-
          The path within the volume from which to select the file.
          Must be relative and may not contain the '..' path or start with '..'.
          +required
        type: string
      volumeName:
        description: |-
          The name of the volume mount containing the env file.
          +required
        type: string
    type: object
  v1.FlexVolumeSource:
    properties:
      driver:
        description: driver is the name of the driver to use for this volume.
        type: string
      fsType:
        description: |-
          fsType is the filesystem type to mount.
          Must be a filesystem type supported by the host operating system.
          Ex. "ext4", "xfs", "ntfs". The default filesystem depends on FlexVolume script.
          +optional
        type: string
      options:
        additionalProperties:
          type: string
        description: |-
          options is Optional: this field holds extra command options if any.
          +optional
        type: object
      readOnly:
        description: |-
          readOnly is Optional: defaults to false (read/write). ReadOnly here will force
          the ReadOnly setting in VolumeMounts.
          +optional
        type: boolean
      secretRef:
        allOf:
        - $ref: '#/definitions/v1.LocalObjectReference'
        description: |-
          secretRef is Optional: secretRef is reference to the secret object containing
          sensitive information to pass to the plugin scripts. This may be
          empty if no secret object is specified. If the secret object
          contains more than one secret, all secrets are passed to the plugin
          scripts.
          +optional
    type: object
  v1.FlockerVolumeSource:
    properties:
      datasetName:
        description: |-
          datasetName is Name of the dataset stored as metadata -> name on the dataset for Flocker
          should be considered as deprecated
          +optional
        type: string
      datasetUUID:
        description: |-
          datasetUUID is the UUID of the dataset. This is unique identifier of a Flocker dataset
          +optional
        type: string
    type: object
  v1.GCEPersistentDiskVolumeSource:
    properties:
      fsType:
        description: |-
          fsType is filesystem type of the volume that you want to mount.
          Tip: Ensure that the filesystem type is supported by the host operating system.
          Examples: "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#gcepersistentdisk
          TODO: how do we prevent errors in the filesystem from compromising the machine
          +optional
        type: string
      partition:
        description: |-
          partition is the partition in the volume that you want to mount.
          If omitted, the default is to mount by volume name.
          Examples: For volume /dev/sda1, you specify the partition as "1".
          Similarly, the volume partition for /dev/sda is "0" (or you can leave the property empty).
          More info: https://kubernetes.io/docs/concepts/storage/volumes#gcepersistentdisk
          +optional
        type: integer
      pdName:
        description: |-
          pdName is unique name of the PD resource in GCE. Used to identify the disk in GCE.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#gcepersistentdisk
        type: string
      readOnly:
        description: |-
          readOnly here will force the ReadOnly setting in VolumeMounts.
          Defaults to false.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#gcepersistentdisk
          +optional
        type: boolean
    type: object
  v1.GRPCAction:
    properties:
      port:
        description: Port number of the gRPC service. Number must be in the range
          1 to 65535.
        type: integer
      service:
        description: |-
          Service is the name of the service to place in the gRPC HealthCheckRequest
          (see https://github.com/grpc/grpc/blob/master/doc/health-checking.md).

          If this is not specified, the default behavior is defined by gRPC.
          +optional
          +default=""
        type: string
    type: object
  v1.GitRepoVolumeSource:
    properties:
      directory:
        description: |-
          directory is the target directory name.
          Must not contain or start with '..'.  If '.' is supplied, the volume directory will be the
          git repository.  Otherwise, if specified, the volume will contain the git repository in
          the subdirectory with the given name.
          +optional
        type: string
      repository:
        description: repository is the URL
        type: string
      revision:
        description: |-
          revision is the commit hash for the specified revision.
          +optional
        type: string
    type: object
  v1.GlusterfsVolumeSource:
    properties:
      endpoints:
        description: endpoints is the endpoint name that details Glusterfs topology.
        type: string
      path:
        description: |-
          path is the Glusterfs volume path.
          More info: https://examples.k8s.io/volumes/glusterfs/README.md#create-a-pod
        type: string
      readOnly:
        description: |-
          readOnly here will force the Glusterfs volume to be mounted with read-only permissions.
          Defaults to false.
          More info: https://examples.k8s.io/volumes/glusterfs/README.md#create-a-pod
          +optional
        type: boolean
    type: object
  v1.HTTPGetAction:
    properties:
      host:
        description: |-
          Host name to connect to, defaults to the pod IP. You probably want to set
          "Host" in httpHeaders instead.
          +optional
        type: string
      httpHeaders:
        description: |-
          Custom headers to set in the request. HTTP allows repeated headers.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.HTTPHeader'
        type: array
      path:
        description: |-
          Path to access on the HTTP server.
          +optional
        type: string
      port:
        allOf:
        - $ref: '#/definitions/intstr.IntOrString'
        description: |-
          Name or number of the port to access on the container.
          Number must be in the range 1 to 65535.
          Name must be an IANA_SVC_NAME.
      scheme:
        description: |-
          Scheme to use for connecting to the host.
          Defaults to HTTP.
          +optional
        type: string
    type: object
  v1.HTTPHeader:
    properties:
      name:
        description: |-
          The header field name.
          This will be canonicalized upon output, so case-variant names will be understood as the same header.
        type: string
      value:
        description: The header field value
        type: string
    type: object
  v1.HostAlias:
    properties:
      hostnames:
        description: |-
          Hostnames for the above IP address.
          +listType=atomic
        items:
          type: string
        type: array
      ip:
        description: |-
          IP address of the host file entry.
          +required
        type: string
    type: object
  v1.HostPathVolumeSource:
    properties:
      path:
        description: |-
          path of the directory on the host.
          If the path is a symlink, it will follow the link to the real path.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#hostpath
        type: string
      type:
        description: |-
          type for HostPath Volume
          Defaults to ""
          More info: https://kubernetes.io/docs/concepts/storage/volumes#hostpath
          +optional
        type: string
    type: object
  v1.ISCSIVolumeSource:
    properties:
      chapAuthDiscovery:
        description: |-
          chapAuthDiscovery defines whether support iSCSI Discovery CHAP authentication
          +optional
        type: boolean
      chapAuthSession:
        description: |-
          chapAuthSession defines whether support iSCSI Session CHAP authentication
          +optional
        type: boolean
      fsType:
        description: |-
          fsType is the filesystem type of the volume that you want to mount.
          Tip: Ensure that the filesystem type is supported by the host operating system.
          Examples: "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#iscsi
          TODO: how do we prevent errors in the filesystem from compromising the machine
          +optional
        type: string
      initiatorName:
        description: |-
          initiatorName is the custom iSCSI Initiator Name.
          If initiatorName is specified with iscsiInterface simultaneously, new iSCSI interface
          <target portal>:<volume name> will be created for the connection.
          +optional
        type: string
      iqn:
        description: iqn is the target iSCSI Qualified Name.
        type: string
      iscsiInterface:
        description: |-
          iscsiInterface is the interface Name that uses an iSCSI transport.
          Defaults to 'default' (tcp).
          +optional
          +default="default"
        type: string
      lun:
        description: lun represents iSCSI Target Lun number.
        type: integer
      portals:
        description: |-
          portals is the iSCSI Target Portal List. The portal is either an IP or ip_addr:port if the port
          is other than default (typically TCP ports 860 and 3260).
          +optional
          +listType=atomic
        items:
          type: string
        type: array
      readOnly:
        description: |-
          readOnly here will force the ReadOnly setting in VolumeMounts.
          Defaults to false.
          +optional
        type: boolean
      secretRef:
        allOf:
        - $ref: '#/definitions/v1.LocalObjectReference'
        description: |-
          secretRef is the CHAP Secret for iSCSI target and initiator authentication
          +optional
      targetPortal:
        description: |-
          targetPortal is iSCSI Target Portal. The Portal is either an IP or ip_addr:port if the port
          is other than default (typically TCP ports 860 and 3260).
        type: string
    type: object
  v1.ImageVolumeSource:
    properties:
      pullPolicy:
        description: |-
          Policy for pulling OCI objects. Possible values are:
          Always: the kubelet always attempts to pull the reference. Container creation will fail If the pull fails.
          Never: the kubelet never pulls the reference and only uses a local image or artifact. Container creation will fail if the reference isn't present.
          IfNotPresent: the kubelet pulls if the reference isn't already present on disk. Container creation will fail if the reference isn't present and the pull fails.
          Defaults to Always if :latest tag is specified, or IfNotPresent otherwise.
          +optional
        type: string
      reference:
        description: |-
          Required: Image or artifact reference to be used.
          Behaves in the same way as pod.spec.containers[*].image.
          Pull secrets will be assembled in the same way as for the container image by looking up node credentials, SA image pull secrets, and pod spec image pull secrets.
          More info: https://kubernetes.io/docs/concepts/containers/images
          This field is optional to allow higher level config management to default or override
          container images in workload controllers like Deployments and StatefulSets.
          +optional
        type: string
    type: object
  v1.JobSpec:
    properties:
      activeDeadlineSeconds:
        description: |-
          Specifies the duration in seconds relative to the startTime that the job
          may be continuously active before the system tries to terminate it; value
          must be positive integer. If a Job is suspended (at creation or through an
          update), this timer will effectively be stopped and reset when the Job is
          resumed again.
          +optional
        type: integer
      backoffLimit:
        description: |-
          Specifies the number of retries before marking this job failed.
          Defaults to 6, unless backoffLimitPerIndex (only Indexed Job) is specified.
          When backoffLimitPerIndex is specified, backoffLimit defaults to 2147483647.
          +optional
        type: integer
      backoffLimitPerIndex:
        description: |-
          Specifies the limit for the number of retries within an
          index before marking this index as failed. When enabled the number of
          failures per index is kept in the pod's
          batch.kubernetes.io/job-index-failure-count annotation. It can only
          be set when Job's completionMode=Indexed, and the Pod's restart
          policy is Never. The field is immutable.
          +optional
        type: integer
      completionMode:
        allOf:
        - $ref: '#/definitions/v1.CompletionMode'
        description: |-
          completionMode specifies how Pod completions are tracked. It can be
          `NonIndexed` (default) or `Indexed`.

          `NonIndexed` means that the Job is considered complete when there have
          been .spec.completions successfully completed Pods. Each Pod completion is
          homologous to each other.

          `Indexed` means that the Pods of a
          Job get an associated completion index from 0 to (.spec.completions - 1),
          available in the annotation batch.kubernetes.io/job-completion-index.
          The Job is considered complete when there is one successfully completed Pod
          for each index.
          When value is `Indexed`, .spec.completions must be specified and
          `.spec.parallelism` must be less than or equal to 10^5.
          In addition, The Pod name takes the form
          `$(job-name)-$(index)-$(random-string)`,
          the Pod hostname takes the form `$(job-name)-$(index)`.

          More completion modes can be added in the future.
          If the Job controller observes a mode that it doesn't recognize, which
          is possible during upgrades due to version skew, the controller
          skips updates for the Job.
          +optional
      completions:
        description: |-
          Specifies the desired number of successfully finished pods the
          job should be run with.  Setting to null means that the success of any
          pod signals the success of all pods, and allows parallelism to have any positive
          value.  Setting to 1 means that parallelism is limited to 1 and the success of that
          pod signals the success of the job.
          More info: https://kubernetes.io/docs/concepts/workloads/controllers/jobs-run-to-completion/
          +optional
        type: integer
      managedBy:
        description: |-
          ManagedBy field indicates the controller that manages a Job. The k8s Job
          controller reconciles jobs which don't have this field at all or the field
          value is the reserved string `kubernetes.io/job-controller`, but skips
          reconciling Jobs with a custom value for this field.
          The value must be a valid domain-prefixed path (e.g. acme.io/foo) -
          all characters before the first "/" must be a valid subdomain as defined
          by RFC 1123. All characters trailing the first "/" must be valid HTTP Path
          characters as defined by RFC 3986. The value cannot exceed 63 characters.
          This field is immutable.

          This field is beta-level. The job controller accepts setting the field
          when the feature gate JobManagedBy is enabled (enabled by default).
          +optional
        type: string
      manualSelector:
        description: |-
          manualSelector controls generation of pod labels and pod selectors.
          Leave `manualSelector` unset unless you are certain what you are doing.
          When false or unset, the system pick labels unique to this job
          and appends those labels to the pod template.  When true,
          the user is responsible for picking unique labels and specifying
          the selector.  Failure to pick a unique label may cause this
          and other jobs to not function correctly.  However, You may see
          `manualSelector=true` in jobs that were created with the old `extensions/v1beta1`
          API.
          More info: https://kubernetes.io/docs/concepts/workloads/controllers/jobs-run-to-completion/#specifying-your-own-pod-selector
          +optional
        type: boolean
      maxFailedIndexes:
        description: |-
          Specifies the maximal number of failed indexes before marking the Job as
          failed, when backoffLimitPerIndex is set. Once the number of failed
          indexes exceeds this number the entire Job is marked as Failed and its
          execution is terminated. When left as null the job continues execution of
          all of its indexes and is marked with the `Complete` Job condition.
          It can only be specified when backoffLimitPerIndex is set.
          It can be null or up to completions. It is required and must be
          less than or equal to 10^4 when is completions greater than 10^5.
          +optional
        type: integer
      parallelism:
        description: |-
          Specifies the maximum desired number of pods the job should
          run at any given time. The actual number of pods running in steady state will
          be less than this number when ((.spec.completions - .status.successful) < .spec.parallelism),
          i.e. when the work left to do is less than max parallelism.
          More info: https://kubernetes.io/docs/concepts/workloads/controllers/jobs-run-to-completion/
          +optional
        type: integer
      podFailurePolicy:
        allOf:
        - $ref: '#/definitions/v1.PodFailurePolicy'
        description: |-
          Specifies the policy of handling failed pods. In particular, it allows to
          specify the set of actions and conditions which need to be
          satisfied to take the associated action.
          If empty, the default behaviour applies - the counter of failed pods,
          represented by the jobs's .status.failed field, is incremented and it is
          checked against the backoffLimit. This field cannot be used in combination
          with restartPolicy=OnFailure.

          +optional
      podReplacementPolicy:
        allOf:
        - $ref: '#/definitions/v1.PodReplacementPolicy'
        description: |-
          podReplacementPolicy specifies when to create replacement Pods.
          Possible values are:
          - TerminatingOrFailed means that we recreate pods
            when they are terminating (has a metadata.deletionTimestamp) or failed.
          - Failed means to wait until a previously created Pod is fully terminated (has phase
            Failed or Succeeded) before creating a replacement Pod.

          When using podFailurePolicy, Failed is the the only allowed value.
          TerminatingOrFailed and Failed are allowed values when podFailurePolicy is not in use.
          +optional
      selector:
        allOf:
        - $ref: '#/definitions/v1.LabelSelector'
        description: |-
          A label query over pods that should match the pod count.
          Normally, the system sets this field for you.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/#label-selectors
          +optional
      successPolicy:
        allOf:
        - $ref: '#/definitions/v1.SuccessPolicy'
        description: |-
          successPolicy specifies the policy when the Job can be declared as succeeded.
          If empty, the default behavior applies - the Job is declared as succeeded
          only when the number of succeeded pods equals to the completions.
          When the field is specified, it must be immutable and works only for the Indexed Jobs.
          Once the Job meets the SuccessPolicy, the lingering pods are terminated.

          +optional
      suspend:
        description: |-
          suspend specifies whether the Job controller should create Pods or not. If
          a Job is created with suspend set to true, no Pods are created by the Job
          controller. If a Job is suspended after creation (i.e. the flag goes from
          false to true), the Job controller will delete all active Pods associated
          with this Job. Users must design their workload to gracefully handle this.
          Suspending a Job will reset the StartTime field of the Job, effectively
          resetting the ActiveDeadlineSeconds timer too. Defaults to false.

          +optional
        type: boolean
      template:
        allOf:
        - $ref: '#/definitions/v1.PodTemplateSpec'
        description: |-
          Describes the pod that will be created when executing a job.
          The only allowed template.spec.restartPolicy values are "Never" or "OnFailure".
          More info: https://kubernetes.io/docs/concepts/workloads/controllers/jobs-run-to-completion/
      ttlSecondsAfterFinished:
        description: |-
          ttlSecondsAfterFinished limits the lifetime of a Job that has finished
          execution (either Complete or Failed). If this field is set,
          ttlSecondsAfterFinished after the Job finishes, it is eligible to be
          automatically deleted. When the Job is being deleted, its lifecycle
          guarantees (e.g. finalizers) will be honored. If this field is unset,
          the Job won't be automatically deleted. If this field is set to zero,
          the Job becomes eligible to be deleted immediately after it finishes.
          +optional
        type: integer
    type: object
  v1.KeyToPath:
    properties:
      key:
        description: key is the key to project.
        type: string
      mode:
        description: |-
          mode is Optional: mode bits used to set permissions on this file.
          Must be an octal value between 0000 and 0777 or a decimal value between 0 and 511.
          YAML accepts both octal and decimal values, JSON requires decimal values for mode bits.
          If not specified, the volume defaultMode will be used.
          This might be in conflict with other options that affect the file
          mode, like fsGroup, and the result can be other mode bits set.
          +optional
        type: integer
      path:
        description: |-
          path is the relative path of the file to map the key to.
          May not be an absolute path.
          May not contain the path element '..'.
          May not start with the string '..'.
        type: string
    type: object
  v1.LabelSelector:
    properties:
      matchExpressions:
        description: |-
          matchExpressions is a list of label selector requirements. The requirements are ANDed.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.LabelSelectorRequirement'
        type: array
      matchLabels:
        additionalProperties:
          type: string
        description: |-
          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
          map is equivalent to an element of matchExpressions, whose key field is "key", the
          operator is "In", and the values array contains only "value". The requirements are ANDed.
          +optional
        type: object
    type: object
  v1.LabelSelectorRequirement:
    properties:
      key:
        description: key is the label key that the selector applies to.
        type: string
      operator:
        description: |-
          operator represents a key's relationship to a set of values.
          Valid operators are In, NotIn, Exists and DoesNotExist.
        type: string
      values:
        description: |-
          values is an array of string values. If the operator is In or NotIn,
          the values array must be non-empty. If the operator is Exists or DoesNotExist,
          the values array must be empty. This array is replaced during a strategic
          merge patch.
          +optional
          +listType=atomic
        items:
          type: string
        type: array
    type: object
  v1.Lifecycle:
    properties:
      postStart:
        allOf:
        - $ref: '#/definitions/v1.LifecycleHandler'
        description: |-
          PostStart is called immediately after a container is created. If the handler fails,
          the container is terminated and restarted according to its restart policy.
          Other management of the container blocks until the hook completes.
          More info: https://kubernetes.io/docs/concepts/containers/container-lifecycle-hooks/#container-hooks
          +optional
      preStop:
        allOf:
        - $ref: '#/definitions/v1.LifecycleHandler'
        description: |-
          PreStop is called immediately before a container is terminated due to an
          API request or management event such as liveness/startup probe failure,
          preemption, resource contention, etc. The handler is not called if the
          container crashes or exits. The Pod's termination grace period countdown begins before the
          PreStop hook is executed. Regardless of the outcome of the handler, the
          container will eventually terminate within the Pod's termination grace
          period (unless delayed by finalizers). Other management of the container blocks until the hook completes
          or until the termination grace period is reached.
          More info: https://kubernetes.io/docs/concepts/containers/container-lifecycle-hooks/#container-hooks
          +optional
      stopSignal:
        description: |-
          StopSignal defines which signal will be sent to a container when it is being stopped.
          If not specified, the default is defined by the container runtime in use.
          StopSignal can only be set for Pods with a non-empty .spec.os.name
          +optional
        type: string
    type: object
  v1.LifecycleHandler:
    properties:
      exec:
        allOf:
        - $ref: '#/definitions/v1.ExecAction'
        description: |-
          Exec specifies a command to execute in the container.
          +optional
      httpGet:
        allOf:
        - $ref: '#/definitions/v1.HTTPGetAction'
        description: |-
          HTTPGet specifies an HTTP GET request to perform.
          +optional
      sleep:
        allOf:
        - $ref: '#/definitions/v1.SleepAction'
        description: |-
          Sleep represents a duration that the container should sleep.
          +featureGate=PodLifecycleSleepAction
          +optional
      tcpSocket:
        allOf:
        - $ref: '#/definitions/v1.TCPSocketAction'
        description: |-
          Deprecated. TCPSocket is NOT supported as a LifecycleHandler and kept
          for backward compatibility. There is no validation of this field and
          lifecycle hooks will fail at runtime when it is specified.
          +optional
    type: object
  v1.ListMeta:
    properties:
      continue:
        description: |-
          continue may be set if the user set a limit on the number of items returned, and indicates that
          the server has more data available. The value is opaque and may be used to issue another request
          to the endpoint that served this list to retrieve the next set of available objects. Continuing a
          consistent list may not be possible if the server configuration has changed or more than a few
          minutes have passed. The resourceVersion field returned when using this continue value will be
          identical to the value in the first response, unless you have received this token from an error
          message.
        type: string
      remainingItemCount:
        description: |-
          remainingItemCount is the number of subsequent items in the list which are not included in this
          list response. If the list request contained label or field selectors, then the number of
          remaining items is unknown and the field will be left unset and omitted during serialization.
          If the list is complete (either because it is not chunking or because this is the last chunk),
          then there are no more remaining items and this field will be left unset and omitted during
          serialization.
          Servers older than v1.15 do not set this field.
          The intended use of the remainingItemCount is *estimating* the size of a collection. Clients
          should not rely on the remainingItemCount to be set or to be exact.
          +optional
        type: integer
      resourceVersion:
        description: |-
          String that identifies the server's internal version of this object that
          can be used by clients to determine when objects have changed.
          Value must be treated as opaque by clients and passed unmodified back to the server.
          Populated by the system.
          Read-only.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
          +optional
        type: string
      selfLink:
        description: |-
          Deprecated: selfLink is a legacy read-only field that is no longer populated by the system.
          +optional
        type: string
    type: object
  v1.LocalObjectReference:
    properties:
      name:
        description: |-
          Name of the referent.
          This field is effectively required, but due to backwards compatibility is
          allowed to be empty. Instances of this type with an empty value here are
          almost certainly wrong.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
          +optional
          +default=""
          +kubebuilder:default=""
          TODO: Drop `kubebuilder:default` when controller-gen doesn't need it https://github.com/kubernetes-sigs/kubebuilder/issues/3896.
        type: string
    type: object
  v1.ManagedFieldsEntry:
    properties:
      apiVersion:
        description: |-
          APIVersion defines the version of this resource that this field set
          applies to. The format is "group/version" just like the top-level
          APIVersion field. It is necessary to track the version of a field
          set because it cannot be automatically converted.
        type: string
      fieldsType:
        description: |-
          FieldsType is the discriminator for the different fields format and version.
          There is currently only one possible value: "FieldsV1"
        type: string
      fieldsV1:
        allOf:
        - $ref: '#/definitions/v1.FieldsV1'
        description: |-
          FieldsV1 holds the first JSON version format as described in the "FieldsV1" type.
          +optional
      manager:
        description: Manager is an identifier of the workflow managing these fields.
        type: string
      operation:
        description: |-
          Operation is the type of operation which lead to this ManagedFieldsEntry being created.
          The only valid values for this field are 'Apply' and 'Update'.
        type: string
      subresource:
        description: |-
          Subresource is the name of the subresource used to update that object, or
          empty string if the object was updated through the main resource. The
          value of this field is used to distinguish between managers, even if they
          share the same name. For example, a status update will be distinct from a
          regular update using the same manager name.
          Note that the APIVersion field is not related to the Subresource field and
          it always corresponds to the version of the main resource.
        type: string
      time:
        description: |-
          Time is the timestamp of when the ManagedFields entry was added. The
          timestamp will also be updated if a field is added, the manager
          changes any of the owned fields value or removes a field. The
          timestamp does not update when a field is removed from the entry
          because another manager took it over.
          +optional
        type: string
    type: object
  v1.MicroTime:
    properties:
      time.Time:
        type: string
    type: object
  v1.NFSVolumeSource:
    properties:
      path:
        description: |-
          path that is exported by the NFS server.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#nfs
        type: string
      readOnly:
        description: |-
          readOnly here will force the NFS export to be mounted with read-only permissions.
          Defaults to false.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#nfs
          +optional
        type: boolean
      server:
        description: |-
          server is the hostname or IP address of the NFS server.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#nfs
        type: string
    type: object
  v1.NodeAffinity:
    properties:
      preferredDuringSchedulingIgnoredDuringExecution:
        description: |-
          The scheduler will prefer to schedule pods to nodes that satisfy
          the affinity expressions specified by this field, but it may choose
          a node that violates one or more of the expressions. The node that is
          most preferred is the one with the greatest sum of weights, i.e.
          for each node that meets all of the scheduling requirements (resource
          request, requiredDuringScheduling affinity expressions, etc.),
          compute a sum by iterating through the elements of this field and adding
          "weight" to the sum if the node matches the corresponding matchExpressions; the
          node(s) with the highest sum are the most preferred.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.PreferredSchedulingTerm'
        type: array
      requiredDuringSchedulingIgnoredDuringExecution:
        allOf:
        - $ref: '#/definitions/v1.NodeSelector'
        description: |-
          If the affinity requirements specified by this field are not met at
          scheduling time, the pod will not be scheduled onto the node.
          If the affinity requirements specified by this field cease to be met
          at some point during pod execution (e.g. due to an update), the system
          may or may not try to eventually evict the pod from its node.
          +optional
    type: object
  v1.NodeSelector:
    properties:
      nodeSelectorTerms:
        description: |-
          Required. A list of node selector terms. The terms are ORed.
          +listType=atomic
        items:
          $ref: '#/definitions/v1.NodeSelectorTerm'
        type: array
    type: object
  v1.NodeSelectorRequirement:
    properties:
      key:
        description: The label key that the selector applies to.
        type: string
      operator:
        description: |-
          Represents a key's relationship to a set of values.
          Valid operators are In, NotIn, Exists, DoesNotExist. Gt, and Lt.
        type: string
      values:
        description: |-
          An array of string values. If the operator is In or NotIn,
          the values array must be non-empty. If the operator is Exists or DoesNotExist,
          the values array must be empty. If the operator is Gt or Lt, the values
          array must have a single element, which will be interpreted as an integer.
          This array is replaced during a strategic merge patch.
          +optional
          +listType=atomic
        items:
          type: string
        type: array
    type: object
  v1.NodeSelectorTerm:
    properties:
      matchExpressions:
        description: |-
          A list of node selector requirements by node's labels.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.NodeSelectorRequirement'
        type: array
      matchFields:
        description: |-
          A list of node selector requirements by node's fields.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.NodeSelectorRequirement'
        type: array
    type: object
  v1.ObjectFieldSelector:
    properties:
      apiVersion:
        description: |-
          Version of the schema the FieldPath is written in terms of, defaults to "v1".
          +optional
        type: string
      fieldPath:
        description: Path of the field to select in the specified API version.
        type: string
    type: object
  v1.ObjectMeta:
    properties:
      annotations:
        additionalProperties:
          type: string
        description: |-
          Annotations is an unstructured key value map stored with a resource that may be
          set by external tools to store and retrieve arbitrary metadata. They are not
          queryable and should be preserved when modifying objects.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations
          +optional
        type: object
      creationTimestamp:
        description: |-
          CreationTimestamp is a timestamp representing the server time when this object was
          created. It is not guaranteed to be set in happens-before order across separate operations.
          Clients may not set this value. It is represented in RFC3339 form and is in UTC.

          Populated by the system.
          Read-only.
          Null for lists.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#metadata
          +optional
        type: string
      deletionGracePeriodSeconds:
        description: |-
          Number of seconds allowed for this object to gracefully terminate before
          it will be removed from the system. Only set when deletionTimestamp is also set.
          May only be shortened.
          Read-only.
          +optional
        type: integer
      deletionTimestamp:
        description: |-
          DeletionTimestamp is RFC 3339 date and time at which this resource will be deleted. This
          field is set by the server when a graceful deletion is requested by the user, and is not
          directly settable by a client. The resource is expected to be deleted (no longer visible
          from resource lists, and not reachable by name) after the time in this field, once the
          finalizers list is empty. As long as the finalizers list contains items, deletion is blocked.
          Once the deletionTimestamp is set, this value may not be unset or be set further into the
          future, although it may be shortened or the resource may be deleted prior to this time.
          For example, a user may request that a pod is deleted in 30 seconds. The Kubelet will react
          by sending a graceful termination signal to the containers in the pod. After that 30 seconds,
          the Kubelet will send a hard termination signal (SIGKILL) to the container and after cleanup,
          remove the pod from the API. In the presence of network partitions, this object may still
          exist after this timestamp, until an administrator or automated process can determine the
          resource is fully terminated.
          If not set, graceful deletion of the object has not been requested.

          Populated by the system when a graceful deletion is requested.
          Read-only.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#metadata
          +optional
        type: string
      finalizers:
        description: |-
          Must be empty before the object is deleted from the registry. Each entry
          is an identifier for the responsible component that will remove the entry
          from the list. If the deletionTimestamp of the object is non-nil, entries
          in this list can only be removed.
          Finalizers may be processed and removed in any order.  Order is NOT enforced
          because it introduces significant risk of stuck finalizers.
          finalizers is a shared field, any actor with permission can reorder it.
          If the finalizer list is processed in order, then this can lead to a situation
          in which the component responsible for the first finalizer in the list is
          waiting for a signal (field value, external system, or other) produced by a
          component responsible for a finalizer later in the list, resulting in a deadlock.
          Without enforced ordering finalizers are free to order amongst themselves and
          are not vulnerable to ordering changes in the list.
          +optional
          +patchStrategy=merge
          +listType=set
        items:
          type: string
        type: array
      generateName:
        description: |-
          GenerateName is an optional prefix, used by the server, to generate a unique
          name ONLY IF the Name field has not been provided.
          If this field is used, the name returned to the client will be different
          than the name passed. This value will also be combined with a unique suffix.
          The provided value has the same validation rules as the Name field,
          and may be truncated by the length of the suffix required to make the value
          unique on the server.

          If this field is specified and the generated name exists, the server will return a 409.

          Applied only if Name is not specified.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#idempotency
          +optional
        type: string
      generation:
        description: |-
          A sequence number representing a specific generation of the desired state.
          Populated by the system. Read-only.
          +optional
        type: integer
      labels:
        additionalProperties:
          type: string
        description: |-
          Map of string keys and values that can be used to organize and categorize
          (scope and select) objects. May match selectors of replication controllers
          and services.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels
          +optional
        type: object
      managedFields:
        description: |-
          ManagedFields maps workflow-id and version to the set of fields
          that are managed by that workflow. This is mostly for internal
          housekeeping, and users typically shouldn't need to set or
          understand this field. A workflow can be the user's name, a
          controller's name, or the name of a specific apply path like
          "ci-cd". The set of fields is always in the version that the
          workflow used when modifying the object.

          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.ManagedFieldsEntry'
        type: array
      name:
        description: |-
          Name must be unique within a namespace. Is required when creating resources, although
          some resources may allow a client to request the generation of an appropriate name
          automatically. Name is primarily intended for creation idempotence and configuration
          definition.
          Cannot be updated.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#names
          +optional
        type: string
      namespace:
        description: |-
          Namespace defines the space within which each name must be unique. An empty namespace is
          equivalent to the "default" namespace, but "default" is the canonical representation.
          Not all objects are required to be scoped to a namespace - the value of this field for
          those objects will be empty.

          Must be a DNS_LABEL.
          Cannot be updated.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces
          +optional
        type: string
      ownerReferences:
        description: |-
          List of objects depended by this object. If ALL objects in the list have
          been deleted, this object will be garbage collected. If this object is managed by a controller,
          then an entry in this list will point to this controller, with the controller field set to true.
          There cannot be more than one managing controller.
          +optional
          +patchMergeKey=uid
          +patchStrategy=merge
          +listType=map
          +listMapKey=uid
        items:
          $ref: '#/definitions/v1.OwnerReference'
        type: array
      resourceVersion:
        description: |-
          An opaque value that represents the internal version of this object that can
          be used by clients to determine when objects have changed. May be used for optimistic
          concurrency, change detection, and the watch operation on a resource or set of resources.
          Clients must treat these values as opaque and passed unmodified back to the server.
          They may only be valid for a particular resource or set of resources.

          Populated by the system.
          Read-only.
          Value must be treated as opaque by clients and .
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
          +optional
        type: string
      selfLink:
        description: |-
          Deprecated: selfLink is a legacy read-only field that is no longer populated by the system.
          +optional
        type: string
      uid:
        description: |-
          UID is the unique in time and space value for this object. It is typically generated by
          the server on successful creation of a resource and is not allowed to change on PUT
          operations.

          Populated by the system.
          Read-only.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#uids
          +optional
        type: string
    type: object
  v1.ObjectReference:
    properties:
      apiVersion:
        description: |-
          API version of the referent.
          +optional
        type: string
      fieldPath:
        description: |-
          If referring to a piece of an object instead of an entire object, this string
          should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
          For example, if the object reference is to a container within a pod, this would take on a value like:
          "spec.containers{name}" (where "name" refers to the name of the container that triggered
          the event) or if no container name is specified "spec.containers[2]" (container with
          index 2 in this pod). This syntax is chosen only to have some well-defined way of
          referencing a part of an object.
          TODO: this design is not final and this field is subject to change in the future.
          +optional
        type: string
      kind:
        description: |-
          Kind of the referent.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
          +optional
        type: string
      name:
        description: |-
          Name of the referent.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
          +optional
        type: string
      namespace:
        description: |-
          Namespace of the referent.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
          +optional
        type: string
      resourceVersion:
        description: |-
          Specific resourceVersion to which this reference is made, if any.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
          +optional
        type: string
      uid:
        description: |-
          UID of the referent.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
          +optional
        type: string
    type: object
  v1.OwnerReference:
    properties:
      apiVersion:
        description: API version of the referent.
        type: string
      blockOwnerDeletion:
        description: |-
          If true, AND if the owner has the "foregroundDeletion" finalizer, then
          the owner cannot be deleted from the key-value store until this
          reference is removed.
          See https://kubernetes.io/docs/concepts/architecture/garbage-collection/#foreground-deletion
          for how the garbage collector interacts with this field and enforces the foreground deletion.
          Defaults to false.
          To set this field, a user needs "delete" permission of the owner,
          otherwise 422 (Unprocessable Entity) will be returned.
          +optional
        type: boolean
      controller:
        description: |-
          If true, this reference points to the managing controller.
          +optional
        type: boolean
      kind:
        description: |-
          Kind of the referent.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      name:
        description: |-
          Name of the referent.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#names
        type: string
      uid:
        description: |-
          UID of the referent.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#uids
        type: string
    type: object
  v1.PersistentVolumeClaimSpec:
    properties:
      accessModes:
        description: |-
          accessModes contains the desired access modes the volume should have.
          More info: https://kubernetes.io/docs/concepts/storage/persistent-volumes#access-modes-1
          +optional
          +listType=atomic
        items:
          type: string
        type: array
      dataSource:
        allOf:
        - $ref: '#/definitions/v1.TypedLocalObjectReference'
        description: |-
          dataSource field can be used to specify either:
          * An existing VolumeSnapshot object (snapshot.storage.k8s.io/VolumeSnapshot)
          * An existing PVC (PersistentVolumeClaim)
          If the provisioner or an external controller can support the specified data source,
          it will create a new volume based on the contents of the specified data source.
          When the AnyVolumeDataSource feature gate is enabled, dataSource contents will be copied to dataSourceRef,
          and dataSourceRef contents will be copied to dataSource when dataSourceRef.namespace is not specified.
          If the namespace is specified, then dataSourceRef will not be copied to dataSource.
          +optional
      dataSourceRef:
        allOf:
        - $ref: '#/definitions/v1.TypedObjectReference'
        description: |-
          dataSourceRef specifies the object from which to populate the volume with data, if a non-empty
          volume is desired. This may be any object from a non-empty API group (non
          core object) or a PersistentVolumeClaim object.
          When this field is specified, volume binding will only succeed if the type of
          the specified object matches some installed volume populator or dynamic
          provisioner.
          This field will replace the functionality of the dataSource field and as such
          if both fields are non-empty, they must have the same value. For backwards
          compatibility, when namespace isn't specified in dataSourceRef,
          both fields (dataSource and dataSourceRef) will be set to the same
          value automatically if one of them is empty and the other is non-empty.
          When namespace is specified in dataSourceRef,
          dataSource isn't set to the same value and must be empty.
          There are three important differences between dataSource and dataSourceRef:
          * While dataSource only allows two specific types of objects, dataSourceRef
            allows any non-core object, as well as PersistentVolumeClaim objects.
          * While dataSource ignores disallowed values (dropping them), dataSourceRef
            preserves all values, and generates an error if a disallowed value is
            specified.
          * While dataSource only allows local objects, dataSourceRef allows objects
            in any namespaces.
          (Beta) Using this field requires the AnyVolumeDataSource feature gate to be enabled.
          (Alpha) Using the namespace field of dataSourceRef requires the CrossNamespaceVolumeDataSource feature gate to be enabled.
          +optional
      resources:
        allOf:
        - $ref: '#/definitions/v1.VolumeResourceRequirements'
        description: |-
          resources represents the minimum resources the volume should have.
          If RecoverVolumeExpansionFailure feature is enabled users are allowed to specify resource requirements
          that are lower than previous value but must still be higher than capacity recorded in the
          status field of the claim.
          More info: https://kubernetes.io/docs/concepts/storage/persistent-volumes#resources
          +optional
      selector:
        allOf:
        - $ref: '#/definitions/v1.LabelSelector'
        description: |-
          selector is a label query over volumes to consider for binding.
          +optional
      storageClassName:
        description: |-
          storageClassName is the name of the StorageClass required by the claim.
          More info: https://kubernetes.io/docs/concepts/storage/persistent-volumes#class-1
          +optional
        type: string
      volumeAttributesClassName:
        description: |-
          volumeAttributesClassName may be used to set the VolumeAttributesClass used by this claim.
          If specified, the CSI driver will create or update the volume with the attributes defined
          in the corresponding VolumeAttributesClass. This has a different purpose than storageClassName,
          it can be changed after the claim is created. An empty string or nil value indicates that no
          VolumeAttributesClass will be applied to the claim. If the claim enters an Infeasible error state,
          this field can be reset to its previous value (including nil) to cancel the modification.
          If the resource referred to by volumeAttributesClass does not exist, this PersistentVolumeClaim will be
          set to a Pending state, as reflected by the modifyVolumeStatus field, until such as a resource
          exists.
          More info: https://kubernetes.io/docs/concepts/storage/volume-attributes-classes/
          +featureGate=VolumeAttributesClass
          +optional
        type: string
      volumeMode:
        description: |-
          volumeMode defines what type of volume is required by the claim.
          Value of Filesystem is implied when not included in claim spec.
          +optional
        type: string
      volumeName:
        description: |-
          volumeName is the binding reference to the PersistentVolume backing this claim.
          +optional
        type: string
    type: object
  v1.PersistentVolumeClaimTemplate:
    properties:
      metadata:
        allOf:
        - $ref: '#/definitions/v1.ObjectMeta'
        description: |-
          May contain labels and annotations that will be copied into the PVC
          when creating it. No other fields are allowed and will be rejected during
          validation.

          +optional
      spec:
        allOf:
        - $ref: '#/definitions/v1.PersistentVolumeClaimSpec'
        description: |-
          The specification for the PersistentVolumeClaim. The entire content is
          copied unchanged into the PVC that gets created from this
          template. The same fields as in a PersistentVolumeClaim
          are also valid here.
    type: object
  v1.PersistentVolumeClaimVolumeSource:
    properties:
      claimName:
        description: |-
          claimName is the name of a PersistentVolumeClaim in the same namespace as the pod using this volume.
          More info: https://kubernetes.io/docs/concepts/storage/persistent-volumes#persistentvolumeclaims
        type: string
      readOnly:
        description: |-
          readOnly Will force the ReadOnly setting in VolumeMounts.
          Default false.
          +optional
        type: boolean
    type: object
  v1.PhotonPersistentDiskVolumeSource:
    properties:
      fsType:
        description: |-
          fsType is the filesystem type to mount.
          Must be a filesystem type supported by the host operating system.
          Ex. "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
        type: string
      pdID:
        description: pdID is the ID that identifies Photon Controller persistent disk
        type: string
    type: object
  v1.PodAffinity:
    properties:
      preferredDuringSchedulingIgnoredDuringExecution:
        description: |-
          The scheduler will prefer to schedule pods to nodes that satisfy
          the affinity expressions specified by this field, but it may choose
          a node that violates one or more of the expressions. The node that is
          most preferred is the one with the greatest sum of weights, i.e.
          for each node that meets all of the scheduling requirements (resource
          request, requiredDuringScheduling affinity expressions, etc.),
          compute a sum by iterating through the elements of this field and adding
          "weight" to the sum if the node has pods which matches the corresponding podAffinityTerm; the
          node(s) with the highest sum are the most preferred.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.WeightedPodAffinityTerm'
        type: array
      requiredDuringSchedulingIgnoredDuringExecution:
        description: |-
          If the affinity requirements specified by this field are not met at
          scheduling time, the pod will not be scheduled onto the node.
          If the affinity requirements specified by this field cease to be met
          at some point during pod execution (e.g. due to a pod label update), the
          system may or may not try to eventually evict the pod from its node.
          When there are multiple elements, the lists of nodes corresponding to each
          podAffinityTerm are intersected, i.e. all terms must be satisfied.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.PodAffinityTerm'
        type: array
    type: object
  v1.PodAffinityTerm:
    properties:
      labelSelector:
        allOf:
        - $ref: '#/definitions/v1.LabelSelector'
        description: |-
          A label query over a set of resources, in this case pods.
          If it's null, this PodAffinityTerm matches with no Pods.
          +optional
      matchLabelKeys:
        description: |-
          MatchLabelKeys is a set of pod label keys to select which pods will
          be taken into consideration. The keys are used to lookup values from the
          incoming pod labels, those key-value labels are merged with `labelSelector` as `key in (value)`
          to select the group of existing pods which pods will be taken into consideration
          for the incoming pod's pod (anti) affinity. Keys that don't exist in the incoming
          pod labels will be ignored. The default value is empty.
          The same key is forbidden to exist in both matchLabelKeys and labelSelector.
          Also, matchLabelKeys cannot be set when labelSelector isn't set.

          +listType=atomic
          +optional
        items:
          type: string
        type: array
      mismatchLabelKeys:
        description: |-
          MismatchLabelKeys is a set of pod label keys to select which pods will
          be taken into consideration. The keys are used to lookup values from the
          incoming pod labels, those key-value labels are merged with `labelSelector` as `key notin (value)`
          to select the group of existing pods which pods will be taken into consideration
          for the incoming pod's pod (anti) affinity. Keys that don't exist in the incoming
          pod labels will be ignored. The default value is empty.
          The same key is forbidden to exist in both mismatchLabelKeys and labelSelector.
          Also, mismatchLabelKeys cannot be set when labelSelector isn't set.

          +listType=atomic
          +optional
        items:
          type: string
        type: array
      namespaceSelector:
        allOf:
        - $ref: '#/definitions/v1.LabelSelector'
        description: |-
          A label query over the set of namespaces that the term applies to.
          The term is applied to the union of the namespaces selected by this field
          and the ones listed in the namespaces field.
          null selector and null or empty namespaces list means "this pod's namespace".
          An empty selector ({}) matches all namespaces.
          +optional
      namespaces:
        description: |-
          namespaces specifies a static list of namespace names that the term applies to.
          The term is applied to the union of the namespaces listed in this field
          and the ones selected by namespaceSelector.
          null or empty namespaces list and null namespaceSelector means "this pod's namespace".
          +optional
          +listType=atomic
        items:
          type: string
        type: array
      topologyKey:
        description: |-
          This pod should be co-located (affinity) or not co-located (anti-affinity) with the pods matching
          the labelSelector in the specified namespaces, where co-located is defined as running on a node
          whose value of the label with key topologyKey matches that of any node on which any of the
          selected pods is running.
          Empty topologyKey is not allowed.
        type: string
    type: object
  v1.PodAntiAffinity:
    properties:
      preferredDuringSchedulingIgnoredDuringExecution:
        description: |-
          The scheduler will prefer to schedule pods to nodes that satisfy
          the anti-affinity expressions specified by this field, but it may choose
          a node that violates one or more of the expressions. The node that is
          most preferred is the one with the greatest sum of weights, i.e.
          for each node that meets all of the scheduling requirements (resource
          request, requiredDuringScheduling anti-affinity expressions, etc.),
          compute a sum by iterating through the elements of this field and subtracting
          "weight" from the sum if the node has pods which matches the corresponding podAffinityTerm; the
          node(s) with the highest sum are the most preferred.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.WeightedPodAffinityTerm'
        type: array
      requiredDuringSchedulingIgnoredDuringExecution:
        description: |-
          If the anti-affinity requirements specified by this field are not met at
          scheduling time, the pod will not be scheduled onto the node.
          If the anti-affinity requirements specified by this field cease to be met
          at some point during pod execution (e.g. due to a pod label update), the
          system may or may not try to eventually evict the pod from its node.
          When there are multiple elements, the lists of nodes corresponding to each
          podAffinityTerm are intersected, i.e. all terms must be satisfied.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.PodAffinityTerm'
        type: array
    type: object
  v1.PodCertificateProjection:
    properties:
      certificateChainPath:
        description: |-
          Write the certificate chain at this path in the projected volume.

          Most applications should use credentialBundlePath.  When using keyPath
          and certificateChainPath, your application needs to check that the key
          and leaf certificate are consistent, because it is possible to read the
          files mid-rotation.

          +optional
        type: string
      credentialBundlePath:
        description: |-
          Write the credential bundle at this path in the projected volume.

          The credential bundle is a single file that contains multiple PEM blocks.
          The first PEM block is a PRIVATE KEY block, containing a PKCS#8 private
          key.

          The remaining blocks are CERTIFICATE blocks, containing the issued
          certificate chain from the signer (leaf and any intermediates).

          Using credentialBundlePath lets your Pod's application code make a single
          atomic read that retrieves a consistent key and certificate chain.  If you
          project them to separate files, your application code will need to
          additionally check that the leaf certificate was issued to the key.

          +optional
        type: string
      keyPath:
        description: |-
          Write the key at this path in the projected volume.

          Most applications should use credentialBundlePath.  When using keyPath
          and certificateChainPath, your application needs to check that the key
          and leaf certificate are consistent, because it is possible to read the
          files mid-rotation.

          +optional
        type: string
      keyType:
        description: |-
          The type of keypair Kubelet will generate for the pod.

          Valid values are "RSA3072", "RSA4096", "ECDSAP256", "ECDSAP384",
          "ECDSAP521", and "ED25519".

          +required
        type: string
      maxExpirationSeconds:
        description: |-
          maxExpirationSeconds is the maximum lifetime permitted for the
          certificate.

          Kubelet copies this value verbatim into the PodCertificateRequests it
          generates for this projection.

          If omitted, kube-apiserver will set it to 86400(24 hours). kube-apiserver
          will reject values shorter than 3600 (1 hour).  The maximum allowable
          value is 7862400 (91 days).

          The signer implementation is then free to issue a certificate with any
          lifetime *shorter* than MaxExpirationSeconds, but no shorter than 3600
          seconds (1 hour).  This constraint is enforced by kube-apiserver.
          `kubernetes.io` signers will never issue certificates with a lifetime
          longer than 24 hours.

          +optional
        type: integer
      signerName:
        description: |-
          Kubelet's generated CSRs will be addressed to this signer.

          +required
        type: string
    type: object
  v1.PodDNSConfig:
    properties:
      nameservers:
        description: |-
          A list of DNS name server IP addresses.
          This will be appended to the base nameservers generated from DNSPolicy.
          Duplicated nameservers will be removed.
          +optional
          +listType=atomic
        items:
          type: string
        type: array
      options:
        description: |-
          A list of DNS resolver options.
          This will be merged with the base options generated from DNSPolicy.
          Duplicated entries will be removed. Resolution options given in Options
          will override those that appear in the base DNSPolicy.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.PodDNSConfigOption'
        type: array
      searches:
        description: |-
          A list of DNS search domains for host-name lookup.
          This will be appended to the base search paths generated from DNSPolicy.
          Duplicated search paths will be removed.
          +optional
          +listType=atomic
        items:
          type: string
        type: array
    type: object
  v1.PodDNSConfigOption:
    properties:
      name:
        description: |-
          Name is this DNS resolver option's name.
          Required.
        type: string
      value:
        description: |-
          Value is this DNS resolver option's value.
          +optional
        type: string
    type: object
  v1.PodFailurePolicy:
    properties:
      rules:
        description: |-
          A list of pod failure policy rules. The rules are evaluated in order.
          Once a rule matches a Pod failure, the remaining of the rules are ignored.
          When no rule matches the Pod failure, the default handling applies - the
          counter of pod failures is incremented and it is checked against
          the backoffLimit. At most 20 elements are allowed.
          +listType=atomic
        items:
          $ref: '#/definitions/v1.PodFailurePolicyRule'
        type: array
    type: object
  v1.PodFailurePolicyAction:
    enum:
    - FailJob
    - FailIndex
    - Ignore
    - Count
    type: string
    x-enum-varnames:
    - PodFailurePolicyActionFailJob
    - PodFailurePolicyActionFailIndex
    - PodFailurePolicyActionIgnore
    - PodFailurePolicyActionCount
  v1.PodFailurePolicyOnExitCodesOperator:
    enum:
    - In
    - NotIn
    type: string
    x-enum-varnames:
    - PodFailurePolicyOnExitCodesOpIn
    - PodFailurePolicyOnExitCodesOpNotIn
  v1.PodFailurePolicyOnExitCodesRequirement:
    properties:
      containerName:
        description: |-
          Restricts the check for exit codes to the container with the
          specified name. When null, the rule applies to all containers.
          When specified, it should match one the container or initContainer
          names in the pod template.
          +optional
        type: string
      operator:
        allOf:
        - $ref: '#/definitions/v1.PodFailurePolicyOnExitCodesOperator'
        description: |-
          Represents the relationship between the container exit code(s) and the
          specified values. Containers completed with success (exit code 0) are
          excluded from the requirement check. Possible values are:

          - In: the requirement is satisfied if at least one container exit code
            (might be multiple if there are multiple containers not restricted
            by the 'containerName' field) is in the set of specified values.
          - NotIn: the requirement is satisfied if at least one container exit code
            (might be multiple if there are multiple containers not restricted
            by the 'containerName' field) is not in the set of specified values.
          Additional values are considered to be added in the future. Clients should
          react to an unknown operator by assuming the requirement is not satisfied.
      values:
        description: |-
          Specifies the set of values. Each returned container exit code (might be
          multiple in case of multiple containers) is checked against this set of
          values with respect to the operator. The list of values must be ordered
          and must not contain duplicates. Value '0' cannot be used for the In operator.
          At least one element is required. At most 255 elements are allowed.
          +listType=set
        items:
          type: integer
        type: array
    type: object
  v1.PodFailurePolicyOnPodConditionsPattern:
    properties:
      status:
        description: |-
          Specifies the required Pod condition status. To match a pod condition
          it is required that the specified status equals the pod condition status.
          Defaults to True.
        type: string
      type:
        description: |-
          Specifies the required Pod condition type. To match a pod condition
          it is required that specified type equals the pod condition type.
        type: string
    type: object
  v1.PodFailurePolicyRule:
    properties:
      action:
        allOf:
        - $ref: '#/definitions/v1.PodFailurePolicyAction'
        description: |-
          Specifies the action taken on a pod failure when the requirements are satisfied.
          Possible values are:

          - FailJob: indicates that the pod's job is marked as Failed and all
            running pods are terminated.
          - FailIndex: indicates that the pod's index is marked as Failed and will
            not be restarted.
          - Ignore: indicates that the counter towards the .backoffLimit is not
            incremented and a replacement pod is created.
          - Count: indicates that the pod is handled in the default way - the
            counter towards the .backoffLimit is incremented.
          Additional values are considered to be added in the future. Clients should
          react to an unknown action by skipping the rule.
      onExitCodes:
        allOf:
        - $ref: '#/definitions/v1.PodFailurePolicyOnExitCodesRequirement'
        description: |-
          Represents the requirement on the container exit codes.
          +optional
      onPodConditions:
        description: |-
          Represents the requirement on the pod conditions. The requirement is represented
          as a list of pod condition patterns. The requirement is satisfied if at
          least one pattern matches an actual pod condition. At most 20 elements are allowed.
          +listType=atomic
          +optional
        items:
          $ref: '#/definitions/v1.PodFailurePolicyOnPodConditionsPattern'
        type: array
    type: object
  v1.PodOS:
    properties:
      name:
        description: |-
          Name is the name of the operating system. The currently supported values are linux and windows.
          Additional value may be defined in future and can be one of:
          https://github.com/opencontainers/runtime-spec/blob/master/config.md#platform-specific-configuration
          Clients should expect to handle additional values and treat unrecognized values in this field as os: null
        type: string
    type: object
  v1.PodReadinessGate:
    properties:
      conditionType:
        description: ConditionType refers to a condition in the pod's condition list
          with matching type.
        type: string
    type: object
  v1.PodReplacementPolicy:
    enum:
    - TerminatingOrFailed
    - Failed
    type: string
    x-enum-varnames:
    - TerminatingOrFailed
    - Failed
  v1.PodResourceClaim:
    properties:
      name:
        description: |-
          Name uniquely identifies this resource claim inside the pod.
          This must be a DNS_LABEL.
        type: string
      resourceClaimName:
        description: |-
          ResourceClaimName is the name of a ResourceClaim object in the same
          namespace as this pod.

          Exactly one of ResourceClaimName and ResourceClaimTemplateName must
          be set.
        type: string
      resourceClaimTemplateName:
        description: |-
          ResourceClaimTemplateName is the name of a ResourceClaimTemplate
          object in the same namespace as this pod.

          The template will be used to create a new ResourceClaim, which will
          be bound to this pod. When this pod is deleted, the ResourceClaim
          will also be deleted. The pod name and resource name, along with a
          generated component, will be used to form a unique name for the
          ResourceClaim, which will be recorded in pod.status.resourceClaimStatuses.

          This field is immutable and no changes will be made to the
          corresponding ResourceClaim by the control plane after creating the
          ResourceClaim.

          Exactly one of ResourceClaimName and ResourceClaimTemplateName must
          be set.
        type: string
    type: object
  v1.PodSchedulingGate:
    properties:
      name:
        description: |-
          Name of the scheduling gate.
          Each scheduling gate must have a unique name field.
        type: string
    type: object
  v1.PodSecurityContext:
    properties:
      appArmorProfile:
        allOf:
        - $ref: '#/definitions/v1.AppArmorProfile'
        description: |-
          appArmorProfile is the AppArmor options to use by the containers in this pod.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      fsGroup:
        description: |-
          A special supplemental group that applies to all containers in a pod.
          Some volume types allow the Kubelet to change the ownership of that volume
          to be owned by the pod:

          1. The owning GID will be the FSGroup
          2. The setgid bit is set (new files created in the volume will be owned by FSGroup)
          3. The permission bits are OR'd with rw-rw----

          If unset, the Kubelet will not modify the ownership and permissions of any volume.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: integer
      fsGroupChangePolicy:
        description: |-
          fsGroupChangePolicy defines behavior of changing ownership and permission of the volume
          before being exposed inside Pod. This field will only apply to
          volume types which support fsGroup based ownership(and permissions).
          It will have no effect on ephemeral volume types such as: secret, configmaps
          and emptydir.
          Valid values are "OnRootMismatch" and "Always". If not specified, "Always" is used.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: string
      runAsGroup:
        description: |-
          The GID to run the entrypoint of the container process.
          Uses runtime default if unset.
          May also be set in SecurityContext.  If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence
          for that container.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: integer
      runAsNonRoot:
        description: |-
          Indicates that the container must run as a non-root user.
          If true, the Kubelet will validate the image at runtime to ensure that it
          does not run as UID 0 (root) and fail to start the container if it does.
          If unset or false, no such validation will be performed.
          May also be set in SecurityContext.  If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence.
          +optional
        type: boolean
      runAsUser:
        description: |-
          The UID to run the entrypoint of the container process.
          Defaults to user specified in image metadata if unspecified.
          May also be set in SecurityContext.  If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence
          for that container.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: integer
      seLinuxChangePolicy:
        description: |-
          seLinuxChangePolicy defines how the container's SELinux label is applied to all volumes used by the Pod.
          It has no effect on nodes that do not support SELinux or to volumes does not support SELinux.
          Valid values are "MountOption" and "Recursive".

          "Recursive" means relabeling of all files on all Pod volumes by the container runtime.
          This may be slow for large volumes, but allows mixing privileged and unprivileged Pods sharing the same volume on the same node.

          "MountOption" mounts all eligible Pod volumes with `-o context` mount option.
          This requires all Pods that share the same volume to use the same SELinux label.
          It is not possible to share the same volume among privileged and unprivileged Pods.
          Eligible volumes are in-tree FibreChannel and iSCSI volumes, and all CSI volumes
          whose CSI driver announces SELinux support by setting spec.seLinuxMount: true in their
          CSIDriver instance. Other volumes are always re-labelled recursively.
          "MountOption" value is allowed only when SELinuxMount feature gate is enabled.

          If not specified and SELinuxMount feature gate is enabled, "MountOption" is used.
          If not specified and SELinuxMount feature gate is disabled, "MountOption" is used for ReadWriteOncePod volumes
          and "Recursive" for all other volumes.

          This field affects only Pods that have SELinux label set, either in PodSecurityContext or in SecurityContext of all containers.

          All Pods that use the same volume should use the same seLinuxChangePolicy, otherwise some pods can get stuck in ContainerCreating state.
          Note that this field cannot be set when spec.os.name is windows.
          +featureGate=SELinuxChangePolicy
          +optional
        type: string
      seLinuxOptions:
        allOf:
        - $ref: '#/definitions/v1.SELinuxOptions'
        description: |-
          The SELinux context to be applied to all containers.
          If unspecified, the container runtime will allocate a random SELinux context for each
          container.  May also be set in SecurityContext.  If set in
          both SecurityContext and PodSecurityContext, the value specified in SecurityContext
          takes precedence for that container.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      seccompProfile:
        allOf:
        - $ref: '#/definitions/v1.SeccompProfile'
        description: |-
          The seccomp options to use by the containers in this pod.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      supplementalGroups:
        description: |-
          A list of groups applied to the first process run in each container, in
          addition to the container's primary GID and fsGroup (if specified).  If
          the SupplementalGroupsPolicy feature is enabled, the
          supplementalGroupsPolicy field determines whether these are in addition
          to or instead of any group memberships defined in the container image.
          If unspecified, no additional groups are added, though group memberships
          defined in the container image may still be used, depending on the
          supplementalGroupsPolicy field.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
          +listType=atomic
        items:
          type: integer
        type: array
      supplementalGroupsPolicy:
        description: |-
          Defines how supplemental groups of the first container processes are calculated.
          Valid values are "Merge" and "Strict". If not specified, "Merge" is used.
          (Alpha) Using the field requires the SupplementalGroupsPolicy feature gate to be enabled
          and the container runtime must implement support for this feature.
          Note that this field cannot be set when spec.os.name is windows.
          TODO: update the default value to "Merge" when spec.os.name is not windows in v1.34
          +featureGate=SupplementalGroupsPolicy
          +optional
        type: string
      sysctls:
        description: |-
          Sysctls hold a list of namespaced sysctls used for the pod. Pods with unsupported
          sysctls (by the container runtime) might fail to launch.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.Sysctl'
        type: array
      windowsOptions:
        allOf:
        - $ref: '#/definitions/v1.WindowsSecurityContextOptions'
        description: |-
          The Windows specific settings applied to all containers.
          If unspecified, the options within a container's SecurityContext will be used.
          If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
          Note that this field cannot be set when spec.os.name is linux.
          +optional
    type: object
  v1.PodSpec:
    properties:
      activeDeadlineSeconds:
        description: |-
          Optional duration in seconds the pod may be active on the node relative to
          StartTime before the system will actively try to mark it failed and kill associated containers.
          Value must be a positive integer.
          +optional
        type: integer
      affinity:
        allOf:
        - $ref: '#/definitions/v1.Affinity'
        description: |-
          If specified, the pod's scheduling constraints
          +optional
      automountServiceAccountToken:
        description: |-
          AutomountServiceAccountToken indicates whether a service account token should be automatically mounted.
          +optional
        type: boolean
      containers:
        description: |-
          List of containers belonging to the pod.
          Containers cannot currently be added or removed.
          There must be at least one container in a Pod.
          Cannot be updated.
          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
        items:
          $ref: '#/definitions/v1.Container'
        type: array
      dnsConfig:
        allOf:
        - $ref: '#/definitions/v1.PodDNSConfig'
        description: |-
          Specifies the DNS parameters of a pod.
          Parameters specified here will be merged to the generated DNS
          configuration based on DNSPolicy.
          +optional
      dnsPolicy:
        description: |-
          Set DNS policy for the pod.
          Defaults to "ClusterFirst".
          Valid values are 'ClusterFirstWithHostNet', 'ClusterFirst', 'Default' or 'None'.
          DNS parameters given in DNSConfig will be merged with the policy selected with DNSPolicy.
          To have DNS options set along with hostNetwork, you have to specify DNS policy
          explicitly to 'ClusterFirstWithHostNet'.
          +optional
        type: string
      enableServiceLinks:
        description: |-
          EnableServiceLinks indicates whether information about services should be injected into pod's
          environment variables, matching the syntax of Docker links.
          Optional: Defaults to true.
          +optional
        type: boolean
      ephemeralContainers:
        description: |-
          List of ephemeral containers run in this pod. Ephemeral containers may be run in an existing
          pod to perform user-initiated actions such as debugging. This list cannot be specified when
          creating a pod, and it cannot be modified by updating the pod spec. In order to add an
          ephemeral container to an existing pod, use the pod's ephemeralcontainers subresource.
          +optional
          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
        items:
          $ref: '#/definitions/v1.EphemeralContainer'
        type: array
      hostAliases:
        description: |-
          HostAliases is an optional list of hosts and IPs that will be injected into the pod's hosts
          file if specified.
          +optional
          +patchMergeKey=ip
          +patchStrategy=merge
          +listType=map
          +listMapKey=ip
        items:
          $ref: '#/definitions/v1.HostAlias'
        type: array
      hostIPC:
        description: |-
          Use the host's ipc namespace.
          Optional: Default to false.
          +k8s:conversion-gen=false
          +optional
        type: boolean
      hostNetwork:
        description: |-
          Host networking requested for this pod. Use the host's network namespace.
          When using HostNetwork you should specify ports so the scheduler is aware.
          When `hostNetwork` is true, specified `hostPort` fields in port definitions must match `containerPort`,
          and unspecified `hostPort` fields in port definitions are defaulted to match `containerPort`.
          Default to false.
          +k8s:conversion-gen=false
          +optional
        type: boolean
      hostPID:
        description: |-
          Use the host's pid namespace.
          Optional: Default to false.
          +k8s:conversion-gen=false
          +optional
        type: boolean
      hostUsers:
        description: |-
          Use the host's user namespace.
          Optional: Default to true.
          If set to true or not present, the pod will be run in the host user namespace, useful
          for when the pod needs a feature only available to the host user namespace, such as
          loading a kernel module with CAP_SYS_MODULE.
          When set to false, a new userns is created for the pod. Setting false is useful for
          mitigating container breakout vulnerabilities even allowing users to run their
          containers as root without actually having root privileges on the host.
          This field is alpha-level and is only honored by servers that enable the UserNamespacesSupport feature.
          +k8s:conversion-gen=false
          +optional
        type: boolean
      hostname:
        description: |-
          Specifies the hostname of the Pod
          If not specified, the pod's hostname will be set to a system-defined value.
          +optional
        type: string
      hostnameOverride:
        description: |-
          HostnameOverride specifies an explicit override for the pod's hostname as perceived by the pod.
          This field only specifies the pod's hostname and does not affect its DNS records.
          When this field is set to a non-empty string:
          - It takes precedence over the values set in `hostname` and `subdomain`.
          - The Pod's hostname will be set to this value.
          - `setHostnameAsFQDN` must be nil or set to false.
          - `hostNetwork` must be set to false.

          This field must be a valid DNS subdomain as defined in RFC 1123 and contain at most 64 characters.
          Requires the HostnameOverride feature gate to be enabled.

          +featureGate=HostnameOverride
          +optional
        type: string
      imagePullSecrets:
        description: |-
          ImagePullSecrets is an optional list of references to secrets in the same namespace to use for pulling any of the images used by this PodSpec.
          If specified, these secrets will be passed to individual puller implementations for them to use.
          More info: https://kubernetes.io/docs/concepts/containers/images#specifying-imagepullsecrets-on-a-pod
          +optional
          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
        items:
          $ref: '#/definitions/v1.LocalObjectReference'
        type: array
      initContainers:
        description: |-
          List of initialization containers belonging to the pod.
          Init containers are executed in order prior to containers being started. If any
          init container fails, the pod is considered to have failed and is handled according
          to its restartPolicy. The name for an init container or normal container must be
          unique among all containers.
          Init containers may not have Lifecycle actions, Readiness probes, Liveness probes, or Startup probes.
          The resourceRequirements of an init container are taken into account during scheduling
          by finding the highest request/limit for each resource type, and then using the max of
          that value or the sum of the normal containers. Limits are applied to init containers
          in a similar fashion.
          Init containers cannot currently be added or removed.
          Cannot be updated.
          More info: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
        items:
          $ref: '#/definitions/v1.Container'
        type: array
      nodeName:
        description: |-
          NodeName indicates in which node this pod is scheduled.
          If empty, this pod is a candidate for scheduling by the scheduler defined in schedulerName.
          Once this field is set, the kubelet for this node becomes responsible for the lifecycle of this pod.
          This field should not be used to express a desire for the pod to be scheduled on a specific node.
          https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodename
          +optional
        type: string
      nodeSelector:
        additionalProperties:
          type: string
        description: |-
          NodeSelector is a selector which must be true for the pod to fit on a node.
          Selector which must match a node's labels for the pod to be scheduled on that node.
          More info: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/
          +optional
          +mapType=atomic
        type: object
      os:
        allOf:
        - $ref: '#/definitions/v1.PodOS'
        description: |-
          Specifies the OS of the containers in the pod.
          Some pod and container fields are restricted if this is set.

          If the OS field is set to linux, the following fields must be unset:
          -securityContext.windowsOptions

          If the OS field is set to windows, following fields must be unset:
          - spec.hostPID
          - spec.hostIPC
          - spec.hostUsers
          - spec.resources
          - spec.securityContext.appArmorProfile
          - spec.securityContext.seLinuxOptions
          - spec.securityContext.seccompProfile
          - spec.securityContext.fsGroup
          - spec.securityContext.fsGroupChangePolicy
          - spec.securityContext.sysctls
          - spec.shareProcessNamespace
          - spec.securityContext.runAsUser
          - spec.securityContext.runAsGroup
          - spec.securityContext.supplementalGroups
          - spec.securityContext.supplementalGroupsPolicy
          - spec.containers[*].securityContext.appArmorProfile
          - spec.containers[*].securityContext.seLinuxOptions
          - spec.containers[*].securityContext.seccompProfile
          - spec.containers[*].securityContext.capabilities
          - spec.containers[*].securityContext.readOnlyRootFilesystem
          - spec.containers[*].securityContext.privileged
          - spec.containers[*].securityContext.allowPrivilegeEscalation
          - spec.containers[*].securityContext.procMount
          - spec.containers[*].securityContext.runAsUser
          - spec.containers[*].securityContext.runAsGroup
          +optional
      overhead:
        allOf:
        - $ref: '#/definitions/v1.ResourceList'
        description: |-
          Overhead represents the resource overhead associated with running a pod for a given RuntimeClass.
          This field will be autopopulated at admission time by the RuntimeClass admission controller. If
          the RuntimeClass admission controller is enabled, overhead must not be set in Pod create requests.
          The RuntimeClass admission controller will reject Pod create requests which have the overhead already
          set. If RuntimeClass is configured and selected in the PodSpec, Overhead will be set to the value
          defined in the corresponding RuntimeClass, otherwise it will remain unset and treated as zero.
          More info: https://git.k8s.io/enhancements/keps/sig-node/688-pod-overhead/README.md
          +optional
      preemptionPolicy:
        description: |-
          PreemptionPolicy is the Policy for preempting pods with lower priority.
          One of Never, PreemptLowerPriority.
          Defaults to PreemptLowerPriority if unset.
          +optional
        type: string
      priority:
        description: |-
          The priority value. Various system components use this field to find the
          priority of the pod. When Priority Admission Controller is enabled, it
          prevents users from setting this field. The admission controller populates
          this field from PriorityClassName.
          The higher the value, the higher the priority.
          +optional
        type: integer
      priorityClassName:
        description: |-
          If specified, indicates the pod's priority. "system-node-critical" and
          "system-cluster-critical" are two special keywords which indicate the
          highest priorities with the former being the highest priority. Any other
          name must be defined by creating a PriorityClass object with that name.
          If not specified, the pod priority will be default or zero if there is no
          default.
          +optional
        type: string
      readinessGates:
        description: |-
          If specified, all readiness gates will be evaluated for pod readiness.
          A pod is ready when all its containers are ready AND
          all conditions specified in the readiness gates have status equal to "True"
          More info: https://git.k8s.io/enhancements/keps/sig-network/580-pod-readiness-gates
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.PodReadinessGate'
        type: array
      resourceClaims:
        description: |-
          ResourceClaims defines which ResourceClaims must be allocated
          and reserved before the Pod is allowed to start. The resources
          will be made available to those containers which consume them
          by name.

          This is an alpha field and requires enabling the
          DynamicResourceAllocation feature gate.

          This field is immutable.

          +patchMergeKey=name
          +patchStrategy=merge,retainKeys
          +listType=map
          +listMapKey=name
          +featureGate=DynamicResourceAllocation
          +optional
        items:
          $ref: '#/definitions/v1.PodResourceClaim'
        type: array
      resources:
        allOf:
        - $ref: '#/definitions/v1.ResourceRequirements'
        description: |-
          Resources is the total amount of CPU and Memory resources required by all
          containers in the pod. It supports specifying Requests and Limits for
          "cpu", "memory" and "hugepages-" resource names only. ResourceClaims are not supported.

          This field enables fine-grained control over resource allocation for the
          entire pod, allowing resource sharing among containers in a pod.
          TODO: For beta graduation, expand this comment with a detailed explanation.

          This is an alpha field and requires enabling the PodLevelResources feature
          gate.

          +featureGate=PodLevelResources
          +optional
      restartPolicy:
        description: |-
          Restart policy for all containers within the pod.
          One of Always, OnFailure, Never. In some contexts, only a subset of those values may be permitted.
          Default to Always.
          More info: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#restart-policy
          +optional
        type: string
      runtimeClassName:
        description: |-
          RuntimeClassName refers to a RuntimeClass object in the node.k8s.io group, which should be used
          to run this pod.  If no RuntimeClass resource matches the named class, the pod will not be run.
          If unset or empty, the "legacy" RuntimeClass will be used, which is an implicit class with an
          empty definition that uses the default runtime handler.
          More info: https://git.k8s.io/enhancements/keps/sig-node/585-runtime-class
          +optional
        type: string
      schedulerName:
        description: |-
          If specified, the pod will be dispatched by specified scheduler.
          If not specified, the pod will be dispatched by default scheduler.
          +optional
        type: string
      schedulingGates:
        description: |-
          SchedulingGates is an opaque list of values that if specified will block scheduling the pod.
          If schedulingGates is not empty, the pod will stay in the SchedulingGated state and the
          scheduler will not attempt to schedule the pod.

          SchedulingGates can only be set at pod creation time, and be removed only afterwards.

          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
          +optional
        items:
          $ref: '#/definitions/v1.PodSchedulingGate'
        type: array
      securityContext:
        allOf:
        - $ref: '#/definitions/v1.PodSecurityContext'
        description: |-
          SecurityContext holds pod-level security attributes and common container settings.
          Optional: Defaults to empty.  See type description for default values of each field.
          +optional
      serviceAccount:
        description: |-
          DeprecatedServiceAccount is a deprecated alias for ServiceAccountName.
          Deprecated: Use serviceAccountName instead.
          +k8s:conversion-gen=false
          +optional
        type: string
      serviceAccountName:
        description: |-
          ServiceAccountName is the name of the ServiceAccount to use to run this pod.
          More info: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
          +optional
        type: string
      setHostnameAsFQDN:
        description: |-
          If true the pod's hostname will be configured as the pod's FQDN, rather than the leaf name (the default).
          In Linux containers, this means setting the FQDN in the hostname field of the kernel (the nodename field of struct utsname).
          In Windows containers, this means setting the registry value of hostname for the registry key HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters to FQDN.
          If a pod does not have FQDN, this has no effect.
          Default to false.
          +optional
        type: boolean
      shareProcessNamespace:
        description: |-
          Share a single process namespace between all of the containers in a pod.
          When this is set containers will be able to view and signal processes from other containers
          in the same pod, and the first process in each container will not be assigned PID 1.
          HostPID and ShareProcessNamespace cannot both be set.
          Optional: Default to false.
          +k8s:conversion-gen=false
          +optional
        type: boolean
      subdomain:
        description: |-
          If specified, the fully qualified Pod hostname will be "<hostname>.<subdomain>.<pod namespace>.svc.<cluster domain>".
          If not specified, the pod will not have a domainname at all.
          +optional
        type: string
      terminationGracePeriodSeconds:
        description: |-
          Optional duration in seconds the pod needs to terminate gracefully. May be decreased in delete request.
          Value must be non-negative integer. The value zero indicates stop immediately via
          the kill signal (no opportunity to shut down).
          If this value is nil, the default grace period will be used instead.
          The grace period is the duration in seconds after the processes running in the pod are sent
          a termination signal and the time when the processes are forcibly halted with a kill signal.
          Set this value longer than the expected cleanup time for your process.
          Defaults to 30 seconds.
          +optional
        type: integer
      tolerations:
        description: |-
          If specified, the pod's tolerations.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.Toleration'
        type: array
      topologySpreadConstraints:
        description: |-
          TopologySpreadConstraints describes how a group of pods ought to spread across topology
          domains. Scheduler will schedule pods in a way which abides by the constraints.
          All topologySpreadConstraints are ANDed.
          +optional
          +patchMergeKey=topologyKey
          +patchStrategy=merge
          +listType=map
          +listMapKey=topologyKey
          +listMapKey=whenUnsatisfiable
        items:
          $ref: '#/definitions/v1.TopologySpreadConstraint'
        type: array
      volumes:
