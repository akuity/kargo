  v1.SecurityContext:
    properties:
      allowPrivilegeEscalation:
        description: |-
          AllowPrivilegeEscalation controls whether a process can gain more
          privileges than its parent process. This bool directly controls if
          the no_new_privs flag will be set on the container process.
          AllowPrivilegeEscalation is true always when the container is:
          1) run as Privileged
          2) has CAP_SYS_ADMIN
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: boolean
      appArmorProfile:
        allOf:
        - $ref: '#/definitions/v1.AppArmorProfile'
        description: |-
          appArmorProfile is the AppArmor options to use by this container. If set, this profile
          overrides the pod's appArmorProfile.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      capabilities:
        allOf:
        - $ref: '#/definitions/v1.Capabilities'
        description: |-
          The capabilities to add/drop when running containers.
          Defaults to the default set of capabilities granted by the container runtime.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      privileged:
        description: |-
          Run container in privileged mode.
          Processes in privileged containers are essentially equivalent to root on the host.
          Defaults to false.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: boolean
      procMount:
        description: |-
          procMount denotes the type of proc mount to use for the containers.
          The default value is Default which uses the container runtime defaults for
          readonly paths and masked paths.
          This requires the ProcMountType feature flag to be enabled.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: string
      readOnlyRootFilesystem:
        description: |-
          Whether this container has a read-only root filesystem.
          Default is false.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: boolean
      runAsGroup:
        description: |-
          The GID to run the entrypoint of the container process.
          Uses runtime default if unset.
          May also be set in PodSecurityContext.  If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: integer
      runAsNonRoot:
        description: |-
          Indicates that the container must run as a non-root user.
          If true, the Kubelet will validate the image at runtime to ensure that it
          does not run as UID 0 (root) and fail to start the container if it does.
          If unset or false, no such validation will be performed.
          May also be set in PodSecurityContext.  If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence.
          +optional
        type: boolean
      runAsUser:
        description: |-
          The UID to run the entrypoint of the container process.
          Defaults to user specified in image metadata if unspecified.
          May also be set in PodSecurityContext.  If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: integer
      seLinuxOptions:
        allOf:
        - $ref: '#/definitions/v1.SELinuxOptions'
        description: |-
          The SELinux context to be applied to the container.
          If unspecified, the container runtime will allocate a random SELinux context for each
          container.  May also be set in PodSecurityContext.  If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      seccompProfile:
        allOf:
        - $ref: '#/definitions/v1.SeccompProfile'
        description: |-
          The seccomp options to use by this container. If seccomp options are
          provided at both the pod & container level, the container options
          override the pod options.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      windowsOptions:
        allOf:
        - $ref: '#/definitions/v1.WindowsSecurityContextOptions'
        description: |-
          The Windows specific settings applied to all containers.
          If unspecified, the options from the PodSecurityContext will be used.
          If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
          Note that this field cannot be set when spec.os.name is linux.
          +optional
    type: object
  v1.ServiceAccountTokenProjection:
    properties:
      audience:
        description: |-
          audience is the intended audience of the token. A recipient of a token
          must identify itself with an identifier specified in the audience of the
          token, and otherwise should reject the token. The audience defaults to the
          identifier of the apiserver.
          +optional
        type: string
      expirationSeconds:
        description: |-
          expirationSeconds is the requested duration of validity of the service
          account token. As the token approaches expiration, the kubelet volume
          plugin will proactively rotate the service account token. The kubelet will
          start trying to rotate the token if the token is older than 80 percent of
          its time to live or if the token is older than 24 hours.Defaults to 1 hour
          and must be at least 10 minutes.
          +optional
        type: integer
      path:
        description: |-
          path is the path relative to the mount point of the file to project the
          token into.
        type: string
    type: object
  v1.SleepAction:
    properties:
      seconds:
        description: Seconds is the number of seconds to sleep.
        type: integer
    type: object
  v1.StorageOSVolumeSource:
    properties:
      fsType:
        description: |-
          fsType is the filesystem type to mount.
          Must be a filesystem type supported by the host operating system.
          Ex. "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
          +optional
        type: string
      readOnly:
        description: |-
          readOnly defaults to false (read/write). ReadOnly here will force
          the ReadOnly setting in VolumeMounts.
          +optional
        type: boolean
      secretRef:
        allOf:
        - $ref: '#/definitions/v1.LocalObjectReference'
        description: |-
          secretRef specifies the secret to use for obtaining the StorageOS API
          credentials.  If not specified, default values will be attempted.
          +optional
      volumeName:
        description: |-
          volumeName is the human-readable name of the StorageOS volume.  Volume
          names are only unique within a namespace.
        type: string
      volumeNamespace:
        description: |-
          volumeNamespace specifies the scope of the volume within StorageOS.  If no
          namespace is specified then the Pod's namespace will be used.  This allows the
          Kubernetes name scoping to be mirrored within StorageOS for tighter integration.
          Set VolumeName to any name to override the default behaviour.
          Set to "default" if you are not using namespaces within StorageOS.
          Namespaces that do not pre-exist within StorageOS will be created.
          +optional
        type: string
    type: object
  v1.SuccessPolicy:
    properties:
      rules:
        description: |-
          rules represents the list of alternative rules for the declaring the Jobs
          as successful before `.status.succeeded >= .spec.completions`. Once any of the rules are met,
          the "SuccessCriteriaMet" condition is added, and the lingering pods are removed.
          The terminal state for such a Job has the "Complete" condition.
          Additionally, these rules are evaluated in order; Once the Job meets one of the rules,
          other rules are ignored. At most 20 elements are allowed.
          +listType=atomic
        items:
          $ref: '#/definitions/v1.SuccessPolicyRule'
        type: array
    type: object
  v1.SuccessPolicyRule:
    properties:
      succeededCount:
        description: |-
          succeededCount specifies the minimal required size of the actual set of the succeeded indexes
          for the Job. When succeededCount is used along with succeededIndexes, the check is
          constrained only to the set of indexes specified by succeededIndexes.
          For example, given that succeededIndexes is "1-4", succeededCount is "3",
          and completed indexes are "1", "3", and "5", the Job isn't declared as succeeded
          because only "1" and "3" indexes are considered in that rules.
          When this field is null, this doesn't default to any value and
          is never evaluated at any time.
          When specified it needs to be a positive integer.

          +optional
        type: integer
      succeededIndexes:
        description: |-
          succeededIndexes specifies the set of indexes
          which need to be contained in the actual set of the succeeded indexes for the Job.
          The list of indexes must be within 0 to ".spec.completions-1" and
          must not contain duplicates. At least one element is required.
          The indexes are represented as intervals separated by commas.
          The intervals can be a decimal integer or a pair of decimal integers separated by a hyphen.
          The number are listed in represented by the first and last element of the series,
          separated by a hyphen.
          For example, if the completed indexes are 1, 3, 4, 5 and 7, they are
          represented as "1,3-5,7".
          When this field is null, this field doesn't default to any value
          and is never evaluated at any time.

          +optional
        type: string
    type: object
  v1.Sysctl:
    properties:
      name:
        description: Name of a property to set
        type: string
      value:
        description: Value of a property to set
        type: string
    type: object
  v1.TCPSocketAction:
    properties:
      host:
        description: |-
          Optional: Host name to connect to, defaults to the pod IP.
          +optional
        type: string
      port:
        allOf:
        - $ref: '#/definitions/intstr.IntOrString'
        description: |-
          Number or name of the port to access on the container.
          Number must be in the range 1 to 65535.
          Name must be an IANA_SVC_NAME.
    type: object
  v1.Toleration:
    properties:
      effect:
        description: |-
          Effect indicates the taint effect to match. Empty means match all taint effects.
          When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
          +optional
        type: string
      key:
        description: |-
          Key is the taint key that the toleration applies to. Empty means match all taint keys.
          If the key is empty, operator must be Exists; this combination means to match all values and all keys.
          +optional
        type: string
      operator:
        description: |-
          Operator represents a key's relationship to the value.
          Valid operators are Exists and Equal. Defaults to Equal.
          Exists is equivalent to wildcard for value, so that a pod can
          tolerate all taints of a particular category.
          +optional
        type: string
      tolerationSeconds:
        description: |-
          TolerationSeconds represents the period of time the toleration (which must be
          of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
          it is not set, which means tolerate the taint forever (do not evict). Zero and
          negative values will be treated as 0 (evict immediately) by the system.
          +optional
        type: integer
      value:
        description: |-
          Value is the taint value the toleration matches to.
          If the operator is Exists, the value should be empty, otherwise just a regular string.
          +optional
        type: string
    type: object
  v1.TopologySpreadConstraint:
    properties:
      labelSelector:
        allOf:
        - $ref: '#/definitions/v1.LabelSelector'
        description: |-
          LabelSelector is used to find matching pods.
          Pods that match this label selector are counted to determine the number of pods
          in their corresponding topology domain.
          +optional
      matchLabelKeys:
        description: |-
          MatchLabelKeys is a set of pod label keys to select the pods over which
          spreading will be calculated. The keys are used to lookup values from the
          incoming pod labels, those key-value labels are ANDed with labelSelector
          to select the group of existing pods over which spreading will be calculated
          for the incoming pod. The same key is forbidden to exist in both MatchLabelKeys and LabelSelector.
          MatchLabelKeys cannot be set when LabelSelector isn't set.
          Keys that don't exist in the incoming pod labels will
          be ignored. A null or empty list means only match against labelSelector.

          This is a beta field and requires the MatchLabelKeysInPodTopologySpread feature gate to be enabled (enabled by default).
          +listType=atomic
          +optional
        items:
          type: string
        type: array
      maxSkew:
        description: |-
          MaxSkew describes the degree to which pods may be unevenly distributed.
          When `whenUnsatisfiable=DoNotSchedule`, it is the maximum permitted difference
          between the number of matching pods in the target topology and the global minimum.
          The global minimum is the minimum number of matching pods in an eligible domain
          or zero if the number of eligible domains is less than MinDomains.
          For example, in a 3-zone cluster, MaxSkew is set to 1, and pods with the same
          labelSelector spread as 2/2/1:
          In this case, the global minimum is 1.
          +-------+-------+-------+
          | zone1 | zone2 | zone3 |
          +-------+-------+-------+
          |  P P  |  P P  |   P   |
          +-------+-------+-------+
          - if MaxSkew is 1, incoming pod can only be scheduled to zone3 to become 2/2/2;
          scheduling it onto zone1(zone2) would make the ActualSkew(3-1) on zone1(zone2)
          violate MaxSkew(1).
          - if MaxSkew is 2, incoming pod can be scheduled onto any zone.
          When `whenUnsatisfiable=ScheduleAnyway`, it is used to give higher precedence
          to topologies that satisfy it.
          It's a required field. Default value is 1 and 0 is not allowed.
        type: integer
      minDomains:
        description: |-
          MinDomains indicates a minimum number of eligible domains.
          When the number of eligible domains with matching topology keys is less than minDomains,
          Pod Topology Spread treats "global minimum" as 0, and then the calculation of Skew is performed.
          And when the number of eligible domains with matching topology keys equals or greater than minDomains,
          this value has no effect on scheduling.
          As a result, when the number of eligible domains is less than minDomains,
          scheduler won't schedule more than maxSkew Pods to those domains.
          If value is nil, the constraint behaves as if MinDomains is equal to 1.
          Valid values are integers greater than 0.
          When value is not nil, WhenUnsatisfiable must be DoNotSchedule.

          For example, in a 3-zone cluster, MaxSkew is set to 2, MinDomains is set to 5 and pods with the same
          labelSelector spread as 2/2/2:
          +-------+-------+-------+
          | zone1 | zone2 | zone3 |
          +-------+-------+-------+
          |  P P  |  P P  |  P P  |
          +-------+-------+-------+
          The number of domains is less than 5(MinDomains), so "global minimum" is treated as 0.
          In this situation, new pod with the same labelSelector cannot be scheduled,
          because computed skew will be 3(3 - 0) if new Pod is scheduled to any of the three zones,
          it will violate MaxSkew.
          +optional
        type: integer
      nodeAffinityPolicy:
        description: |-
          NodeAffinityPolicy indicates how we will treat Pod's nodeAffinity/nodeSelector
          when calculating pod topology spread skew. Options are:
          - Honor: only nodes matching nodeAffinity/nodeSelector are included in the calculations.
          - Ignore: nodeAffinity/nodeSelector are ignored. All nodes are included in the calculations.

          If this value is nil, the behavior is equivalent to the Honor policy.
          +optional
        type: string
      nodeTaintsPolicy:
        description: |-
          NodeTaintsPolicy indicates how we will treat node taints when calculating
          pod topology spread skew. Options are:
          - Honor: nodes without taints, along with tainted nodes for which the incoming pod
          has a toleration, are included.
          - Ignore: node taints are ignored. All nodes are included.

          If this value is nil, the behavior is equivalent to the Ignore policy.
          +optional
        type: string
      topologyKey:
        description: |-
          TopologyKey is the key of node labels. Nodes that have a label with this key
          and identical values are considered to be in the same topology.
          We consider each <key, value> as a "bucket", and try to put balanced number
          of pods into each bucket.
          We define a domain as a particular instance of a topology.
          Also, we define an eligible domain as a domain whose nodes meet the requirements of
          nodeAffinityPolicy and nodeTaintsPolicy.
          e.g. If TopologyKey is "kubernetes.io/hostname", each Node is a domain of that topology.
          And, if TopologyKey is "topology.kubernetes.io/zone", each zone is a domain of that topology.
          It's a required field.
        type: string
      whenUnsatisfiable:
        description: |-
          WhenUnsatisfiable indicates how to deal with a pod if it doesn't satisfy
          the spread constraint.
          - DoNotSchedule (default) tells the scheduler not to schedule it.
          - ScheduleAnyway tells the scheduler to schedule the pod in any location,
            but giving higher precedence to topologies that would help reduce the
            skew.
          A constraint is considered "Unsatisfiable" for an incoming pod
          if and only if every possible node assignment for that pod would violate
          "MaxSkew" on some topology.
          For example, in a 3-zone cluster, MaxSkew is set to 1, and pods with the same
          labelSelector spread as 3/1/1:
          +-------+-------+-------+
          | zone1 | zone2 | zone3 |
          +-------+-------+-------+
          | P P P |   P   |   P   |
          +-------+-------+-------+
          If WhenUnsatisfiable is set to DoNotSchedule, incoming pod can only be scheduled
          to zone2(zone3) to become 3/2/1(3/1/2) as ActualSkew(2-1) on zone2(zone3) satisfies
          MaxSkew(1). In other words, the cluster can still be imbalanced, but scheduler
          won't make it *more* imbalanced.
          It's a required field.
        type: string
    type: object
  v1.TypedLocalObjectReference:
    properties:
      apiGroup:
        description: |-
          APIGroup is the group for the resource being referenced.
          If APIGroup is not specified, the specified Kind must be in the core API group.
          For any other third-party types, APIGroup is required.
          +optional
        type: string
      kind:
        description: Kind is the type of resource being referenced
        type: string
      name:
        description: Name is the name of resource being referenced
        type: string
    type: object
  v1.TypedObjectReference:
    properties:
      apiGroup:
        description: |-
          APIGroup is the group for the resource being referenced.
          If APIGroup is not specified, the specified Kind must be in the core API group.
          For any other third-party types, APIGroup is required.
          +optional
        type: string
      kind:
        description: Kind is the type of resource being referenced
        type: string
      name:
        description: Name is the name of resource being referenced
        type: string
      namespace:
        description: |-
          Namespace is the namespace of resource being referenced
          Note that when a namespace is specified, a gateway.networking.k8s.io/ReferenceGrant object is required in the referent namespace to allow that namespace's owner to accept the reference. See the ReferenceGrant documentation for details.
          (Alpha) This field requires the CrossNamespaceVolumeDataSource feature gate to be enabled.
          +featureGate=CrossNamespaceVolumeDataSource
          +optional
        type: string
    type: object
  v1.Volume:
    properties:
      awsElasticBlockStore:
        allOf:
        - $ref: '#/definitions/v1.AWSElasticBlockStoreVolumeSource'
        description: |-
          awsElasticBlockStore represents an AWS Disk resource that is attached to a
          kubelet's host machine and then exposed to the pod.
          Deprecated: AWSElasticBlockStore is deprecated. All operations for the in-tree
          awsElasticBlockStore type are redirected to the ebs.csi.aws.com CSI driver.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#awselasticblockstore
          +optional
      azureDisk:
        allOf:
        - $ref: '#/definitions/v1.AzureDiskVolumeSource'
        description: |-
          azureDisk represents an Azure Data Disk mount on the host and bind mount to the pod.
          Deprecated: AzureDisk is deprecated. All operations for the in-tree azureDisk type
          are redirected to the disk.csi.azure.com CSI driver.
          +optional
      azureFile:
        allOf:
        - $ref: '#/definitions/v1.AzureFileVolumeSource'
        description: |-
          azureFile represents an Azure File Service mount on the host and bind mount to the pod.
          Deprecated: AzureFile is deprecated. All operations for the in-tree azureFile type
          are redirected to the file.csi.azure.com CSI driver.
          +optional
      cephfs:
        allOf:
        - $ref: '#/definitions/v1.CephFSVolumeSource'
        description: |-
          cephFS represents a Ceph FS mount on the host that shares a pod's lifetime.
          Deprecated: CephFS is deprecated and the in-tree cephfs type is no longer supported.
          +optional
      cinder:
        allOf:
        - $ref: '#/definitions/v1.CinderVolumeSource'
        description: |-
          cinder represents a cinder volume attached and mounted on kubelets host machine.
          Deprecated: Cinder is deprecated. All operations for the in-tree cinder type
          are redirected to the cinder.csi.openstack.org CSI driver.
          More info: https://examples.k8s.io/mysql-cinder-pd/README.md
          +optional
      configMap:
        allOf:
        - $ref: '#/definitions/v1.ConfigMapVolumeSource'
        description: |-
          configMap represents a configMap that should populate this volume
          +optional
      csi:
        allOf:
        - $ref: '#/definitions/v1.CSIVolumeSource'
        description: |-
          csi (Container Storage Interface) represents ephemeral storage that is handled by certain external CSI drivers.
          +optional
      downwardAPI:
        allOf:
        - $ref: '#/definitions/v1.DownwardAPIVolumeSource'
        description: |-
          downwardAPI represents downward API about the pod that should populate this volume
          +optional
      emptyDir:
        allOf:
        - $ref: '#/definitions/v1.EmptyDirVolumeSource'
        description: |-
          emptyDir represents a temporary directory that shares a pod's lifetime.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#emptydir
          +optional
      ephemeral:
        allOf:
        - $ref: '#/definitions/v1.EphemeralVolumeSource'
        description: |-
          ephemeral represents a volume that is handled by a cluster storage driver.
          The volume's lifecycle is tied to the pod that defines it - it will be created before the pod starts,
          and deleted when the pod is removed.

          Use this if:
          a) the volume is only needed while the pod runs,
          b) features of normal volumes like restoring from snapshot or capacity
             tracking are needed,
          c) the storage driver is specified through a storage class, and
          d) the storage driver supports dynamic volume provisioning through
             a PersistentVolumeClaim (see EphemeralVolumeSource for more
             information on the connection between this volume type
             and PersistentVolumeClaim).

          Use PersistentVolumeClaim or one of the vendor-specific
          APIs for volumes that persist for longer than the lifecycle
          of an individual pod.

          Use CSI for light-weight local ephemeral volumes if the CSI driver is meant to
          be used that way - see the documentation of the driver for
          more information.

          A pod can use both types of ephemeral volumes and
          persistent volumes at the same time.

          +optional
      fc:
        allOf:
        - $ref: '#/definitions/v1.FCVolumeSource'
        description: |-
          fc represents a Fibre Channel resource that is attached to a kubelet's host machine and then exposed to the pod.
          +optional
      flexVolume:
        allOf:
        - $ref: '#/definitions/v1.FlexVolumeSource'
        description: |-
          flexVolume represents a generic volume resource that is
          provisioned/attached using an exec based plugin.
          Deprecated: FlexVolume is deprecated. Consider using a CSIDriver instead.
          +optional
      flocker:
        allOf:
        - $ref: '#/definitions/v1.FlockerVolumeSource'
        description: |-
          flocker represents a Flocker volume attached to a kubelet's host machine. This depends on the Flocker control service being running.
          Deprecated: Flocker is deprecated and the in-tree flocker type is no longer supported.
          +optional
      gcePersistentDisk:
        allOf:
        - $ref: '#/definitions/v1.GCEPersistentDiskVolumeSource'
        description: |-
          gcePersistentDisk represents a GCE Disk resource that is attached to a
          kubelet's host machine and then exposed to the pod.
          Deprecated: GCEPersistentDisk is deprecated. All operations for the in-tree
          gcePersistentDisk type are redirected to the pd.csi.storage.gke.io CSI driver.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#gcepersistentdisk
          +optional
      gitRepo:
        allOf:
        - $ref: '#/definitions/v1.GitRepoVolumeSource'
        description: |-
          gitRepo represents a git repository at a particular revision.
          Deprecated: GitRepo is deprecated. To provision a container with a git repo, mount an
          EmptyDir into an InitContainer that clones the repo using git, then mount the EmptyDir
          into the Pod's container.
          +optional
      glusterfs:
        allOf:
        - $ref: '#/definitions/v1.GlusterfsVolumeSource'
        description: |-
          glusterfs represents a Glusterfs mount on the host that shares a pod's lifetime.
          Deprecated: Glusterfs is deprecated and the in-tree glusterfs type is no longer supported.
          +optional
      hostPath:
        allOf:
        - $ref: '#/definitions/v1.HostPathVolumeSource'
        description: |-
          hostPath represents a pre-existing file or directory on the host
          machine that is directly exposed to the container. This is generally
          used for system agents or other privileged things that are allowed
          to see the host machine. Most containers will NOT need this.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#hostpath
          ---
          TODO(jonesdl) We need to restrict who can use host directory mounts and who can/can not
          mount host directories as read/write.
          +optional
      image:
        allOf:
        - $ref: '#/definitions/v1.ImageVolumeSource'
        description: |-
          image represents an OCI object (a container image or artifact) pulled and mounted on the kubelet's host machine.
          The volume is resolved at pod startup depending on which PullPolicy value is provided:

          - Always: the kubelet always attempts to pull the reference. Container creation will fail If the pull fails.
          - Never: the kubelet never pulls the reference and only uses a local image or artifact. Container creation will fail if the reference isn't present.
          - IfNotPresent: the kubelet pulls if the reference isn't already present on disk. Container creation will fail if the reference isn't present and the pull fails.

          The volume gets re-resolved if the pod gets deleted and recreated, which means that new remote content will become available on pod recreation.
          A failure to resolve or pull the image during pod startup will block containers from starting and may add significant latency. Failures will be retried using normal volume backoff and will be reported on the pod reason and message.
          The types of objects that may be mounted by this volume are defined by the container runtime implementation on a host machine and at minimum must include all valid types supported by the container image field.
          The OCI object gets mounted in a single directory (spec.containers[*].volumeMounts.mountPath) by merging the manifest layers in the same way as for container images.
          The volume will be mounted read-only (ro) and non-executable files (noexec).
          Sub path mounts for containers are not supported (spec.containers[*].volumeMounts.subpath) before 1.33.
          The field spec.securityContext.fsGroupChangePolicy has no effect on this volume type.
          +featureGate=ImageVolume
          +optional
      iscsi:
        allOf:
        - $ref: '#/definitions/v1.ISCSIVolumeSource'
        description: |-
          iscsi represents an ISCSI Disk resource that is attached to a
          kubelet's host machine and then exposed to the pod.
          More info: https://kubernetes.io/docs/concepts/storage/volumes/#iscsi
          +optional
      name:
        description: |-
          name of the volume.
          Must be a DNS_LABEL and unique within the pod.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
        type: string
      nfs:
        allOf:
        - $ref: '#/definitions/v1.NFSVolumeSource'
        description: |-
          nfs represents an NFS mount on the host that shares a pod's lifetime
          More info: https://kubernetes.io/docs/concepts/storage/volumes#nfs
          +optional
      persistentVolumeClaim:
        allOf:
        - $ref: '#/definitions/v1.PersistentVolumeClaimVolumeSource'
        description: |-
          persistentVolumeClaimVolumeSource represents a reference to a
          PersistentVolumeClaim in the same namespace.
          More info: https://kubernetes.io/docs/concepts/storage/persistent-volumes#persistentvolumeclaims
          +optional
      photonPersistentDisk:
        allOf:
        - $ref: '#/definitions/v1.PhotonPersistentDiskVolumeSource'
        description: |-
          photonPersistentDisk represents a PhotonController persistent disk attached and mounted on kubelets host machine.
          Deprecated: PhotonPersistentDisk is deprecated and the in-tree photonPersistentDisk type is no longer supported.
      portworxVolume:
        allOf:
        - $ref: '#/definitions/v1.PortworxVolumeSource'
        description: |-
          portworxVolume represents a portworx volume attached and mounted on kubelets host machine.
          Deprecated: PortworxVolume is deprecated. All operations for the in-tree portworxVolume type
          are redirected to the pxd.portworx.com CSI driver when the CSIMigrationPortworx feature-gate
          is on.
          +optional
      projected:
        allOf:
        - $ref: '#/definitions/v1.ProjectedVolumeSource'
        description: projected items for all in one resources secrets, configmaps,
          and downward API
      quobyte:
        allOf:
        - $ref: '#/definitions/v1.QuobyteVolumeSource'
        description: |-
          quobyte represents a Quobyte mount on the host that shares a pod's lifetime.
          Deprecated: Quobyte is deprecated and the in-tree quobyte type is no longer supported.
          +optional
      rbd:
        allOf:
        - $ref: '#/definitions/v1.RBDVolumeSource'
        description: |-
          rbd represents a Rados Block Device mount on the host that shares a pod's lifetime.
          Deprecated: RBD is deprecated and the in-tree rbd type is no longer supported.
          +optional
      scaleIO:
        allOf:
        - $ref: '#/definitions/v1.ScaleIOVolumeSource'
        description: |-
          scaleIO represents a ScaleIO persistent volume attached and mounted on Kubernetes nodes.
          Deprecated: ScaleIO is deprecated and the in-tree scaleIO type is no longer supported.
          +optional
      secret:
        allOf:
        - $ref: '#/definitions/v1.SecretVolumeSource'
        description: |-
          secret represents a secret that should populate this volume.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#secret
          +optional
      storageos:
        allOf:
        - $ref: '#/definitions/v1.StorageOSVolumeSource'
        description: |-
          storageOS represents a StorageOS volume attached and mounted on Kubernetes nodes.
          Deprecated: StorageOS is deprecated and the in-tree storageos type is no longer supported.
          +optional
      vsphereVolume:
        allOf:
        - $ref: '#/definitions/v1.VsphereVirtualDiskVolumeSource'
        description: |-
          vsphereVolume represents a vSphere volume attached and mounted on kubelets host machine.
          Deprecated: VsphereVolume is deprecated. All operations for the in-tree vsphereVolume type
          are redirected to the csi.vsphere.vmware.com CSI driver.
          +optional
    type: object
  v1.VolumeDevice:
    properties:
      devicePath:
        description: devicePath is the path inside of the container that the device
          will be mapped to.
        type: string
      name:
        description: name must match the name of a persistentVolumeClaim in the pod
        type: string
    type: object
  v1.VolumeMount:
    properties:
      mountPath:
        description: |-
          Path within the container at which the volume should be mounted.  Must
          not contain ':'.
        type: string
      mountPropagation:
        description: |-
          mountPropagation determines how mounts are propagated from the host
          to container and the other way around.
          When not set, MountPropagationNone is used.
          This field is beta in 1.10.
          When RecursiveReadOnly is set to IfPossible or to Enabled, MountPropagation must be None or unspecified
          (which defaults to None).
          +optional
        type: string
      name:
        description: This must match the Name of a Volume.
        type: string
      readOnly:
        description: |-
          Mounted read-only if true, read-write otherwise (false or unspecified).
          Defaults to false.
          +optional
        type: boolean
      recursiveReadOnly:
        description: |-
          RecursiveReadOnly specifies whether read-only mounts should be handled
          recursively.

          If ReadOnly is false, this field has no meaning and must be unspecified.

          If ReadOnly is true, and this field is set to Disabled, the mount is not made
          recursively read-only.  If this field is set to IfPossible, the mount is made
          recursively read-only, if it is supported by the container runtime.  If this
          field is set to Enabled, the mount is made recursively read-only if it is
          supported by the container runtime, otherwise the pod will not be started and
          an error will be generated to indicate the reason.

          If this field is set to IfPossible or Enabled, MountPropagation must be set to
          None (or be unspecified, which defaults to None).

          If this field is not specified, it is treated as an equivalent of Disabled.

          +featureGate=RecursiveReadOnlyMounts
          +optional
        type: string
      subPath:
        description: |-
          Path within the volume from which the container's volume should be mounted.
          Defaults to "" (volume's root).
          +optional
        type: string
      subPathExpr:
        description: |-
          Expanded path within the volume from which the container's volume should be mounted.
          Behaves similarly to SubPath but environment variable references $(VAR_NAME) are expanded using the container's environment.
          Defaults to "" (volume's root).
          SubPathExpr and SubPath are mutually exclusive.
          +optional
        type: string
    type: object
  v1.VolumeProjection:
    properties:
      clusterTrustBundle:
        allOf:
        - $ref: '#/definitions/v1.ClusterTrustBundleProjection'
        description: |-
          ClusterTrustBundle allows a pod to access the `.spec.trustBundle` field
          of ClusterTrustBundle objects in an auto-updating file.

          Alpha, gated by the ClusterTrustBundleProjection feature gate.

          ClusterTrustBundle objects can either be selected by name, or by the
          combination of signer name and a label selector.

          Kubelet performs aggressive normalization of the PEM contents written
          into the pod filesystem.  Esoteric PEM features such as inter-block
          comments and block headers are stripped.  Certificates are deduplicated.
          The ordering of certificates within the file is arbitrary, and Kubelet
          may change the order over time.

          +featureGate=ClusterTrustBundleProjection
          +optional
      configMap:
        allOf:
        - $ref: '#/definitions/v1.ConfigMapProjection'
        description: |-
          configMap information about the configMap data to project
          +optional
      downwardAPI:
        allOf:
        - $ref: '#/definitions/v1.DownwardAPIProjection'
        description: |-
          downwardAPI information about the downwardAPI data to project
          +optional
      podCertificate:
        allOf:
        - $ref: '#/definitions/v1.PodCertificateProjection'
        description: |-
          Projects an auto-rotating credential bundle (private key and certificate
          chain) that the pod can use either as a TLS client or server.

          Kubelet generates a private key and uses it to send a
          PodCertificateRequest to the named signer.  Once the signer approves the
          request and issues a certificate chain, Kubelet writes the key and
          certificate chain to the pod filesystem.  The pod does not start until
          certificates have been issued for each podCertificate projected volume
          source in its spec.

          Kubelet will begin trying to rotate the certificate at the time indicated
          by the signer using the PodCertificateRequest.Status.BeginRefreshAt
          timestamp.

          Kubelet can write a single file, indicated by the credentialBundlePath
          field, or separate files, indicated by the keyPath and
          certificateChainPath fields.

          The credential bundle is a single file in PEM format.  The first PEM
          entry is the private key (in PKCS#8 format), and the remaining PEM
          entries are the certificate chain issued by the signer (typically,
          signers will return their certificate chain in leaf-to-root order).

          Prefer using the credential bundle format, since your application code
          can read it atomically.  If you use keyPath and certificateChainPath,
          your application must make two separate file reads. If these coincide
          with a certificate rotation, it is possible that the private key and leaf
          certificate you read may not correspond to each other.  Your application
          will need to check for this condition, and re-read until they are
          consistent.

          The named signer controls chooses the format of the certificate it
          issues; consult the signer implementation's documentation to learn how to
          use the certificates it issues.

          +featureGate=PodCertificateProjection +optional
      secret:
        allOf:
        - $ref: '#/definitions/v1.SecretProjection'
        description: |-
          secret information about the secret data to project
          +optional
      serviceAccountToken:
        allOf:
        - $ref: '#/definitions/v1.ServiceAccountTokenProjection'
        description: |-
          serviceAccountToken is information about the serviceAccountToken data to project
          +optional
    type: object
  v1.VolumeResourceRequirements:
    properties:
      limits:
        allOf:
        - $ref: '#/definitions/v1.ResourceList'
        description: |-
          Limits describes the maximum amount of compute resources allowed.
          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
          +optional
      requests:
        allOf:
        - $ref: '#/definitions/v1.ResourceList'
        description: |-
          Requests describes the minimum amount of compute resources required.
          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
          otherwise to an implementation-defined value. Requests cannot exceed Limits.
          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
          +optional
    type: object
  v1.VsphereVirtualDiskVolumeSource:
    properties:
      fsType:
        description: |-
          fsType is filesystem type to mount.
          Must be a filesystem type supported by the host operating system.
          Ex. "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
          +optional
        type: string
      storagePolicyID:
        description: |-
          storagePolicyID is the storage Policy Based Management (SPBM) profile ID associated with the StoragePolicyName.
          +optional
        type: string
      storagePolicyName:
        description: |-
          storagePolicyName is the storage Policy Based Management (SPBM) profile name.
          +optional
        type: string
      volumePath:
        description: volumePath is the path that identifies vSphere volume vmdk
        type: string
    type: object
  v1.WeightedPodAffinityTerm:
    properties:
      podAffinityTerm:
        allOf:
        - $ref: '#/definitions/v1.PodAffinityTerm'
        description: Required. A pod affinity term, associated with the corresponding
          weight.
      weight:
        description: |-
          weight associated with matching the corresponding podAffinityTerm,
          in the range 1-100.
        type: integer
    type: object
  v1.WindowsSecurityContextOptions:
    properties:
      gmsaCredentialSpec:
        description: |-
          GMSACredentialSpec is where the GMSA admission webhook
          (https://github.com/kubernetes-sigs/windows-gmsa) inlines the contents of the
          GMSA credential spec named by the GMSACredentialSpecName field.
          +optional
        type: string
      gmsaCredentialSpecName:
        description: |-
          GMSACredentialSpecName is the name of the GMSA credential spec to use.
          +optional
        type: string
      hostProcess:
        description: |-
          HostProcess determines if a container should be run as a 'Host Process' container.
          All of a Pod's containers must have the same effective HostProcess value
          (it is not allowed to have a mix of HostProcess containers and non-HostProcess containers).
          In addition, if HostProcess is true then HostNetwork must also be set to true.
          +optional
        type: boolean
      runAsUserName:
        description: |-
          The UserName in Windows to run the entrypoint of the container process.
          Defaults to the user specified in image metadata if unspecified.
          May also be set in PodSecurityContext. If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence.
          +optional
        type: string
    type: object
