        type: integer
    type: object
  github_com_akuity_kargo_api_v1alpha1.Image:
    properties:
      annotations:
        additionalProperties:
          type: string
        description: Annotations is a map of arbitrary metadata for the image.
        type: object
      digest:
        description: |-
          Digest identifies a specific version of the image in the repository
