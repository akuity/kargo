        type: integer
      finishedAt:
        description: |-
          FinishedAt is the time at which the final attempt to execute the step
          completed.
        type: string
      message:
        description: Message is a display message about the step, including any errors.
        type: string
      startedAt:
        description: |-
          StartedAt is the time at which the first attempt to execute the step
          began.
        type: string
      status:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionStepStatus'
        description: Status is the high-level outcome of the step.
    type: object
  github_com_akuity_kargo_api_v1alpha1.Verification:
    properties:
      analysisRunMetadata:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.AnalysisRunMetadata'
        description: |-
          AnalysisRunMetadata contains optional metadata that should be applied to
          all AnalysisRuns.
      analysisTemplates:
        description: |-
          AnalysisTemplates is a list of AnalysisTemplates from which AnalysisRuns
          should be created to verify a Stage's current Freight is fit to be promoted
          downstream.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.AnalysisTemplateReference'
        type: array
      args:
        description: Args lists arguments that should be added to all AnalysisRuns.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.AnalysisRunArgument'
        type: array
    type: object
  github_com_akuity_kargo_api_v1alpha1.VerificationInfo:
    properties:
      actor:
        description: |-
          Actor is the name of the entity that initiated or aborted the
          Verification process.
        type: string
      analysisRun:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.AnalysisRunReference'
        description: |-
          AnalysisRun is a reference to the Argo Rollouts AnalysisRun that implements
