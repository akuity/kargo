          +optional
        type: string
      metadata:
        $ref: '#/definitions/v1.ObjectMeta'
      spec:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionTaskSpec'
        description: |-
          Spec describes the composition of a PromotionTask, including the
          variables available to the task and the steps.

          +kubebuilder:validation:Required
    type: object
  github_com_akuity_kargo_api_v1alpha1.PromotionTaskList:
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
