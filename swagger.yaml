basePath: /
definitions:
  AdminLoginResponse:
    properties:
      idToken:
        type: string
    type: object
  ArgoCDShard:
    properties:
      namespace:
        type: string
      url:
        type: string
    type: object
  Claim:
    properties:
      name:
        type: string
      values:
        items:
          type: string
        type: array
    type: object
  CreateAPITokenRequest:
    properties:
      name:
        type: string
    type: object
  CreateConfigMapRequest:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      description:
        type: string
      name:
        type: string
    type: object
  CreateGenericCredentialsRequest:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      description:
        type: string
      name:
        type: string
    type: object
  CreateOrUpdateResourceResponse:
    properties:
      results:
        items:
          $ref: '#/definitions/CreateOrUpdateResourceResult'
        type: array
    type: object
  CreateOrUpdateResourceResult:
    properties:
      createdResourceManifest:
        additionalProperties: {}
        type: object
      error:
        type: string
      updatedResourceManifest:
        additionalProperties: {}
        type: object
    type: object
  CreateRepoCredentialsRequest:
    properties:
      description:
        type: string
      name:
        type: string
      password:
        description: |-
          #nosec G117 -- Request data is unmarshaled into this struct, but the struct
          is never marshaled and transmitted to anywhere.
        type: string
      repoUrl:
        type: string
      repoUrlIsRegex:
        type: boolean
      type:
        type: string
      username:
        type: string
    type: object
  CreateResourceResponse:
    properties:
      results:
        items:
          $ref: '#/definitions/CreateResourceResult'
        type: array
    type: object
  CreateResourceResult:
    properties:
      createdResourceManifest:
        additionalProperties: {}
        type: object
      error:
        type: string
    type: object
  DeleteResourceResponse:
    properties:
      results:
        items:
          $ref: '#/definitions/DeleteResourceResult'
        type: array
    type: object
  DeleteResourceResult:
    properties:
      deletedResourceManifest:
        additionalProperties: {}
        type: object
      error:
        type: string
    type: object
  GetConfigResponse:
    properties:
      argocdShards:
        additionalProperties:
          $ref: '#/definitions/ArgoCDShard'
        type: object
      hasAnalysisRunLogsUrlTemplate:
        type: boolean
      kargoNamespace:
        type: string
      secretManagementEnabled:
        type: boolean
      sharedResourcesNamespace:
        type: string
      systemResourcesNamespace:
        type: string
    type: object
  GrantRequest:
    properties:
      resourceDetails:
        $ref: '#/definitions/ResourceDetails'
      role:
        type: string
      userClaims:
        $ref: '#/definitions/UserClaims'
    type: object
  ImageStageMap:
    properties:
      stages:
        additionalProperties:
          format: int32
          type: integer
        type: object
    type: object
  OIDCConfig:
    properties:
      cliClientId:
        type: string
      clientId:
        type: string
      issuerUrl:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
  PatchConfigMapRequest:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      description:
        type: string
      removeKeys:
        items:
          type: string
        type: array
    type: object
  PatchGenericCredentialsRequest:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      description:
        type: string
      removeKeys:
        items:
          type: string
        type: array
    type: object
  PatchRepoCredentialsRequest:
    properties:
      description:
        type: string
      password:
        description: |-
          #nosec G117 -- Request data is unmarshaled into this struct, but the struct
          is never marshaled and transmitted to anywhere.
        type: string
      repoUrl:
        type: string
      repoUrlIsRegex:
        type: boolean
      type:
        type: string
      username:
        type: string
    type: object
  PromoteDownstreamRequest:
    properties:
      freight:
        type: string
      freightAlias:
        type: string
    type: object
  PromoteToStageRequest:
    properties:
      freight:
        type: string
      freightAlias:
        type: string
    type: object
  PublicConfig:
    properties:
      adminAccountEnabled:
        type: boolean
      oidcConfig:
        $ref: '#/definitions/OIDCConfig'
      skipAuth:
        type: boolean
    type: object
  ResourceDetails:
    properties:
      resourceName:
        type: string
      resourceType:
        type: string
      verbs:
        items:
          type: string
        type: array
    type: object
  RevokeRequest:
    properties:
      resourceDetails:
        $ref: '#/definitions/ResourceDetails'
      role:
        type: string
      userClaims:
        $ref: '#/definitions/UserClaims'
    type: object
  TagMap:
    properties:
      tags:
        additionalProperties:
          $ref: '#/definitions/ImageStageMap'
        type: object
    type: object
  UpdateConfigMapRequest:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      description:
        type: string
    type: object
  UpdateGenericCredentialsRequest:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      description:
        type: string
    type: object
  UpdateRepoCredentialsRequest:
    properties:
      description:
        type: string
      password:
        description: |-
          #nosec G117 -- Request data is unmarshaled into this struct, but the struct
          is never marshaled and transmitted to anywhere.
        type: string
      repoUrl:
        type: string
      repoUrlIsRegex:
        type: boolean
      type:
        type: string
      username:
        type: string
    type: object
  UserClaims:
    properties:
      claims:
        items:
          $ref: '#/definitions/Claim'
        type: array
    type: object
  VersionInfo:
    properties:
      buildDate:
        description: BuildDate is the date/time on which the application was built.
        type: string
      compiler:
        description: Compiler indicates what Go compiler was used for the build.
        type: string
      gitCommit:
        description: |-
          GitCommit is the ID (sha) of the last commit to the application's source
          code that is included in this build.
        type: string
      gitTreeDirty:
        description: |-
          GitTreeDirty is true if the application's source code contained
          uncommitted changes at the time it was built; otherwise it is false.
        type: boolean
      goVersion:
        description: GoVersion is the version of Go that was used to build the application.
        type: string
      platform:
        description: |-
          Platform indicates the OS and CPU architecture for which the application
          was built.
        type: string
      version:
        description: Version is a human-friendly version string.
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.AnalysisRunArgument:
    properties:
      name:
        description: |-
          Name is the name of the argument.

          +kubebuilder:validation:Required
        type: string
      value:
        description: |-
          Value is the value of the argument.

          +kubebuilder:validation:Required
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.AnalysisRunMetadata:
    properties:
      annotations:
        additionalProperties:
          type: string
        description: Additional annotations to apply to an AnalysisRun.
        type: object
      labels:
        additionalProperties:
          type: string
        description: Additional labels to apply to an AnalysisRun.
        type: object
    type: object
  github_com_akuity_kargo_api_v1alpha1.AnalysisRunReference:
    properties:
      name:
        description: Name is the name of the AnalysisRun.
        type: string
      namespace:
        description: Namespace is the namespace of the AnalysisRun.
        type: string
      phase:
        description: Phase is the last observed phase of the AnalysisRun referenced
          by Name.
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.AnalysisTemplateReference:
    properties:
      kind:
        description: |-
          Kind is the type of the AnalysisTemplate. Can be either AnalysisTemplate or
          ClusterAnalysisTemplate, default is AnalysisTemplate.

          +kubebuilder:validation:Optional
          +kubebuilder:validation:Enum=AnalysisTemplate;ClusterAnalysisTemplate
        type: string
      name:
        description: |-
          Name is the name of the AnalysisTemplate in the same project/namespace as
          the Stage.

          +kubebuilder:validation:Required
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.ArtifactReference:
    properties:
      artifactType:
        description: |-
          ArtifactType specifies the type of artifact this is. Often, but not always,
          it will be the media type (MIME type) of the artifact referenced by this
          ArtifactReference.

          +kubebuilder:validation:MinLength=1
        type: string
      metadata:
        allOf:
        - $ref: '#/definitions/v1.JSON'
        description: |-
          Metadata is a JSON object containing a mostly opaque collection of artifact
          attributes. (It must be an object. It may not be a list or a scalar value.)
          "Mostly" because Kargo may understand how to interpret some documented,
          well-known, top-level keys. Those aside, this metadata is only understood
          by a corresponding Subscriber implementation that created it.

          +optional
      subscriptionName:
        description: |-
          SubscriptionName is the name of the Subscription that discovered this
          artifact.

          +kubebuilder:validation:MinLength=1
        type: string
      version:
        description: |-
          Version identifies a specific revision of this artifact.

          +kubebuilder:validation:MinLength=1
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.AutoPromotionOptions:
    properties:
      selectionPolicy:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.AutoPromotionSelectionPolicy'
        description: |-
          SelectionPolicy specifies the rules for identifying new Freight that is
          eligible for auto-promotion to this Stage. This field is optional. When
          left unspecified, the field is implicitly treated as if its value were
          "NewestFreight".

          Accepted Values:

          - "NewestFreight": The newest Freight that is available to the Stage is
            eligible for auto-promotion.

          - "MatchUpstream": Only the Freight currently used immediately upstream
            from this Stage is eligible for auto-promotion. This policy may only
            be applied when the Stage has exactly one upstream Stage.
    type: object
  github_com_akuity_kargo_api_v1alpha1.AutoPromotionSelectionPolicy:
    enum:
    - NewestFreight
    - MatchUpstream
    type: string
    x-enum-varnames:
    - AutoPromotionSelectionPolicyNewestFreight
    - AutoPromotionSelectionPolicyMatchUpstream
  github_com_akuity_kargo_api_v1alpha1.Chart:
    properties:
      name:
        description: Name specifies the name of the chart.
        type: string
      repoURL:
        description: |-
          RepoURL specifies the URL of a Helm chart repository. Classic chart
          repositories (using HTTP/S) can contain differently named charts. When this
          field points to such a repository, the Name field will specify the name of
          the chart within the repository. In the case of a repository within an OCI
          registry, the URL implicitly points to a specific chart and the Name field
          will be empty.
        type: string
      version:
        description: Version specifies a particular version of the chart.
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.ExpressionVariable:
    properties:
      name:
        description: |-
          Name is the name of the variable.

          +kubebuilder:validation:MinLength=1
          +kubebuilder:validation:Pattern=^[a-zA-Z_]\w*$
        type: string
      value:
        description: |-
          Value is the value of the variable. It is allowed to utilize expressions
          in the value.
          See https://docs.kargo.io/user-guide/reference-docs/expressions for details.
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.FreightAvailabilityStrategy:
    enum:
    - All
    - OneOf
    type: string
    x-enum-varnames:
    - FreightAvailabilityStrategyAll
    - FreightAvailabilityStrategyOneOf
  github_com_akuity_kargo_api_v1alpha1.FreightCollection:
    properties:
      id:
        description: |-
          ID is a unique and deterministically calculated identifier for the
          FreightCollection. It is updated on each use of the UpdateOrPush method.
        type: string
      items:
        additionalProperties:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightReference'
        description: |-
          Freight is a map of FreightReference objects, indexed by their Warehouse
          origin.
        type: object
      verificationHistory:
        description: |-
          VerificationHistory is a stack of recent VerificationInfo. By default,
          the last ten VerificationInfo are stored.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.VerificationInfo'
        type: array
    type: object
  github_com_akuity_kargo_api_v1alpha1.FreightOrigin:
    properties:
      kind:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightOriginKind'
        description: |-
          Kind is the kind of resource from which Freight may have originated. At
          present, this can only be "Warehouse".

          +kubebuilder:validation:Required
      name:
        description: |-
          Name is the name of the resource of the kind indicated by the Kind field
          from which Freight may originate.

          +kubebuilder:validation:Required
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.FreightOriginKind:
    enum:
    - Warehouse
    type: string
    x-enum-varnames:
    - FreightOriginKindWarehouse
  github_com_akuity_kargo_api_v1alpha1.FreightReference:
    properties:
      artifacts:
        description: |-
          Artifacts describes specific versions of artifacts other
          than Git repository commits, container images, and Helm charts.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.ArtifactReference'
        type: array
      charts:
        description: Charts describes specific versions of specific Helm charts.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.Chart'
        type: array
      commits:
        description: Commits describes specific Git repository commits.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.GitCommit'
        type: array
      images:
        description: Images describes specific versions of specific container images.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.Image'
        type: array
      name:
        description: |-
          Name is a system-assigned identifier derived deterministically from
          the contents of the Freight. I.e., two pieces of Freight can be compared
          for equality by comparing their Names.
        type: string
      origin:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightOrigin'
        description: Origin describes a kind of Freight in terms of its origin.
    type: object
  github_com_akuity_kargo_api_v1alpha1.FreightRequest:
    properties:
      origin:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightOrigin'
        description: |-
          Origin specifies from where the requested Freight must have originated.
          This is a required field.

          +kubebuilder:validation:Required
      sources:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightSources'
        description: |-
          Sources describes where the requested Freight may be obtained from. This is
          a required field.
    type: object
  github_com_akuity_kargo_api_v1alpha1.FreightSources:
    properties:
      autoPromotionOptions:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.AutoPromotionOptions'
        description: |-
          AutoPromotionOptions specifies options pertaining to auto-promotion. These
          settings have no effect if auto-promotion is not enabled for this Stage at
          the ProjectConfig level.
      availabilityStrategy:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightAvailabilityStrategy'
        description: |-
          AvailabilityStrategy specifies the semantics for how requested Freight is
          made available to the Stage. This field is optional. When left unspecified,
          the field is implicitly treated as if its value were "OneOf".

          Accepted Values:

          - "All": Freight must be verified and, if applicable, soaked in all
            upstream Stages to be considered available for promotion.
          - "OneOf": Freight must be verified and, if applicable, soaked in at least
             one upstream Stage to be considered available for promotion.
          - "": Treated the same as "OneOf".

          +kubebuilder:validation:Optional
      direct:
        description: |-
          Direct indicates the requested Freight may be obtained directly from the
          Warehouse from which it originated. If this field's value is false, then
          the value of the Stages field must be non-empty. i.e. Between the two
          fields, at least one source must be specified.
        type: boolean
      requiredSoakTime:
        allOf:
        - $ref: '#/definitions/v1.Duration'
        description: |-
          RequiredSoakTime specifies a minimum duration for which the requested
          Freight must have continuously occupied ("soaked in") in an upstream Stage
          before becoming available for promotion to this Stage. This is an optional
          field. If nil or zero, no soak time is required. Any soak time requirement
          is in ADDITION to the requirement that Freight be verified in an upstream
          Stage to become available for promotion to this Stage, although a manual
          approval for promotion to this Stage will supersede any soak time
          requirement.

          +kubebuilder:validation:Type=string
          +kubebuilder:validation:Pattern=`^([0-9]+(\.[0-9]+)?(s|m|h))+$`
          +akuity:test-kubebuilder-pattern=Duration
      stages:
        description: |-
          Stages identifies other "upstream" Stages as potential sources of the
          requested Freight. If this field's value is empty, then the value of the
          Direct field must be true. i.e. Between the two fields, at least on source
          must be specified.
        items:
          type: string
        type: array
    type: object
  github_com_akuity_kargo_api_v1alpha1.GitCommit:
    properties:
      author:
        description: Author is the author of the commit.
        type: string
      branch:
        description: Branch denotes the branch of the repository where this commit
          was found.
        type: string
      committer:
        description: Committer is the person who committed the commit.
        type: string
      id:
        description: |-
          ID is the ID of a specific commit in the Git repository specified by
          RepoURL.
        type: string
      message:
        description: |-
          Message is the message associated with the commit. At present, this only
          contains the first line (subject) of the commit message.
        type: string
      repoURL:
        description: RepoURL is the URL of a Git repository.
        type: string
      tag:
        description: |-
          Tag denotes a tag in the repository that matched selection criteria and
          resolved to this commit.
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.Health:
    properties:
      config:
        allOf:
        - $ref: '#/definitions/v1.JSON'
        description: |-
          Config is the opaque configuration of all health checks performed on this
          Stage.
      issues:
        description: |-
          Issues clarifies why a Stage in any state other than Healthy is in that
          state. This field will always be the empty when a Stage is Healthy.
        items:
          type: string
        type: array
      output:
        allOf:
        - $ref: '#/definitions/v1.JSON'
        description: Output is the opaque output of all health checks performed on
          this Stage.
      status:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.HealthState'
        description: Status describes the health of the Stage.
    type: object
  github_com_akuity_kargo_api_v1alpha1.HealthCheckStep:
    properties:
      config:
        allOf:
        - $ref: '#/definitions/v1.JSON'
        description: Config is the configuration for the directive.
      uses:
        description: |-
          Uses identifies a runner that can execute this step.

          +kubebuilder:validation:MinLength=1
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.HealthState:
    enum:
    - Healthy
    - NotApplicable
    - Progressing
    - Unknown
    - Unhealthy
    type: string
    x-enum-varnames:
    - HealthStateHealthy
    - HealthStateNotApplicable
    - HealthStateProgressing
    - HealthStateUnknown
    - HealthStateUnhealthy
  github_com_akuity_kargo_api_v1alpha1.Image:
    properties:
      annotations:
        additionalProperties:
          type: string
        description: Annotations is a map of arbitrary metadata for the image.
        type: object
      digest:
        description: |-
          Digest identifies a specific version of the image in the repository
          specified by RepoURL. This is a more precise identifier than Tag.
        type: string
      repoURL:
        description: RepoURL describes the repository in which the image can be found.
        type: string
      tag:
        description: |-
          Tag identifies a specific version of the image in the repository specified
          by RepoURL.
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.PromotionPhase:
    enum:
    - Pending
    - Running
    - Succeeded
    - Failed
    - Errored
    - Aborted
    type: string
    x-enum-varnames:
    - PromotionPhasePending
    - PromotionPhaseRunning
    - PromotionPhaseSucceeded
    - PromotionPhaseFailed
    - PromotionPhaseErrored
    - PromotionPhaseAborted
  github_com_akuity_kargo_api_v1alpha1.PromotionReference:
    properties:
      finishedAt:
        description: FinishedAt is the time at which the Promotion was completed.
        type: string
      freight:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightReference'
        description: Freight is the freight being promoted.
      name:
        description: Name is the name of the Promotion.
        type: string
      status:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionStatus'
        description: Status is the (optional) status of the Promotion.
    type: object
  github_com_akuity_kargo_api_v1alpha1.PromotionStatus:
    properties:
      currentStep:
        description: |-
          CurrentStep is the index of the current promotion step being executed. This
          permits steps that have already run successfully to be skipped on
          subsequent reconciliations attempts.
        type: integer
      finishedAt:
        description: FinishedAt is the time when the promotion was completed.
        type: string
      freight:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightReference'
        description: Freight is the detail of the piece of freight that was referenced
          by this promotion.
      freightCollection:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightCollection'
        description: |-
          FreightCollection contains the details of the piece of Freight referenced
          by this Promotion as well as any additional Freight that is carried over
          from the target Stage's current state.
      healthChecks:
        description: |-
          HealthChecks contains the health check directives to be executed after
          the Promotion has completed.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.HealthCheckStep'
        type: array
      lastHandledRefresh:
        description: |-
          LastHandledRefresh holds the value of the most recent AnnotationKeyRefresh
          annotation that was handled by the controller. This field can be used to
          determine whether the request to refresh the resource has been handled.
          +optional
        type: string
      message:
        description: |-
          Message is a display message about the promotion, including any errors
          preventing the Promotion controller from executing this Promotion.
          i.e. If the Phase field has a value of Failed, this field can be expected
          to explain why.
        type: string
      phase:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionPhase'
        description: Phase describes where the Promotion currently is in its lifecycle.
      startedAt:
        description: StartedAt is the time when the promotion started.
        type: string
      state:
        allOf:
        - $ref: '#/definitions/v1.JSON'
        description: |-
          State stores the state of the promotion process between reconciliation
          attempts.
      stepExecutionMetadata:
        description: |-
          StepExecutionMetadata tracks metadata pertaining to the execution
          of individual promotion steps.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.StepExecutionMetadata'
        type: array
    type: object
  github_com_akuity_kargo_api_v1alpha1.PromotionStep:
    properties:
      as:
        description: As is the alias this step can be referred to as.
        type: string
      config:
        allOf:
        - $ref: '#/definitions/v1.JSON'
        description: |-
          Config is opaque configuration for the PromotionStep that is understood
          only by each PromotionStep's implementation. It is legal to utilize
          expressions in defining values at any level of this block.
          See https://docs.kargo.io/user-guide/reference-docs/expressions for details.
      continueOnError:
        description: |-
          ContinueOnError is a boolean value that, if set to true, will cause the
          Promotion to continue executing the next step even if this step fails. It
          also will not permit this failure to impact the overall status of the
          Promotion.
        type: boolean
      if:
        description: |-
          If is an optional expression that, if present, must evaluate to a boolean
          value. If the expression evaluates to false, the step will be skipped.
          If the expression does not evaluate to a boolean value, the step will be
          considered to have failed.
        type: string
      retry:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionStepRetry'
        description: Retry is the retry policy for this step.
      task:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionTaskReference'
        description: |-
          Task is a reference to a PromotionTask that should be inflated into a
          Promotion when it is built from a PromotionTemplate.
      uses:
        description: |-
          Uses identifies a runner that can execute this step.

          +kubebuilder:validation:Optional
          +kubebuilder:validation:MinLength=1
        type: string
      vars:
        description: |-
          Vars is a list of variables that can be referenced by expressions in
          the step's Config. The values override the values specified in the
          PromotionSpec.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.ExpressionVariable'
        type: array
    type: object
  github_com_akuity_kargo_api_v1alpha1.PromotionStepRetry:
    properties:
      errorThreshold:
        description: |-
          ErrorThreshold is the number of consecutive times the step must fail (for
          any reason) before retries are abandoned and the entire Promotion is marked
          as failed.

          If this field is set to 0, the effective default will be a step-specific
          one. If no step-specific default exists (i.e. is also 0), the effective
          default will be the system-wide default of 1.

          A value of 1 will cause the Promotion to be marked as failed after just
          a single failure; i.e. no retries will be attempted.

          There is no option to specify an infinite number of retries using a value
          such as -1.

          In a future release, Kargo is likely to become capable of distinguishing
          between recoverable and non-recoverable step failures. At that time, it is
          planned that unrecoverable failures will not be subject to this threshold
          and will immediately cause the Promotion to be marked as failed without
          further condition.
        type: integer
      timeout:
        allOf:
        - $ref: '#/definitions/v1.Duration'
        description: |-
          Timeout is the soft maximum interval in which a step that returns a Running
          status (which typically indicates it's waiting for something to happen)
          may be retried.

          The maximum is a soft one because the check for whether the interval has
          elapsed occurs AFTER the step has run. This effectively means a step may
          run ONCE beyond the close of the interval.

          If this field is set to nil, the effective default will be a step-specific
          one. If no step-specific default exists (i.e. is also nil), the effective
          default will be the system-wide default of 0.

          A value of 0 will cause the step to be retried indefinitely unless the
          ErrorThreshold is reached.
    type: object
  github_com_akuity_kargo_api_v1alpha1.PromotionStepStatus:
    enum:
    - Running
    - Succeeded
    - Failed
    - Errored
    - Aborted
    - Skipped
    type: string
    x-enum-varnames:
    - PromotionStepStatusRunning
    - PromotionStepStatusSucceeded
    - PromotionStepStatusFailed
    - PromotionStepStatusErrored
    - PromotionStepStatusAborted
    - PromotionStepStatusSkipped
  github_com_akuity_kargo_api_v1alpha1.PromotionTaskReference:
    properties:
      kind:
        description: |-
          Kind is the type of the PromotionTask. Can be either PromotionTask or
          ClusterPromotionTask, default is PromotionTask.

          +kubebuilder:validation:Optional
          +kubebuilder:validation:Enum=PromotionTask;ClusterPromotionTask
        type: string
      name:
        description: |-
          Name is the name of the (Cluster)PromotionTask.

          +kubebuilder:validation:Required
          +kubebuilder:validation:MinLength=1
          +kubebuilder:validation:MaxLength=253
          +kubebuilder:validation:Pattern=`^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$`
          +akuity:test-kubebuilder-pattern=KubernetesName
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.PromotionTemplate:
    properties:
      spec:
        $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionTemplateSpec'
    type: object
  github_com_akuity_kargo_api_v1alpha1.PromotionTemplateSpec:
    properties:
      steps:
        description: |-
          Steps specifies the directives to be executed as part of a Promotion.
          The order in which the directives are executed is the order in which they
          are listed in this field.

          +kubebuilder:validation:MinItems=1
          +kubebuilder:validation:items:XValidation:message="PromotionTemplate step must have exactly one of uses or task set",rule="(has(self.uses) ? !has(self.task) : has(self.task))"
          +kubebuilder:validation:items:XValidation:message="PromotionTemplate step referencing a task cannot set continueOnError",rule="!has(self.task) || !has(self.continueOnError)"
          +kubebuilder:validation:items:XValidation:message="PromotionTemplate step referencing a task cannot set retry",rule="!has(self.task) || !has(self.retry)"
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionStep'
        type: array
      vars:
        description: |-
          Vars is a list of variables that can be referenced by expressions in
          promotion steps.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.ExpressionVariable'
        type: array
    type: object
  github_com_akuity_kargo_api_v1alpha1.Stage:
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
          +optional
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
          +optional
        type: string
      metadata:
        $ref: '#/definitions/v1.ObjectMeta'
      spec:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.StageSpec'
        description: |-
          Spec describes sources of Freight used by the Stage and how to incorporate
          Freight into the Stage.

          +kubebuilder:validation:Required
      status:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.StageStatus'
        description: Status describes the Stage's current and recent Freight, health,
          and more.
    type: object
  github_com_akuity_kargo_api_v1alpha1.StageSpec:
    properties:
      promotionTemplate:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionTemplate'
        description: |-
          PromotionTemplate describes how to incorporate Freight into the Stage
          using a Promotion.
      requestedFreight:
        description: |-
          RequestedFreight expresses the Stage's need for certain pieces of Freight,
          each having originated from a particular Warehouse. This list must be
          non-empty. In the common case, a Stage will request Freight having
          originated from just one specific Warehouse. In advanced cases, requesting
          Freight from multiple Warehouses provides a method of advancing new
          artifacts of different types through parallel pipelines at different
          speeds. This can be useful, for instance, if a Stage is home to multiple
          microservices that are independently versioned.

          +kubebuilder:validation:MinItems=1
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightRequest'
        type: array
      shard:
        description: |-
          Shard is the name of the shard that this Stage belongs to. This is an
          optional field. If not specified, the Stage will belong to the default
          shard. A defaulting webhook will sync the value of the
          kargo.akuity.io/shard label with the value of this field. When this field
          is empty, the webhook will ensure that label is absent.
        type: string
      vars:
        description: |-
          Vars is a list of variables that can be referenced anywhere in the
          StageSpec that supports expressions. For example, the PromotionTemplate
          and arguments of the Verification.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.ExpressionVariable'
        type: array
      verification:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.Verification'
        description: |-
          Verification describes how to verify a Stage's current Freight is fit for
          promotion downstream.
    type: object
  github_com_akuity_kargo_api_v1alpha1.StageStatus:
    properties:
      autoPromotionEnabled:
        description: |-
          AutoPromotionEnabled indicates whether automatic promotion is enabled
          for the Stage based on the ProjectConfig.
        type: boolean
      conditions:
        description: |-
          Conditions contains the last observations of the Stage's current
          state.
          +patchMergeKey=type
          +patchStrategy=merge
          +listType=map
          +listMapKey=type
        items:
          $ref: '#/definitions/v1.Condition'
        type: array
      currentPromotion:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionReference'
        description: CurrentPromotion is a reference to the currently Running promotion.
      freightHistory:
        description: |-
          FreightHistory is a list of recent Freight selections that were deployed
          to the Stage. By default, the last ten Freight selections are stored.
          The first item in the list is the most recent Freight selection and
          currently deployed to the Stage, subsequent items are older selections.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.FreightCollection'
        type: array
      freightSummary:
        description: |-
          FreightSummary is human-readable text maintained by the controller that
          summarizes what Freight is currently deployed to the Stage. For Stages that
          request a single piece of Freight AND the request has been fulfilled, this
          field will simply contain the name of the Freight. For Stages that request
          a single piece of Freight AND the request has NOT been fulfilled, or for
          Stages that request multiple pieces of Freight, this field will contain a
          summary of fulfilled/requested Freight. The existence of this field is a
          workaround for kubectl limitations so that this complex but valuable
          information can be displayed in a column in response to `kubectl get
          stages`.
        type: string
      health:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.Health'
        description: Health is the Stage's last observed health.
      lastHandledRefresh:
        description: |-
          LastHandledRefresh holds the value of the most recent AnnotationKeyRefresh
          annotation that was handled by the controller. This field can be used to
          determine whether the request to refresh the resource has been handled.
          +optional
        type: string
      lastPromotion:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.PromotionReference'
        description: LastPromotion is a reference to the last completed promotion.
      metadata:
        additionalProperties:
          $ref: '#/definitions/v1.JSON'
        description: |-
          Metadata is a map of arbitrary metadata associated with the Stage.
          This is useful for storing additional information about the Stage
          that can be shared across promotions, verifications, or other processes.
        type: object
      observedGeneration:
        description: |-
          ObservedGeneration represents the .metadata.generation that this Stage
          status was reconciled against.
        type: integer
    type: object
  github_com_akuity_kargo_api_v1alpha1.StepExecutionMetadata:
    properties:
      alias:
        description: Alias is the alias of the step.
        type: string
      continueOnError:
        description: |-
          ContinueOnError is a boolean value that, if set to true, will cause the
          Promotion to continue executing the next step even if this step fails. It
          also will not permit this failure to impact the overall status of the
          Promotion.
        type: boolean
      errorCount:
        description: ErrorCount tracks consecutive failed attempts to execute the
