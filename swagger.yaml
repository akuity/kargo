    properties:
      analysisRunMetadata:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.AnalysisRunMetadata'
        description: |-
          AnalysisRunMetadata contains optional metadata that should be applied to
          all AnalysisRuns.
      analysisTemplates:
        description: |-
          AnalysisTemplates is a list of AnalysisTemplates from which AnalysisRuns
          should be created to verify a Stage's current Freight is fit to be promoted
          downstream.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.AnalysisTemplateReference'
        type: array
      args:
        description: Args lists arguments that should be added to all AnalysisRuns.
        items:
          $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.AnalysisRunArgument'
        type: array
    type: object
  github_com_akuity_kargo_api_v1alpha1.VerificationInfo:
    properties:
      actor:
        description: |-
          Actor is the name of the entity that initiated or aborted the
          Verification process.
        type: string
      analysisRun:
        allOf:
        - $ref: '#/definitions/github_com_akuity_kargo_api_v1alpha1.AnalysisRunReference'
        description: |-
          AnalysisRun is a reference to the Argo Rollouts AnalysisRun that implements
          the Verification process.
      finishTime:
        description: FinishTime is the time at which the Verification process finished.
        type: string
      id:
        description: ID is the identifier of the Verification process.
        type: string
      message:
        description: |-
          Message may contain additional information about why the verification
          process is in its current phase.
        type: string
      phase:
        description: |-
          Phase describes the current phase of the Verification process. Generally,
          this will be a reflection of the underlying AnalysisRun's phase, however,
          there are exceptions to this, such as in the case where an AnalysisRun
          cannot be launched successfully.
        type: string
      startTime:
        description: StartTime is the time at which the Verification process was started.
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.VerifiedStage:
    properties:
      longestSoak:
        description: |-
          LongestCompletedSoak represents the longest definite time interval wherein
          the Freight was in CONTINUOUS use by the Stage. This value is updated as
          Freight EXITS the Stage. If the Freight is currently in use by the Stage,
          the time elapsed since the Freight ENTERED the Stage is its current soak
          time, which may exceed the value of this field.
        type: string
      verifiedAt:
        description: VerifiedAt is the time at which the Freight was verified in the
          Stage.
        type: string
    type: object
