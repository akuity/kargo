        type: string
      repoURL:
        description: RepoURL describes the repository in which the image can be found.
        type: string
      tag:
        description: |-
          Tag identifies a specific version of the image in the repository specified
          by RepoURL.
        type: string
    type: object
  github_com_akuity_kargo_api_v1alpha1.ImageDiscoveryResult:
    properties:
      platform:
        description: |-
          Platform is the target platform constraint of the ImageSubscription
