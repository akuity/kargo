  // +optional
  optional .k8s.io.apimachinery.pkg.apis.meta.v1.Time discoveredAt = 11;

  // Origin describes a kind of Freight in terms of its origin.
  //
  // +kubebuilder:validation:Required
  optional FreightOrigin origin = 9;

  // Commits describes specific Git repository commits.
  repeated GitCommit commits = 3;

  // Images describes specific versions of specific container images.
  repeated Image images = 4;

  // Charts describes specific versions of specific Helm charts.
  repeated Chart charts = 5;

  // Artifacts describes specific versions of artifacts other
  // than Git repository commits, container images, and Helm charts.
  repeated ArtifactReference artifacts = 10;

  // Status describes the current status of this Freight.
  optional FreightStatus status = 6;
}

// FreightCollection is a collection of FreightReferences, each of which
// represents a piece of Freight that has been selected for deployment to a
// Stage.
message FreightCollection {
  // ID is a unique and deterministically calculated identifier for the
  // FreightCollection. It is updated on each use of the UpdateOrPush method.
  optional string id = 3;

  // Freight is a map of FreightReference objects, indexed by their Warehouse
  // origin.
  map<string, FreightReference> items = 1;

  // VerificationHistory is a stack of recent VerificationInfo. By default,
  // the last ten VerificationInfo are stored.
  repeated VerificationInfo verificationHistory = 2;
}

// FreightCreationCriteria defines criteria that must be satisfied for Freight
// to be created automatically from new artifacts following discovery.
message FreightCreationCriteria {
  // Expression is an expr-lang expression that must evaluate to true for
  // Freight to be created automatically from new artifacts following discovery.
  optional string expression = 1;
}

// FreightList is a list of Freight resources.
message FreightList {
  optional .k8s.io.apimachinery.pkg.apis.meta.v1.ListMeta metadata = 1;

  repeated Freight items = 2;
}

// FreightOrigin describes a kind of Freight in terms of where it may have
// originated.
//
// +protobuf.options.(gogoproto.goproto_stringer)=false
message FreightOrigin {
  // Kind is the kind of resource from which Freight may have originated. At
  // present, this can only be "Warehouse".
  //
  // +kubebuilder:validation:Required
  optional string kind = 1;

  // Name is the name of the resource of the kind indicated by the Kind field
  // from which Freight may originate.
  //
  // +kubebuilder:validation:Required
  optional string name = 2;
}

// FreightReference is a simplified representation of a piece of Freight -- not
// a root resource type.
message FreightReference {
  // Name is a system-assigned identifier derived deterministically from
  // the contents of the Freight. I.e., two pieces of Freight can be compared
  // for equality by comparing their Names.
  optional string name = 1;

  // Origin describes a kind of Freight in terms of its origin.
  optional FreightOrigin origin = 8;

  // Commits describes specific Git repository commits.
  repeated GitCommit commits = 2;

  // Images describes specific versions of specific container images.
  repeated Image images = 3;

  // Charts describes specific versions of specific Helm charts.
  repeated Chart charts = 4;

  // Artifacts describes specific versions of artifacts other
  // than Git repository commits, container images, and Helm charts.
  repeated ArtifactReference artifacts = 9;
}

// FreightRequest expresses a Stage's need for Freight having originated from a
// particular Warehouse.
message FreightRequest {
  // Origin specifies from where the requested Freight must have originated.
  // This is a required field.
  //
  // +kubebuilder:validation:Required
  optional FreightOrigin origin = 1;

  // Sources describes where the requested Freight may be obtained from. This is
  // a required field.
  optional FreightSources sources = 2;
}

message FreightSources {
  // Direct indicates the requested Freight may be obtained directly from the
  // Warehouse from which it originated. If this field's value is false, then
  // the value of the Stages field must be non-empty. i.e. Between the two
  // fields, at least one source must be specified.
  optional bool direct = 1;

  // Stages identifies other "upstream" Stages as potential sources of the
  // requested Freight. If this field's value is empty, then the value of the
  // Direct field must be true. i.e. Between the two fields, at least on source
  // must be specified.
  repeated string stages = 2;

  // RequiredSoakTime specifies a minimum duration for which the requested
  // Freight must have continuously occupied ("soaked in") in an upstream Stage
  // before becoming available for promotion to this Stage. This is an optional
  // field. If nil or zero, no soak time is required. Any soak time requirement
  // is in ADDITION to the requirement that Freight be verified in an upstream
  // Stage to become available for promotion to this Stage, although a manual
  // approval for promotion to this Stage will supersede any soak time
  // requirement.
  //
  // +kubebuilder:validation:Type=string
  // +kubebuilder:validation:Pattern=`^([0-9]+(\.[0-9]+)?(s|m|h))+$`
  // +akuity:test-kubebuilder-pattern=Duration
  optional .k8s.io.apimachinery.pkg.apis.meta.v1.Duration requiredSoakTime = 3;

  // AvailabilityStrategy specifies the semantics for how requested Freight is
  // made available to the Stage. This field is optional. When left unspecified,
  // the field is implicitly treated as if its value were "OneOf".
  //
  // Accepted Values:
  //
  // - "All": Freight must be verified and, if applicable, soaked in all
  //   upstream Stages to be considered available for promotion.
  // - "OneOf": Freight must be verified and, if applicable, soaked in at least
  //    one upstream Stage to be considered available for promotion.
  // - "": Treated the same as "OneOf".
  //
  // +kubebuilder:validation:Optional
  optional string availabilityStrategy = 4;

  // AutoPromotionOptions specifies options pertaining to auto-promotion. These
  // settings have no effect if auto-promotion is not enabled for this Stage at
  // the ProjectConfig level.
  optional AutoPromotionOptions autoPromotionOptions = 5;
}

// FreightStatus describes a piece of Freight's most recently observed state.
message FreightStatus {
  // CurrentlyIn describes the Stages in which this Freight is currently in use.
  map<string, CurrentStage> currentlyIn = 3;

  // VerifiedIn describes the Stages in which this Freight has been verified
  // through promotion and subsequent health checks.
  map<string, VerifiedStage> verifiedIn = 1;

  // ApprovedFor describes the Stages for which this Freight has been approved
  // preemptively/manually by a user. This is useful for hotfixes, where one
  // might wish to promote a piece of Freight to a given Stage without
  // transiting the entire pipeline.
  map<string, ApprovedStage> approvedFor = 2;

  // Metadata is a map of arbitrary metadata associated with the Freight.
  // This is useful for storing additional information about the Freight
  // or Promotion that can be shared across steps or stages.
  map<string, .k8s.io.apiextensions_apiserver.pkg.apis.apiextensions.v1.JSON> metadata = 4;
}

// GenericWebhookAction describes an action to be performed on a resource
// and the conditions under which it should be performed.
message GenericWebhookAction {
  // ActionType indicates the type of action to be performed. `Refresh` is the
  // only currently supported action.
  //
  // +kubebuilder:validation:Enum=Refresh;
  optional string action = 1;

  // WhenExpression defines criteria that a request must meet to run this
  // action.
  //
  // +optional
  optional string whenExpression = 2;

  // Parameters contains additional, action-specific parameters. Values may be
  // static or extracted from the request using expressions.
  //
  // +optional
  map<string, string> parameters = 3;

  // TargetSelectionCriteria is a list of selection criteria for the resources on which the
  // action should be performed.
  //
  // +kubebuilder:validation:MinItems=1
  repeated GenericWebhookTargetSelectionCriteria targets = 4;
}

// GenericWebhookReceiverConfig describes a generic webhook receiver that can be
// configured to respond to any arbitrary POST by applying user-defined actions
// on user-defined sets of resources selected by name, labels and/or values in pre-built indices.
// Both types of selectors support using values extracted from the request by
// means of expressions. Currently, refreshing resources is the only supported
// action and Warehouse is the only supported kind. "Refreshing" means
// immediately enqueuing the target resource for reconciliation by its
// controller. The practical effect of refreshing a Warehouses is triggering its
// artifact discovery process.
message GenericWebhookReceiverConfig {
  // SecretRef contains a reference to a Secret. For Project-scoped webhook
  // receivers, the referenced Secret must be in the same namespace as the
  // ProjectConfig.
  //
  // For cluster-scoped webhook receivers, the referenced Secret must be in the
  // designated "system resources" namespace.
  //
  // The Secret's data map is expected to contain a `secret` key whose value
  // does NOT need to be shared directly with the sender. It is used only by
  // Kargo to create a complex, hard-to-guess URL, which implicitly serves as a
  // shared secret.
  //
  // +kubebuilder:validation:Required
  optional .k8s.io.api.core.v1.LocalObjectReference secretRef = 1;

  // Actions is a list of actions to be performed when a webhook event is received.
  //
  // +kubebuilder:validation:MinItems=1
  repeated GenericWebhookAction actions = 2;
}

// GenericWebhookTargetSelectionCriteria describes selection criteria for resources to which some
// action is to be applied. Name, LabelSelector, and IndexSelector are all optional
// however, at least one must be specified. When multiple criteria are specified, the
// results are the combined (logical AND) of the criteria.
message GenericWebhookTargetSelectionCriteria {
  // Kind is the kind of the target resource.
  //
  // +kubebuilder:validation:Enum=Warehouse;
  optional string kind = 1;

  // Name is the name of the target resource. If LabelSelector and/or IndexSelectors
  // are also specified, the results are the combined (logical AND) of the criteria.
  //
  // +optional
  optional string name = 2;

  // LabelSelector is a label selector to identify the target resources.
  // If used with IndexSelector and/or Name, the results are the combined (logical AND) of all the criteria.
  //
  // +optional
  optional .k8s.io.apimachinery.pkg.apis.meta.v1.LabelSelector labelSelector = 3;

  // IndexSelector is a selector used to identify cached target resources by cache key.
  // If used with LabelSelector and/or Name, the results are the combined (logical AND) of all the criteria.
  //
  // +optional
  optional IndexSelector indexSelector = 4;
}

// GitClientConfig describes cluster-level configuration for Kargo's Git
// client.
message GitClientConfig {
  // Name is the name used for Git commits made by Kargo.
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  optional string name = 1;

  // Email is the email address used for Git commits made by Kargo.
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:Format="email"
  optional string email = 2;

  // SigningKeySecret references a Secret in the system namespace containing
  // a GPG signing key for commit signing. The Secret must contain a data
  // key named "signingKey" with the GPG private key material.
  // +optional
  optional .k8s.io.api.core.v1.LocalObjectReference signingKeySecret = 3;
}

// GitCommit describes a specific commit from a specific Git repository.
message GitCommit {
  // RepoURL is the URL of a Git repository.
  optional string repoURL = 1;

  // ID is the ID of a specific commit in the Git repository specified by
  // RepoURL.
  optional string id = 2;

  // Branch denotes the branch of the repository where this commit was found.
  optional string branch = 3;

  // Tag denotes a tag in the repository that matched selection criteria and
  // resolved to this commit.
  optional string tag = 4;

  // Message is the message associated with the commit. At present, this only
  // contains the first line (subject) of the commit message.
  optional string message = 6;

  // Author is the author of the commit.
  optional string author = 7;

  // Committer is the person who committed the commit.
  optional string committer = 8;
}

// GitDiscoveryRefs records the raw remote ref state relevant to a
// GitSubscription's commit selection strategy at the time of discovery. Exactly
// one of its fields is populated, according to whether the strategy selects from
// a branch or from tags.
message GitDiscoveryRefs {
  // BranchHead is the unfiltered commit ID at the tip of the subscribed branch.
  // It is populated for branch-based selection strategies (NewestFromBranch).
  // Because it records the branch tip before any path filtering, an unchanged
  // value guarantees the path-filtered selection cannot have changed either.
  //
  // +optional
  optional string branchHead = 1;

  // Tags is the set of tags that satisfied the GitSubscription's name-based
  // filters (semver and/or regex), paired with the commit IDs they reference,
  // sorted by tag name for a stable comparison. It is populated for tag-based
  // selection strategies (NewestTag, SemVer, Lexical). Path filtering is
  // applied later, during selection, and does not affect this set.
  //
  // +optional
  repeated DiscoveredRef tags = 2;
}

// GitDiscoveryResult represents the result of a Git discovery operation for a
// GitSubscription.
message GitDiscoveryResult {
  // RepoURL is the repository URL of the GitSubscription.
  //
  // TODO(v1.13.0): Remove SSH/SCP-style URL support from this pattern.
  //
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:Pattern=`(?:^(ssh|https?)://(?:([\w-]+)(:(.+))?@)?([\w-]+(?:\.[\w-]+)*)(?::(\d{1,5}))?(/.*)$)|(?:^([\w-]+)@([\w+]+(?:\.[\w-]+)*):(/?.*))`
  // +akuity:test-kubebuilder-pattern=GitRepoURLPattern
  optional string repoURL = 1;

  // Commits is a list of commits discovered by the Warehouse for the
  // GitSubscription. An empty list indicates that the discovery operation was
  // successful, but no commits matching the GitSubscription criteria were found.
  //
  // +optional
  repeated DiscoveredCommit commits = 2;

  // ObservedRefs records the raw remote ref state observed at the most recent
  // successful discovery, after name-based filtering but before path filtering
  // or commit selection. The Warehouse uses it to short-circuit discovery: at
  // the start of a reconcile, a single git ls-remote call yields the current
  // ref state, and if it matches this field, nothing relevant has moved and the
  // previously selected Commits remain valid -- so an expensive clone and
  // history walk can be skipped entirely. This field is optional; when absent
  // (e.g. on a Warehouse that predates this feature), discovery falls through to
  // a full clone and repopulates it.
  //
  // +optional
  optional GitDiscoveryRefs observedRefs = 3;
}

// GitHubWebhookReceiverConfig describes a webhook receiver that is compatible
// with GitHub payloads.
message GitHubWebhookReceiverConfig {
  // SecretRef contains a reference to a Secret. For Project-scoped webhook
  // receivers, the referenced Secret must be in the same namespace as the
  // ProjectConfig.
  //
  // For cluster-scoped webhook receivers, the referenced Secret must be in the
  // designated "system resources" namespace.
  //
  // The Secret's data map is expected to contain a `secret` key whose value is
  // the shared secret used to authenticate the webhook requests sent by GitHub.
  // For more information please refer to GitHub documentation:
  //   https://docs.github.com/en/webhooks/using-webhooks/validating-webhook-deliveries
  //
  // +kubebuilder:validation:Required
  optional .k8s.io.api.core.v1.LocalObjectReference secretRef = 1;
}

// GitLabWebhookReceiverConfig describes a webhook receiver that is compatible
// with GitLab payloads.
message GitLabWebhookReceiverConfig {
  // SecretRef contains a reference to a Secret. For Project-scoped webhook
  // receivers, the referenced Secret must be in the same namespace as the
  // ProjectConfig.
  //
  // For cluster-scoped webhook receivers, the referenced Secret must be in the
  // designated "system resources" namespace.
  //
  // The secret is expected to contain a `secret-token` key containing the
  // shared secret specified when registering the webhook in GitLab. For more
  // information about this token, please refer to the GitLab documentation:
  //   https://docs.gitlab.com/user/project/integrations/webhooks/
  //
  // +kubebuilder:validation:Required
  optional .k8s.io.api.core.v1.LocalObjectReference secretRef = 1;
}

// GitSubscription defines a subscription to a Git repository.
message GitSubscription {
  // AllowTags is a regular expression that can optionally be used to limit the tags that are
  // considered in determining the newest commit of interest. Deprecated: Use allowTagsRegexes
  // instead.
  optional string allowTags = 1;

  // AllowTagsRegexes is a list of regular expressions that can optionally be used to limit
  // the tags that are considered. Only has effect when CommitSelectionStrategy is Lexical,
  // NewestTag, or SemVer.
  repeated string allowTagsRegexes = 2;

  // Blobless enables blobless cloning (--filter=blob:none) for this subscription. When true,
  // git clones will defer blob downloads until checkout, significantly reducing clone time
  // and disk usage for large repositories. The server must support partial clones; if it does
  // not, the clone will fail.
  optional bool blobless = 3;

  // Branch references a particular branch of the repository. Only has effect when
  // CommitSelectionStrategy is NewestFromBranch or unspecified. When left unspecified, the
  // subscription is implicitly to the repository's default branch. Must be a valid branch
  // name.
  optional string branch = 4;

  // CommitSelectionStrategy specifies the rules for how to identify the newest commit of
  // interest in the repository specified by the RepoURL field.
  optional string commitSelectionStrategy = 5;

  // DiscoveryLimit is an optional limit on the number of commits that can be discovered for
  // this subscription. The upper limit is 100.
  optional int64 discoveryLimit = 6;

  // ExcludePaths is a list of selectors that designate paths in the repository that should
  // NOT trigger the production of new Freight when changes are detected therein.
  repeated string excludePaths = 7;

  // ExpressionFilter is an expression that can optionally be used to limit the commits or
  // tags that are considered in determining the newest commit of interest based on their
  // metadata.
  optional string expressionFilter = 8;

  // IgnoreTags is a list of tags that must be ignored when determining the newest commit of
  // interest. Deprecated: Use ignoreTagsRegexes instead.
  repeated string ignoreTags = 9;

  // IgnoreTagsRegexes is a list of regular expressions that can optionally be used to exclude
  // tags from consideration. Only has effect when CommitSelectionStrategy is Lexical,
  // NewestTag, or SemVer.
  repeated string ignoreTagsRegexes = 10;

  // IncludePaths is a list of selectors that designate paths in the repository that should
  // trigger the production of new Freight when changes are detected therein.
  repeated string includePaths = 11;

  // InsecureSkipTLSVerify specifies whether certificate verification errors should be ignored
  // when connecting to the repository. This should be enabled only with great caution.
  optional bool insecureSkipTLSVerify = 12;

  // URL is the repository's URL. This is a required field. Deprecated: Support for SSH URLs
  // (ssh:// and SCP-style git@host:path) is deprecated as of v1.10.0 and will be removed in
  // v1.13.0. Use HTTPS URLs instead.
  optional string repoURL = 13;

  // SemverConstraint specifies constraints on what new tagged commits are considered in
  // determining the newest commit of interest. Only has effect when CommitSelectionStrategy
  // is SemVer.
  optional string semverConstraint = 14;

  // An optional date (RFC 3339) that limits commit discovery to commits at or after this
  // date. When specified, discovery stops upon reaching a commit older than this date. When
  // left unspecified, there is no cutoff.
  optional .k8s.io.apimachinery.pkg.apis.meta.v1.Time since = 15;

  // StrictSemvers specifies whether only "strict" semver tags should be considered. A
  // "strict" semver tag contains ALL of major, minor, and patch version components. Only has
  // effect when CommitSelectionStrategy is SemVer.
  optional bool strictSemvers = 16;
}

// GiteaWebhookReceiverConfig describes a webhook receiver that is compatible
// with Gitea payloads.
message GiteaWebhookReceiverConfig {
  // SecretRef contains a reference to a Secret. For Project-scoped webhook
  // receivers, the referenced Secret must be in the same namespace as the
  // ProjectConfig.
  //
  // For cluster-scoped webhook receivers, the referenced Secret must be in the
  // designated "system resources" namespace.
  //
  // The Secret's data map is expected to contain a `secret` key whose value is
  // the shared secret used to authenticate the webhook requests sent by Gitea.
  // For more information please refer to the Gitea documentation:
  //   https://docs.gitea.io/en-us/webhooks/
  //
  // +kubebuilder:validation:Required
  optional .k8s.io.api.core.v1.LocalObjectReference secretRef = 1;
}

// HarborWebhookReceiverConfig describes a webhook receiver that is compatible
// with Harbor payloads.
message HarborWebhookReceiverConfig {
  // SecretRef contains a reference to a Secret. For Project-scoped webhook
  // receivers, the referenced Secret must be in the same namespace as the
  // ProjectConfig.
  //
  // For cluster-scoped webhook receivers, the referenced Secret must be in the
  // designated "system resources" namespace.
  //
  // The secret is expected to contain an `auth-header` key containing the "auth
  // header" specified when registering the webhook in Harbor. For more
  // information, please refer to the Harbor documentation:
  //   https://goharbor.io/docs/main/working-with-projects/project-configuration/configure-webhooks/
  //
  // +kubebuilder:validation:Required
  optional .k8s.io.api.core.v1.LocalObjectReference secretRef = 1;
}

// Health describes the health of a Stage.
message Health {
  // Status describes the health of the Stage.
  optional string status = 1;

  // Issues clarifies why a Stage in any state other than Healthy is in that
  // state. This field will always be the empty when a Stage is Healthy.
  repeated string issues = 2;

  // Config is the opaque configuration of all health checks performed on this
  // Stage.
  optional .k8s.io.apiextensions_apiserver.pkg.apis.apiextensions.v1.JSON config = 4;

  // Output is the opaque output of all health checks performed on this Stage.
  optional .k8s.io.apiextensions_apiserver.pkg.apis.apiextensions.v1.JSON output = 5;
}

// HealthCheckStep describes a health check directive which can be executed by
// a Stage to verify the health of a Promotion result.
message HealthCheckStep {
  // Uses identifies a runner that can execute this step.
  //
  // +kubebuilder:validation:MinLength=1
  optional string uses = 1;

  // Config is the configuration for the directive.
  optional .k8s.io.apiextensions_apiserver.pkg.apis.apiextensions.v1.JSON config = 2;
}

// HealthStats contains a summary of the collective health of some resource
// type.
message HealthStats {
  // Healthy contains the number of resources that are explicitly healthy.
  optional int64 healthy = 1;
}

// Image describes a specific version of a container image.
message Image {
  // RepoURL describes the repository in which the image can be found.
  optional string repoURL = 1;

  // Tag identifies a specific version of the image in the repository specified
  // by RepoURL.
  optional string tag = 3;

  // Digest identifies a specific version of the image in the repository
  // specified by RepoURL. This is a more precise identifier than Tag.
  optional string digest = 4;

  // Annotations is a map of arbitrary metadata for the image.
  map<string, string> annotations = 5;
}

// ImageDiscoveryResult represents the result of an image discovery operation
// for an ImageSubscription.
message ImageDiscoveryResult {
  // RepoURL is the repository URL of the image, as specified in the
  // ImageSubscription.
  //
  // +kubebuilder:validation:MinLength=1
  optional string repoURL = 1;

  // Platform is the target platform constraint of the ImageSubscription
  // for which references were discovered. This field is optional, and
  // only populated if the ImageSubscription specifies a Platform.
  optional string platform = 2;

  // References is a list of image references discovered by the Warehouse for
  // the ImageSubscription. An empty list indicates that the discovery
  // operation was successful, but no images matching the ImageSubscription
  // criteria were found.
  //
  // +optional
  repeated DiscoveredImageReference references = 3;
}

// ImageSubscription defines a subscription to a container image repository.
message ImageSubscription {
  // AllowTags is a regular expression that can optionally be used to limit the image tags
  // that are considered in determining the newest version of an image. This field is
  // optional. Deprecated: Use allowTagsRegexes instead. Beginning in v1.11.0, artifact
  // discovery will FAIL if this field is non-empty. This field will be removed in v1.13.0.
  optional string allowTags = 1;

  // AllowTagsRegexes is a list of regular expressions that can optionally be used to limit
  // the image tags that are considered in determining the newest revision of an image. This
  // field is optional.
  repeated string allowTagsRegexes = 2;

  // CacheByTag specifies whether to cache image metadata by tag. This can improve performance
  // but may lead to stale data if mutable tags are used.
  optional bool cacheByTag = 3;

  // Constraint specifies ImageSelectionStrategy-specific constraints on what new image
  // revisions are permissible. Acceptable values for this field vary contextually by
  // ImageSelectionStrategy. The field is optional for some strategies. Others either require
  // it or ignore it. For strategies that treat this field as optional, specifying no value
  // means "no constraints."
  optional string constraint = 4;

  // DiscoveryLimit is an optional limit on the number of image references that can be
  // discovered for this subscription. The limit is applied after filtering images based on
  // the AllowTagsRegexes and IgnoreTagsRegexes fields. When left unspecified, the field is
  // implicitly treated as if its value were "20". The upper limit for this field is 100.
  optional int64 discoveryLimit = 5;

  // IgnoreTags is a list of tags that must be ignored when determining the newest version of
  // an image. No regular expressions or glob patterns are supported yet. This field is
  // optional. Deprecated: Use ignoreTagsRegexes instead. Beginning in v1.11.0, artifact
  // discovery will FAIL if this field is non-empty. This field will be removed in v1.13.0.
  repeated string ignoreTags = 6;

  // IgnoreTagsRegexes is a list of regular expressions that can optionally be used to exclude
  // tags from consideration when determining the newest revision of an image. This field is
  // optional.
  repeated string ignoreTagsRegexes = 7;

  // ImageSelectionStrategy specifies the rules for how to identify the newest version of the
  // image specified by the RepoURL field. This field is optional. When left unspecified, the
  // field is implicitly treated as if its value were "SemVer". Accepted values: "Digest",
  // "Lexical", "NewestBuild", "SemVer".
  optional string imageSelectionStrategy = 8;

  // InsecureSkipTLSVerify specifies whether certificate verification errors should be ignored
  // when connecting to the repository. This should be enabled only with great caution.
  optional bool insecureSkipTLSVerify = 9;

  // Platform is a string of the form <os>/<arch> that limits the tags that can be considered
  // when searching for new versions of an image. This field is optional. When left
  // unspecified, it is implicitly equivalent to the OS/architecture of the Kargo controller.
  // Care should be taken to set this value correctly in cases where the image will run on a
  // Kubernetes node with a different OS/architecture than the Kargo controller.
  optional string platform = 10;

  // RepoURL specifies the URL of the image repository to subscribe to. The value in this
  // field MUST NOT include an image tag. This field is required.
  optional string repoURL = 11;

  // StrictSemvers specifies whether only "strict" semver tags should be considered. A
  // "strict" semver tag is one containing ALL of major, minor, and patch version components.
  // This is enabled by default, but only has any effect when the ImageSelectionStrategy is
  // SemVer. This should be disabled cautiously, as it is not uncommon to tag container images
  // with short Git commit hashes, which could be mistaken for a semver string containing the
  // major version number only.
  optional bool strictSemvers = 12;
}

// IndexSelector defines selection criteria that match resources on the basis of
// values in pre-built, well-known indices.
message IndexSelector {
