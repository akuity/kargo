name: Bug Report
description: Report a bug to help us improve
labels: ["kind/bug"]
body:
- type: checkboxes
  id: duplicate-check
  attributes:
    label: Pre-submission checklist
    options:
    - label: I have searched existing issues and confirmed this is not a duplicate.
      required: true
- type: textarea
  id: description
  attributes:
    label: Description
    description: A clear and concise description of the bug.
  validations:
    required: true
- type: textarea
  id: steps-to-reproduce
  attributes:
    label: Steps to Reproduce
    description: Steps to reproduce the behavior.
    placeholder: |
      1. ...
      2. ...
      3. ...
  validations:
    required: true
- type: textarea
  id: expected-behavior
  attributes:
    label: Expected Behavior
    description: What did you expect to happen?
  validations:
    required: true
- type: textarea
  id: actual-behavior
  attributes:
    label: Actual Behavior
    description: What actually happened?
  validations:
    required: true
- type: input
  id: version
  attributes:
    label: Kargo Version
    description: Output of `kargo version`.
    placeholder: e.g. v1.3.0
  validations:
    required: true
- type: textarea
  id: logs
  attributes:
    label: Relevant Logs
    description: If applicable, paste relevant log output. This will be automatically formatted as code.
    render: shell
  validations:
    required: false
- type: textarea
  id: screenshots
  attributes:
    label: Screenshots
    description: If applicable, add screenshots to help explain the bug.
  validations:
    required: false
