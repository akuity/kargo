# Documentation:
# * https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/enabling-and-disabling-dependabot-version-updates
# * https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/configuration-options-for-dependency-updates
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "npm"
    directory: "/ui"
    versioning-strategy: increase
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(deps):"
    groups:
      js-patch:
        update-types:
        - "patch"
      js-minor:
        update-types:
        - "minor"
      js-major:
        update-types:
        - "major"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    commit-message:
      prefix: "chore(deps):"
    # k8s.io/grpc upgrades are blocked by a dependency conflict; bump these
    # manually once that's resolved instead of bundling them into a group.
    ignore:
      - dependency-name: "k8s.io/*"
      - dependency-name: "sigs.k8s.io/controller-runtime"
      - dependency-name: "sigs.k8s.io/controller-tools"
      - dependency-name: "sigs.k8s.io/cli-utils"
      - dependency-name: "sigs.k8s.io/kustomize/*"
      - dependency-name: "google.golang.org/grpc*"
    groups:
      go-patch:
        update-types:
        - "patch"
      go-minor:
        update-types:
        - "minor"
      go-major:
        update-types:
        - "major"

  - package-ecosystem: "gomod"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "sunday"
    commit-message:
      prefix: "chore(deps/api):"
    # k8s.io/grpc upgrades are blocked by a dependency conflict; bump these
    # manually once that's resolved instead of bundling them into a group.
    ignore:
      - dependency-name: "k8s.io/*"
      - dependency-name: "sigs.k8s.io/controller-runtime"
      - dependency-name: "sigs.k8s.io/controller-tools"
      - dependency-name: "sigs.k8s.io/cli-utils"
      - dependency-name: "sigs.k8s.io/kustomize/*"
      - dependency-name: "google.golang.org/grpc*"
    groups:
      go-patch:
        update-types:
        - "patch"
      go-minor:
        update-types:
        - "minor"
      go-major:
        update-types:
        - "major"

  - package-ecosystem: "gomod"
    directory: "/pkg"
    schedule:
      interval: "weekly"
      day: "sunday"
    commit-message:
      prefix: "chore(deps/pkg):"
    # k8s.io/grpc upgrades are blocked by a dependency conflict; bump these
    # manually once that's resolved instead of bundling them into a group.
    ignore:
      - dependency-name: "k8s.io/*"
      - dependency-name: "sigs.k8s.io/controller-runtime"
      - dependency-name: "sigs.k8s.io/controller-tools"
      - dependency-name: "sigs.k8s.io/cli-utils"
      - dependency-name: "sigs.k8s.io/kustomize/*"
      - dependency-name: "google.golang.org/grpc*"
    groups:
      go-patch:
        update-types:
        - "patch"
      go-minor:
        update-types:
        - "minor"
      go-major:
        update-types:
        - "major"
