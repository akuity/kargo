contents:
  keyring:
  - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  repositories:
  - https://packages.wolfi.dev/os
  packages:
  - busybox # TODO: Remove this if we can figure out how to get by without a shell
  - ca-certificates
  - git~2
  - gpg~2
  - gpg-agent~2
  # NOTE: Helm (required by the kustomize-build step's Helm plugin) is
  # intentionally NOT sourced here. The Wolfi repo stopped patching Helm 3, so
  # the binary is installed from Helm's official releases in the Dockerfile's
  # "tools" stage instead.
  - openssh-client~10
  - tini

accounts:
  groups:
  - groupname: nonroot
    gid: 65532
  users:
  - username: nonroot
    uid: 65532
    gid: 65532
  run-as: "65532"
  
archs:
- arm64
- amd64
