apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: manual-lab
  namespace: freight-rejection
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: manual
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
