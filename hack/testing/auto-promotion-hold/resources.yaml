apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: slow-pending-hold
  namespace: auto-promotion-hold
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: auto-hold
    sources:
      direct: true
      autoPromotionOptions:
        selectionPolicy: NewestFreight
  promotionTemplate:
    spec:
      steps:
      - uses: http
        as: wait-10-seconds
        config:
          url: https://postman-echo.com/delay/10
          timeout: 30s
          responseContentType: application/json
          successExpression: response.status == 200 && response.body.delay == "10"
      - uses: set-metadata
        config:
          updates:
          - kind: Stage
            name: slow-pending-hold
            values:
              manualTest: auto-promotion-hold
              lastStory: slow-pending-hold
