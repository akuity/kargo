apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: auto-promotion-hold
  namespace: auto-promotion-hold
spec:
  promotionPolicies:
  - stageSelector:
      name: single-origin-hold
    autoPromotionEnabled: true
  - stageSelector:
      name: multi-origin-holds
    autoPromotionEnabled: true
  - stageSelector:
      name: upstream
    autoPromotionEnabled: true
  - stageSelector:
      name: downstream-single-origin
    autoPromotionEnabled: true
  - stageSelector:
      name: upstream-multi
    autoPromotionEnabled: true
  - stageSelector:
      name: downstream-multi-origin
    autoPromotionEnabled: true
