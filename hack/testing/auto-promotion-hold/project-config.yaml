apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: auto-promotion-hold
  namespace: auto-promotion-hold
spec:
  promotionPolicies:
  - stageSelector:
      name: single-origin-hold
    autoPromotionEnabled: true
  - stageSelector:
      name: multi-origin-holds
    autoPromotionEnabled: true
