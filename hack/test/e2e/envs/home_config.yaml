description: "Testing kargo API using config from home directory aquired with `kargo login`"
kargo_cli:
  ## Using system-local kargo config created by `kargo login`
  config_file:  ~/.config/kargo/config

argocd_cli:
  config_file: ~/.config/argocd/config

context:
  kargo_demo_gitops_repo: "https://github.com/hairyhum/kargo-demo-gitops.git"