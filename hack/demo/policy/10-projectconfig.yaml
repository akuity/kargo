apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: policy-demo
  namespace: policy-demo
spec:
  promotionPolicies:
  - stageSelector:
      name: test
    autoPromotionEnabled: true
  - stageSelector:
      name: uat
    autoPromotionEnabled: true

  # Promotion windows: forward promotions to a governed Stage dispatch only
  # while a window is open. Held Promotions stay Pending and dispatch on
  # their own when the window opens.
  promotionWindows:
  - name: uat-evenings
    stageSelector:
      name: uat
    recurrence: FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR
    start: "18:00"
    end: "23:00"
    location: America/Los_Angeles

  # Rolling-window rate limit: at most maxPromotions automatic dispatches
  # to a matching Stage within any trailing window.
  rateLimits:
  - name: test-throttle
    stageSelector:
      name: test
    maxPromotions: 1
    window: 2m

  # A project can extend the built-in policy with its own rules. Uncomment
  # to require an approved-by annotation on promotions to prod (rollbacks
  # exempt). Authoring guide: pkg/promotion/dispatch/policy/README.md.
  #
  # customPolicy: |
  #   violation contains v if {
  #   	input.stage.name == "prod"
  #   	kargo.is_forward
  #   	not input.promotion.annotations["approved-by"]
  #   	v := {
  #   		"rule": "prod-approval",
  #   		"msg": "prod promotions require an approved-by annotation",
  #   	}
  #   }
