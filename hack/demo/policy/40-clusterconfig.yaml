# System-wide promotion exclusions on the (singleton) ClusterConfig.
# promotionExclusions merges by entry under server-side apply (listType=map
# keyed by name) -- apply with `kubectl apply --server-side` and each field
# manager owns only its own entries. The sample exclusion is deliberately
# in the future (inert); the demo activates freezes per the README.
apiVersion: kargo.akuity.io/v1alpha1
kind: ClusterConfig
metadata:
  name: cluster
spec:
  promotionExclusions:
  - name: holiday-freeze
    start: "2026-12-20T00:00:00Z"
    end: "2027-01-02T00:00:00Z"
    scope: no-forward

  # Rules only, composed into every project's dispatch decision (the
  # kargo.cluster package and stdlib imports are prepended): a hotfix lane
  # through freezes, and a PCI change-ticket mandate.
  #
  # customPolicy: |
  #   exclusions_bypass(e) if is_hotfix
  #
  #   is_hotfix if {
  #   	count(shared_images) > 0
  #   	every pair in shared_images {
  #   		helpers.is_semver_patch(pair.old, pair.new)
  #   	}
  #   }
  #
  #   shared_images := [pair |
  #   	some img in input.freight.images
  #   	some last in input.stage.lastPromotion.freight.images
  #   	img.repoURL == last.repoURL
  #   	pair := {"old": last.tag, "new": img.tag}
  #   ]
  #
  #   violation contains v if {
  #   	input.project.labels.compliance == "pci"
  #   	input.promotion.class == "manual-forward"
  #   	not input.promotion.annotations["change-ticket"]
  #   	v := {
  #   		"rule": "pci-change-ticket",
  #   		"msg": "PCI projects require a change-ticket annotation on manual promotions",
  #   	}
  #   }
