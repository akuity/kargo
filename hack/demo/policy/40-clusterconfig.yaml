  # Scenario 8 (queue-aware ordering): re-apply with this policy to make the
  # backlog itself an input. It reads data.queue -- the Stage's Pending
  # Promotions in gate order -- to (a) yield any forward promotion while a
  # rollback is queued, so recovery always preempts change, and (b) hold
  # automatic promotions under a deep backlog so a human can catch up.
  # Rollbacks and manual promotions are never held by backpressure. The gate
  # evaluates Pending Promotions in queue order and dispatches the first the
  # policy allows, so a forward that yields simply lets the queued rollback
  # go first.
