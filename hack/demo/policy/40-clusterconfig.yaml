# System-wide promotion exclusions live on the (singleton, cluster-scoped)
# ClusterConfig. The promotionExclusions list has server-side-apply merge
# semantics (listType=map keyed by name), so apply this with
# `kubectl apply --server-side` and it merges into any existing
# ClusterConfig entry-by-entry -- each field manager owns only the
# exclusions it applied.
#
# The sample exclusion below is deliberately in the future (inert). The
# demo activates freezes by applying exclusions that span "now" -- see the
# README.
apiVersion: kargo.akuity.io/v1alpha1
kind: ClusterConfig
metadata:
  name: cluster
spec:
  promotionExclusions:
  - name: holiday-freeze
    start: "2026-12-20T00:00:00Z"
    end: "2027-01-02T00:00:00Z"
    scope: no-forward

  # The cluster may also contribute a custom policy, composed into every
  # project's dispatch decision. Like the project-level customPolicy, it
  # contains only rules (the kargo.cluster package and standard imports
  # are prepended automatically). Uncomment for the canonical operator
  # rule: a hotfix lane through every freeze. Hotfix semantics are defined
  # here, in the operator's own terms -- every image shared with what the
  # Stage last promoted is a semver patch-only increment
  # (helpers.is_semver_patch) -- not by the standard library.
  #
  # customPolicy: |
  #   exclusions_bypass(e) if is_hotfix
  #
  #   is_hotfix if {
  #   	count(shared_images) > 0
  #   	every pair in shared_images {
  #   		helpers.is_semver_patch(pair.old, pair.new)
  #   	}
  #   }
  #
  #   shared_images := [pair |
  #   	some img in input.freight.images
  #   	some last in input.stage.lastPromotion.freight.images
  #   	img.repoURL == last.repoURL
  #   	pair := {"old": last.tag, "new": img.tag}
  #   ]
