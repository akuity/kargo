apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: policy-demo
  labels:
    # Project metadata is projected into policy input (input.project.labels /
    # input.project.annotations), giving custom policies a lightweight way to
    # be data-driven, e.g.:
    #
    #   violation contains v if {
    #     input.project.labels["compliance"] == "pci"
    #     ...
    #   }
    compliance: pci
    team: payments
